<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timeline Editor — Interactive Grid</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f172a; color:#e2e8f0; font-family:Inter,system-ui,sans-serif; display:flex; height:100vh; overflow:hidden; }

  #controls {
    width: 380px; min-width:380px; background:#0c1322; border-right:1px solid #1e293b;
    overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px;
    font-size:12px;
  }
  #controls h2 { font-size:14px; color:#94a3b8; margin-bottom:2px; }
  #controls h3 {
    font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:1px;
    margin:6px 0 3px; border-top:1px solid #1e293b; padding-top:6px;
  }
  .ctrl-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
  .ctrl-row label { width:80px; color:#94a3b8; font-size:10px; flex-shrink:0; }
  .ctrl-row select { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:3px; padding:2px 4px; font-size:10px; flex:1; }

  .event-card {
    background:#1e293b; border:1px solid #334155; border-radius:6px; padding:8px;
    margin-bottom:4px; transition: border-color 0.15s;
  }
  .event-card.expanded { border-color:#3b82f6; }
  .event-header {
    display:flex; align-items:center; gap:6px; cursor:pointer;
  }
  .event-num {
    background:#334155; color:#94a3b8; font-size:10px; font-weight:700;
    width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  }
  .event-title-input {
    flex:1; font-weight:600; font-size:11px; color:#e2e8f0;
    background:transparent; border:none; border-bottom:1px solid transparent;
    outline:none; font-family:inherit;
  }
  .event-title-input:hover { border-bottom-color:#334155; }
  .event-title-input:focus { border-bottom-color:#3b82f6; }
  .event-day-input {
    width:36px; background:#0f172a; border:1px solid #334155; color:#e2e8f0;
    border-radius:3px; padding:2px 3px; font-size:9px; text-align:center;
  }
  .event-total { font-weight:700; font-size:11px; color:#60a5fa; min-width:18px; text-align:center; }
  .event-remove { cursor:pointer; color:#64748b; font-size:14px; padding:0 2px; }
  .event-remove:hover { color:#ef4444; }
  .event-expand { cursor:pointer; color:#64748b; font-size:10px; padding:0 2px; transition:transform 0.2s; }
  .event-expand.open { transform:rotate(180deg); }

  .event-body { display:none; padding-top:6px; }
  .event-body.open { display:block; }

  /* Stage selector */
  .stage-selector { display:flex; gap:3px; margin-bottom:6px; flex-wrap:wrap; }
  .stage-btn {
    font-size:9px; padding:3px 8px; border-radius:4px; cursor:pointer;
    border:1px solid #334155; color:#94a3b8; background:#0f172a;
    font-family:inherit; font-weight:600; transition:all 0.1s;
  }
  .stage-btn.active { color:#e2e8f0; font-weight:700; }

  /* Score sliders per dimension */
  .dim-score-row {
    display:flex; align-items:center; gap:4px; margin:2px 0; padding:1px 0;
  }
  .dim-score-swatch { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .dim-score-label { width:48px; font-size:10px; color:#94a3b8; }
  .dim-score-slider {
    flex:1; -webkit-appearance:none; appearance:none; height:6px;
    background:#1e293b; border-radius:3px; outline:none;
  }
  .dim-score-slider::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none; width:14px; height:14px;
    border-radius:7px; cursor:pointer; border:2px solid #0f172a;
  }
  .dim-score-val {
    width:18px; text-align:center; font-size:11px; font-weight:700; font-family:monospace;
  }

  /* Stakeholders section */
  .stake-section { margin-top:6px; padding-top:6px; border-top:1px solid #1e293b; }
  .stake-section-title { font-size:9px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .stake-card {
    background:#0f172a; border:1px solid #1e293b; border-radius:4px; padding:5px 6px;
    margin-bottom:3px;
  }
  .stake-row { display:flex; align-items:center; gap:4px; margin-bottom:2px; }
  .stake-name-input {
    flex:1; font-size:10px; font-weight:600; color:#e2e8f0;
    background:transparent; border:none; border-bottom:1px solid transparent;
    outline:none; font-family:inherit;
  }
  .stake-name-input:hover { border-bottom-color:#334155; }
  .stake-name-input:focus { border-bottom-color:#3b82f6; }
  .stake-role-select {
    background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:3px;
    padding:1px 3px; font-size:9px; font-family:inherit;
  }
  .stake-remove { cursor:pointer; color:#64748b; font-size:12px; }
  .stake-remove:hover { color:#ef4444; }
  .stake-dims { display:flex; gap:2px; flex-wrap:wrap; }
  .stake-dim-tag {
    font-size:8px; padding:1px 5px; border-radius:8px; cursor:pointer;
    border:1px solid #334155; color:#64748b; transition:all 0.1s;
    user-select:none;
  }
  .stake-dim-tag.active { border-color:currentColor; font-weight:700; }

  .btn-add-stake {
    background:#1e293b; border:1px solid #334155; border-radius:3px;
    padding:3px 8px; font-size:9px; cursor:pointer; color:#94a3b8;
    width:100%; margin-top:2px;
  }
  .btn-add-stake:hover { background:#334155; color:#e2e8f0; }

  button {
    background:#334155; color:#e2e8f0; border:1px solid #475569; border-radius:4px;
    padding:4px 8px; cursor:pointer; font-size:10px;
  }
  button:hover { background:#475569; }
  .btn-add { background:#1e3a5f; border-color:#2563eb; }
  .btn-add:hover { background:#2563eb; }

  .mode-toggle { display:flex; gap:4px; margin-bottom:4px; }
  .mode-toggle button { flex:1; font-size:10px; padding:5px; }
  .mode-toggle button.active { background:#7c3aed; border-color:#a78bfa; }

  .legend { display:flex; flex-wrap:wrap; gap:6px; margin:4px 0; }
  .legend-item { display:flex; align-items:center; gap:3px; font-size:9px; }
  .legend-swatch { width:10px; height:10px; border-radius:2px; }

  .role-legend { display:flex; flex-wrap:wrap; gap:6px; margin:4px 0; }
  .role-legend-item { display:flex; align-items:center; gap:3px; font-size:9px; }
  .role-legend-circle { width:10px; height:10px; border-radius:50%; }
  .role-legend-circle.open { background:transparent !important; border:2px solid; }

  #canvasWrap { flex:1; position:relative; overflow:auto; }
  #mainCanvas { display:block; cursor:crosshair; }
</style>
</head>
<body>

<div id="controls">
  <h2>Living Deal Grid</h2>

  <div class="mode-toggle">
    <button id="modeFlat" class="active" onclick="setMode('flat')">Grid</button>
    <button id="modeRadial" onclick="setMode('radial')">Radial</button>
  </div>

  <h3>Legend</h3>
  <div class="legend" id="legend"></div>
  <div id="roleLegend" class="role-legend" style="margin-top:4px;"></div>
  <div id="stageLegend" style="margin-top:4px;font-size:9px;"></div>
  <div style="font-size:9px;color:#475569;margin-top:2px">60 rows: bottom 30 = Deal Stage (texture), top 30 = P2V2C2 (color). Columns = days.</div>

  <h3>DAP Milestones (90-day)</h3>
  <div id="milestoneList"></div>
  <button class="btn-add" id="addMilestone">+ Add Milestone</button>

  <h3>Scoring Events</h3>
  <div id="eventList"></div>
  <button class="btn-add" id="addEvent">+ Add Scoring Event</button>

  <h3>Stats</h3>
  <div id="stats" style="font-size:10px;color:#94a3b8;"></div>
</div>

<div id="canvasWrap">
  <canvas id="mainCanvas"></canvas>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const DIMS = ['pain','power','vision','value','change','control'];
const DIM_COLORS = {
  pain:   {h:'#f87171', rgb:[248,113,113]},
  power:  {h:'#a78bfa', rgb:[167,139,250]},
  vision: {h:'#38bdf8', rgb:[56,189,248]},
  value:  {h:'#4ade80', rgb:[74,222,128]},
  change: {h:'#fb923c', rgb:[251,146,60]},
  control:{h:'#e879f9', rgb:[232,121,249]},
};
const DIM_LABELS = {pain:'Pain',power:'Power',vision:'Vision',value:'Value',change:'Change',control:'Control'};

const STAGES = ['discover','qualify','prove','negotiate','close'];
const STAGE_LABELS = {discover:'Discover',qualify:'Qualify',prove:'Prove',negotiate:'Negotiate',close:'Close'};
const STAGE_ROWS = 6; // rows per stage = 6 (total 30 for stage section)
const STAGE_COLORS = {
  discover:  {h:'#475569', rgb:[71,85,105]},
  qualify:   {h:'#6b7280', rgb:[107,114,128]},
  prove:     {h:'#9ca3af', rgb:[156,163,175]},
  negotiate: {h:'#d1d5db', rgb:[209,213,219]},
  close:     {h:'#e5e7eb', rgb:[229,231,235]},
};

const ROLE_CONFIG = {
  PC:    { color:'#94a3b8', fill:false, r:6,  label:'PC',  name:'Potential Champion' },
  C:     { color:'#6366f1', fill:true,  r:7,  label:'C',   name:'Champion' },
  PES:   { color:'#f59e0b', fill:false, r:6,  label:'PES', name:'Potential ES' },
  ES:    { color:'#ca8a04', fill:true,  r:7,  label:'ES',  name:'Executive Sponsor' },
  UDM:   { color:'#94a3b8', fill:false, r:6,  label:'UDM', name:'Potential DM' },
  DM:    { color:'#15803d', fill:true,  r:8,  label:'DM',  name:'Decision Maker' },
  OTHER: { color:'#64748b', fill:false, r:5,  label:'OTH', name:'Other' },
};
const ROLES = Object.keys(ROLE_CONFIG);

const CAS_OPTIONS = [
  '1A: Identify Pain','1B: Qualify Pain','2A: Develop Vision','2B: Reengineer Vision',
  '3A: Prove Value','3B: Document Approach','4A: Negotiate Terms','4B: Close Deal',
];

const P2V2C2_ROWS = 30; // 6 dims × 5
const STAGE_TOTAL_ROWS = 30; // 5 stages × 6
const TOTAL_ROWS = 60; // stage (0-29) + p2v2c2 (30-59)
const TOTAL_DAYS = 90;

function dimForRow(row) { return DIMS[Math.floor(row / 5)]; }

// ═══════════════════════════════════════════════════════
// TEXTURE PATTERNS — wireframe complexity per stage
// ═══════════════════════════════════════════════════════
// Each stage gets a texture density level 0-4
// 0=discover (smooth), 4=close (ornate wireframe)
function getStageTextureLevel(stage) {
  return STAGES.indexOf(stage);
}

// Draw texture inside a rectangle: wireframe lines of increasing complexity
function drawStageTexture(ctx, x, y, w, h, level, alpha) {
  if (level <= 0) return; // discover = completely smooth, no lines
  ctx.save();
  ctx.globalAlpha = alpha * 0.6;
  ctx.strokeStyle = 'rgba(226,232,240,0.4)';
  ctx.lineWidth = 0.5;

  if (level >= 1) {
    // Qualify: single diagonal
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    ctx.lineTo(x + w, y);
    ctx.stroke();
  }
  if (level >= 2) {
    // Prove: cross-hatch
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + w, y + h);
    ctx.stroke();
  }
  if (level >= 3) {
    // Negotiate: add horizontal + vertical midlines
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x + w, y + h / 2);
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w / 2, y + h);
    ctx.stroke();
    // Extra diagonals from corners to midpoints
    ctx.lineWidth = 0.3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + w / 2, y + h);
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w, y + h);
    ctx.stroke();
  }
  if (level >= 4) {
    // Close: dense wireframe lattice
    ctx.lineWidth = 0.3;
    const steps = 4;
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      // Horizontal
      ctx.beginPath();
      ctx.moveTo(x, y + h * t);
      ctx.lineTo(x + w, y + h * t);
      ctx.stroke();
      // Vertical
      ctx.beginPath();
      ctx.moveTo(x + w * t, y);
      ctx.lineTo(x + w * t, y + h);
      ctx.stroke();
    }
    // Diamond from midpoints
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w, y + h / 2);
    ctx.lineTo(x + w / 2, y + h);
    ctx.lineTo(x, y + h / 2);
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();
}

// For radial: draw texture in a wedge-shaped region
function drawStageTextureRadial(ctx, cx, cy, innerR, outerR, a1, a2, level, alpha) {
  if (level <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha * 0.6;
  ctx.strokeStyle = 'rgba(226,232,240,0.4)';
  ctx.lineWidth = 0.5;

  const midA = (a1 + a2) / 2;
  const midR = (innerR + outerR) / 2;

  // Helper: point on ring at angle and radius
  const px = (r, a) => cx + r * Math.cos(a);
  const py = (r, a) => cy + r * Math.sin(a);

  if (level >= 1) {
    ctx.beginPath();
    ctx.moveTo(px(innerR, a1), py(innerR, a1));
    ctx.lineTo(px(outerR, a2), py(outerR, a2));
    ctx.stroke();
  }
  if (level >= 2) {
    ctx.beginPath();
    ctx.moveTo(px(outerR, a1), py(outerR, a1));
    ctx.lineTo(px(innerR, a2), py(innerR, a2));
    ctx.stroke();
  }
  if (level >= 3) {
    ctx.beginPath();
    ctx.moveTo(px(innerR, midA), py(innerR, midA));
    ctx.lineTo(px(outerR, midA), py(outerR, midA));
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px(midR, a1), py(midR, a1));
    ctx.lineTo(px(midR, a2), py(midR, a2));
    ctx.stroke();
    ctx.lineWidth = 0.3;
    ctx.beginPath();
    ctx.moveTo(px(innerR, a1), py(innerR, a1));
    ctx.lineTo(px(midR, a2), py(midR, a2));
    ctx.moveTo(px(midR, a1), py(midR, a1));
    ctx.lineTo(px(outerR, a2), py(outerR, a2));
    ctx.stroke();
  }
  if (level >= 4) {
    ctx.lineWidth = 0.3;
    const steps = 3;
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const r = innerR + (outerR - innerR) * t;
      ctx.beginPath();
      ctx.arc(cx, cy, r, a1, a2);
      ctx.stroke();
      const a = a1 + (a2 - a1) * t;
      ctx.beginPath();
      ctx.moveTo(px(innerR, a), py(innerR, a));
      ctx.lineTo(px(outerR, a), py(outerR, a));
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {
  mode: 'flat',
  milestones: [
    { label:'1A: Pre-Qualify Prospect', day:0 },
    { label:'1B: Identify Potential Champion', day:3 },
    { label:'1C: Share IT Storyboard', day:7 },
    { label:'1D: Champion shares situation', day:10 },
    { label:'2A: Validate Pain & Change', day:15 },
    { label:'2B: Set expectations for process', day:20 },
    { label:'2C: Gain access to Power (ES)', day:25 },
    { label:'2D: Define Buying Process & DAP', day:30 },
    { label:'3A: Determine Proof Criteria', day:38 },
    { label:'3B: Document Approach', day:44 },
    { label:'3C: Validation Meeting: Present AD', day:50 },
    { label:'3D: Email AD w/Pricing', day:55 },
    { label:'4A: Revise DAP w/ steps to close', day:62 },
    { label:'4B: Present MSA/SOW', day:68 },
    { label:'4C: Exchange red-lines', day:74 },
    { label:'4D: Client committed to Sign Date', day:80 },
    { label:'5A: Both parties agree on terms', day:85 },
    { label:'5VO: Contracts signed', day:90 },
  ],
  // P2V2C2 grid: grid[day][row] = true/false (30 rows)
  grid: [],
  // Stage grid: stageGrid[day] = { stage, alpha }
  stageGrid: [],
  events: [],
  expandedEvent: -1,
};

for (let d = 0; d <= TOTAL_DAYS; d++) {
  state.grid[d] = new Array(P2V2C2_ROWS).fill(false);
  state.stageGrid[d] = { stage: null, alpha: 0 };
}

function initScoringEvents() {
  state.events = [
    { label:'Discovery Call', day:0, cas:'1A: Identify Pain', stage:'discover',
      scores:{pain:2,power:1,vision:1,value:0,change:0,control:0},
      stakeholders:[
        { name:'Lisa Park', role:'PC', dims:['pain','vision'] }
      ] },
    { label:'Follow-up Meeting', day:12, cas:'1B: Qualify Pain', stage:'discover',
      scores:{pain:3,power:2,vision:2,value:1,change:0,control:0},
      stakeholders:[
        { name:'Lisa Park', role:'PC', dims:['pain','vision','power'] }
      ] },
    { label:'Technical Deep Dive', day:30, cas:'2A: Develop Vision', stage:'qualify',
      scores:{pain:4,power:3,vision:3,value:2,change:1,control:1},
      stakeholders:[
        { name:'Lisa Park', role:'C', dims:['pain','vision','value','change'] },
        { name:'Dr. Patel', role:'PES', dims:['power','value'] }
      ] },
    { label:'Executive Alignment', day:55, cas:'3B: Document Approach', stage:'prove',
      scores:{pain:5,power:4,vision:4,value:3,change:2,control:2},
      stakeholders:[
        { name:'Lisa Park', role:'C', dims:['pain','vision','value','change','control'] },
        { name:'Dr. Patel', role:'ES', dims:['power','value','change'] },
        { name:'CFO Office', role:'UDM', dims:['power'] }
      ] },
  ];
  rebuildGrid();
}

function rebuildGrid() {
  for (let d = 0; d <= TOTAL_DAYS; d++) {
    state.grid[d] = new Array(P2V2C2_ROWS).fill(false);
    state.stageGrid[d] = { stage: null, alpha: 0 };
  }

  const sorted = [...state.events].sort((a, b) => a.day - b.day);

  for (let ei = 0; ei < sorted.length; ei++) {
    const ev = sorted[ei];
    const startDay = ev.day;
    const endDay = ei < sorted.length - 1 ? sorted[ei + 1].day : TOTAL_DAYS + 1;
    const span = endDay - startDay;

    for (let d = startDay; d < endDay; d++) {
      if (d > TOTAL_DAYS) break;

      // P2V2C2
      let rowOffset = 0;
      DIMS.forEach(dim => {
        const score = ev.scores[dim] || 0;
        for (let s = 0; s < 5; s++) {
          state.grid[d][rowOffset + s] = s < score;
        }
        rowOffset += 5;
      });

      // Stage with brightness decay
      const daysSince = d - startDay;
      const decayRate = 0.015; // fade per day
      const alpha = Math.max(0.15, 1.0 - daysSince * decayRate);
      state.stageGrid[d] = { stage: ev.stage || 'discover', alpha };
    }
  }
}

initScoringEvents();

// ═══════════════════════════════════════════════════════
// Compute scores from grid for a given day
// ═══════════════════════════════════════════════════════
function scoresForDay(day) {
  const scores = {};
  DIMS.forEach((dim, di) => {
    let count = 0;
    for (let s = 0; s < 5; s++) {
      if (state.grid[day][di * 5 + s]) count++;
    }
    scores[dim] = count;
  });
  return scores;
}

function totalForDay(day) {
  let total = 0;
  for (let r = 0; r < P2V2C2_ROWS; r++) {
    if (state.grid[day][r]) total++;
  }
  return total;
}

function stageForDay(day) {
  return state.stageGrid[day];
}

function stageRowCount(stage) {
  // How many rows to fill for this stage (cumulative — higher stages fill more)
  const idx = STAGES.indexOf(stage);
  return (idx + 1) * STAGE_ROWS; // discover=6, qualify=12, prove=18, negotiate=24, close=30
}

// ═══════════════════════════════════════════════════════
// STAKEHOLDERS
// ═══════════════════════════════════════════════════════
function getAllStakeholdersForRendering() {
  const all = [];
  state.events.forEach((ev, ei) => {
    (ev.stakeholders || []).forEach(s => {
      all.push({ name:s.name, role:s.role, dims:[...s.dims], eventIndex:ei, eventDay:ev.day });
    });
  });
  return all;
}

// ═══════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = DIMS.map(dim => {
    const col = DIM_COLORS[dim];
    return `<div class="legend-item"><div class="legend-swatch" style="background:${col.h}"></div>${DIM_LABELS[dim]}</div>`;
  }).join('');

  const rl = document.getElementById('roleLegend');
  rl.innerHTML = ROLES.map(role => {
    const cfg = ROLE_CONFIG[role];
    const cls = cfg.fill ? '' : ' open';
    const style = cfg.fill ? `background:${cfg.color}` : `border-color:${cfg.color}`;
    return `<div class="role-legend-item"><div class="role-legend-circle${cls}" style="${style}"></div>${cfg.label}</div>`;
  }).join('');

  // Stage legend with texture previews
  const sl = document.getElementById('stageLegend');
  sl.innerHTML = '<div style="font-size:9px;color:#64748b;margin-bottom:3px">DEAL STAGE (texture complexity)</div>' +
    STAGES.map((stage, i) => {
      const texDesc = ['Smooth','Single line','Cross-hatch','Grid + diags','Dense wireframe'][i];
      return `<span style="color:#94a3b8;margin-right:8px">${STAGE_LABELS[stage]}: <span style="color:#64748b">${texDesc}</span></span>`;
    }).join('');
}

function buildEventUI() {
  const el = document.getElementById('eventList');
  el.innerHTML = '';
  state.events.forEach((ev, i) => {
    const total = DIMS.reduce((s, d) => s + (ev.scores[d] || 0), 0);
    const isExpanded = state.expandedEvent === i;
    const card = document.createElement('div');
    card.className = 'event-card' + (isExpanded ? ' expanded' : '');

    let html = `<div class="event-header" data-idx="${i}">
      <div class="event-num">${i+1}</div>
      <input type="text" class="event-title-input" data-idx="${i}" value="${ev.label}">
      <span style="font-size:8px;color:#64748b">D</span>
      <input type="number" class="event-day-input" data-idx="${i}" value="${ev.day}" min="0" max="${TOTAL_DAYS}">
      <div class="event-total">${total}</div>
      <div class="event-expand${isExpanded ? ' open' : ''}" data-idx="${i}">&#9660;</div>
      <div class="event-remove" data-idx="${i}">&times;</div>
    </div>`;

    html += `<div class="event-body${isExpanded ? ' open' : ''}" id="evBody${i}">`;

    // Deal Stage selector
    html += `<div style="margin-bottom:6px;"><div style="font-size:9px;color:#64748b;margin-bottom:3px;">DEAL STAGE</div>
      <div class="stage-selector">`;
    STAGES.forEach(stage => {
      const active = ev.stage === stage;
      const scol = STAGE_COLORS[stage];
      const bgStyle = active ? `background:rgba(${scol.rgb[0]},${scol.rgb[1]},${scol.rgb[2]},0.2);border-color:${scol.h}` : '';
      html += `<button class="stage-btn${active ? ' active' : ''}" data-evt="${i}" data-stage="${stage}" style="${bgStyle}">${STAGE_LABELS[stage]}</button>`;
    });
    html += `</div></div>`;

    // P2V2C2 Score sliders
    html += `<div style="font-size:9px;color:#64748b;margin-bottom:3px;">P2V2C2 SCORES</div>`;
    DIMS.forEach(dim => {
      const col = DIM_COLORS[dim];
      const score = ev.scores[dim] || 0;
      html += `<div class="dim-score-row">
        <div class="dim-score-swatch" style="background:${col.h}"></div>
        <div class="dim-score-label">${DIM_LABELS[dim]}</div>
        <input type="range" class="dim-score-slider" data-evt="${i}" data-dim="${dim}"
          min="0" max="5" value="${score}"
          style="accent-color:${col.h}">
        <div class="dim-score-val" style="color:${col.h}" id="scoreVal_${i}_${dim}">${score}</div>
      </div>`;
    });

    // Stakeholders
    html += `<div class="stake-section">
      <div class="stake-section-title">Stakeholders</div>`;

    (ev.stakeholders || []).forEach((s, si) => {
      html += `<div class="stake-card">
        <div class="stake-row">
          <input type="text" class="stake-name-input" data-evt="${i}" data-si="${si}" value="${s.name}">
          <select class="stake-role-select" data-evt="${i}" data-si="${si}">
            ${ROLES.map(r => `<option value="${r}"${r === s.role ? ' selected' : ''}>${r} — ${ROLE_CONFIG[r].name}</option>`).join('')}
          </select>
          <span class="stake-remove" data-evt="${i}" data-si="${si}">&times;</span>
        </div>
        <div class="stake-dims">
          ${DIMS.map(dim => {
            const active = s.dims.includes(dim);
            const col = DIM_COLORS[dim];
            return `<span class="stake-dim-tag${active ? ' active' : ''}"
              style="color:${active ? col.h : '#64748b'};border-color:${active ? col.h : '#334155'};${active ? 'background:'+col.h+'18' : ''}"
              data-evt="${i}" data-si="${si}" data-dim="${dim}">${DIM_LABELS[dim]}</span>`;
          }).join('')}
        </div>
      </div>`;
    });

    html += `<button class="btn-add-stake" data-evt="${i}">+ Add Stakeholder</button>`;
    html += `</div></div>`;

    card.innerHTML = html;
    el.appendChild(card);
  });

  // Wire up events
  el.querySelectorAll('.event-expand').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); const idx = +btn.dataset.idx; state.expandedEvent = state.expandedEvent === idx ? -1 : idx; buildEventUI(); };
  });
  el.querySelectorAll('.event-header').forEach(hdr => {
    hdr.onclick = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.classList.contains('event-remove') || e.target.classList.contains('event-expand')) return;
      const idx = +hdr.dataset.idx; state.expandedEvent = state.expandedEvent === idx ? -1 : idx; buildEventUI();
    };
  });
  el.querySelectorAll('.event-title-input').forEach(inp => {
    inp.oninput = () => { state.events[+inp.dataset.idx].label = inp.value; render(); };
  });
  el.querySelectorAll('.event-day-input').forEach(inp => {
    inp.oninput = () => { state.events[+inp.dataset.idx].day = Math.max(0, Math.min(TOTAL_DAYS, +inp.value)); rebuildGrid(); render(); };
  });
  el.querySelectorAll('.event-remove').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); state.events.splice(+btn.dataset.idx, 1); if (state.expandedEvent >= state.events.length) state.expandedEvent = -1; rebuildGrid(); buildEventUI(); render(); };
  });

  // Stage buttons
  el.querySelectorAll('.stage-btn').forEach(btn => {
    btn.onclick = () => {
      state.events[+btn.dataset.evt].stage = btn.dataset.stage;
      rebuildGrid(); buildEventUI(); render();
    };
  });

  // Score sliders
  el.querySelectorAll('.dim-score-slider').forEach(slider => {
    slider.oninput = () => {
      const ei = +slider.dataset.evt; const dim = slider.dataset.dim; const val = +slider.value;
      state.events[ei].scores[dim] = val;
      const valEl = document.getElementById(`scoreVal_${ei}_${dim}`);
      if (valEl) valEl.textContent = val;
      rebuildGrid(); render();
    };
  });

  // Stakeholder wiring
  el.querySelectorAll('.stake-name-input').forEach(inp => {
    inp.oninput = () => { state.events[+inp.dataset.evt].stakeholders[+inp.dataset.si].name = inp.value; render(); };
  });
  el.querySelectorAll('.stake-role-select').forEach(sel => {
    sel.onchange = () => { state.events[+sel.dataset.evt].stakeholders[+sel.dataset.si].role = sel.value; render(); };
  });
  el.querySelectorAll('.stake-remove').forEach(btn => {
    btn.onclick = () => { state.events[+btn.dataset.evt].stakeholders.splice(+btn.dataset.si, 1); buildEventUI(); render(); };
  });
  el.querySelectorAll('.stake-dim-tag').forEach(tag => {
    tag.onclick = () => {
      const dims = state.events[+tag.dataset.evt].stakeholders[+tag.dataset.si].dims;
      const idx = dims.indexOf(tag.dataset.dim);
      if (idx >= 0) dims.splice(idx, 1); else dims.push(tag.dataset.dim);
      buildEventUI(); render();
    };
  });
  el.querySelectorAll('.btn-add-stake').forEach(btn => {
    btn.onclick = () => {
      const ei = +btn.dataset.evt;
      if (!state.events[ei].stakeholders) state.events[ei].stakeholders = [];
      state.events[ei].stakeholders.push({ name:'New Contact', role:'PC', dims:['pain'] });
      buildEventUI(); render();
    };
  });
}

function buildMilestoneUI() {
  const el = document.getElementById('milestoneList');
  el.innerHTML = '';
  state.milestones.forEach((ms, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:4px;margin-bottom:2px;';
    row.innerHTML = `
      <input type="text" class="ms-label" data-idx="${i}" value="${ms.label}"
        style="flex:1;background:#0f172a;border:1px solid #334155;color:#34d399;border-radius:3px;padding:2px 5px;font-size:9px;font-weight:600">
      <span style="font-size:8px;color:#64748b">D</span>
      <input type="number" class="ms-day" data-idx="${i}" value="${ms.day}" min="0" max="${TOTAL_DAYS}"
        style="width:36px;background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:3px;padding:2px 3px;font-size:9px;text-align:center">
      <span class="ms-remove" data-idx="${i}" style="cursor:pointer;color:#64748b;font-size:10px">&times;</span>`;
    el.appendChild(row);
  });
  el.querySelectorAll('.ms-label').forEach(inp => { inp.oninput = () => { state.milestones[+inp.dataset.idx].label = inp.value; render(); }; });
  el.querySelectorAll('.ms-day').forEach(inp => { inp.oninput = () => { state.milestones[+inp.dataset.idx].day = +inp.value; render(); }; });
  el.querySelectorAll('.ms-remove').forEach(btn => { btn.onclick = () => { state.milestones.splice(+btn.dataset.idx, 1); buildMilestoneUI(); render(); }; });
}

function updateStats() {
  const el = document.getElementById('stats');
  let lastActiveDay = 0;
  for (let d = TOTAL_DAYS; d >= 0; d--) {
    if (state.grid[d].some(v => v)) { lastActiveDay = d; break; }
  }
  const scores = scoresForDay(lastActiveDay);
  const total = totalForDay(lastActiveDay);
  const sg = stageForDay(lastActiveDay);
  const stakeCount = (state.events[state.events.length - 1]?.stakeholders || []).length;
  el.innerHTML = `
    <div>Day: <strong>${lastActiveDay}</strong> | Score: <strong>${total}/30</strong> | Stage: <strong>${sg.stage ? STAGE_LABELS[sg.stage] : '—'}</strong> | Stakeholders: <strong>${stakeCount}</strong></div>
    <div style="margin-top:3px">${DIMS.map(dim => {
      const col = DIM_COLORS[dim];
      return `<span style="color:${col.h}">${DIM_LABELS[dim]}:${scores[dim]}</span>`;
    }).join(' ')}</div>
  `;
}

document.getElementById('addMilestone').onclick = () => {
  const last = state.milestones[state.milestones.length - 1];
  state.milestones.push({ label:'New Milestone', day: (last ? last.day + 5 : 0) });
  buildMilestoneUI(); render();
};

document.getElementById('addEvent').onclick = () => {
  const last = state.events[state.events.length - 1];
  const day = last ? last.day + 14 : 0;
  state.events.push({
    label: `Event ${state.events.length + 1}`,
    day: Math.min(day, TOTAL_DAYS),
    cas: CAS_OPTIONS[0],
    stage: last ? last.stage : 'discover',
    scores: last ? { ...last.scores } : {pain:0,power:0,vision:0,value:0,change:0,control:0},
    stakeholders: last ? last.stakeholders.map(s => ({...s, dims:[...s.dims]})) : [],
  });
  state.expandedEvent = state.events.length - 1;
  rebuildGrid(); buildEventUI(); render();
};

function setMode(m) {
  state.mode = m;
  document.getElementById('modeFlat').classList.toggle('active', m === 'flat');
  document.getElementById('modeRadial').classList.toggle('active', m === 'radial');
  sizeCanvas(); render();
}

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

const MARGIN = { left: 72, right: 20, top: 80, bottom: 80 };
const CELL_W = 12;
const CELL_H = 14;
const STAGE_GAP = 8; // gap between stage section and P2V2C2 section

function sizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  if (state.mode === 'flat') {
    const totalW = MARGIN.left + (TOTAL_DAYS + 1) * CELL_W + MARGIN.right;
    const totalH = MARGIN.top + TOTAL_ROWS * CELL_H + STAGE_GAP + MARGIN.bottom;
    canvas.width = totalW * 2;
    canvas.height = totalH * 2;
    canvas.style.width = totalW + 'px';
    canvas.style.height = totalH + 'px';
  } else {
    const s = Math.min(wrap.clientWidth, wrap.clientHeight);
    canvas.width = s * 2; canvas.height = s * 2;
    canvas.style.width = s + 'px'; canvas.style.height = s + 'px';
  }
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  if (state.mode === 'flat') renderGrid(W, H);
  else renderRadial(W, H);
  updateStats();
}

function renderGrid(W, H) {
  const s = 2;
  const ml = MARGIN.left * s, mt = MARGIN.top * s;
  const cw = CELL_W * s, ch = CELL_H * s;
  const gap = STAGE_GAP * s;

  // P2V2C2 section starts at mt, Stage section starts below it
  const p2Top = mt;
  const stageTop = mt + P2V2C2_ROWS * ch + gap;

  const sortedMilestones = [...state.milestones].sort((a, b) => a.day - b.day);

  // ── STAGE SECTION (bottom) ──
  // Draw stage rows: for each day, fill rows based on current stage level
  for (let d = 0; d <= TOTAL_DAYS; d++) {
    const x = ml + d * cw;
    const sg = stageForDay(d);
    if (!sg.stage) continue;

    const litRows = stageRowCount(sg.stage);

    for (let r = 0; r < STAGE_TOTAL_ROWS; r++) {
      // Row 0 = bottom of stage section (Discover row 0), row 29 = top (Close row 5)
      const visualRow = STAGE_TOTAL_ROWS - 1 - r;
      const y = stageTop + visualRow * ch;
      const isLit = r < litRows;
      // Each row's texture = its own zone (not the current stage)
      const rowZoneIdx = Math.floor(r / STAGE_ROWS);
      const texLevel = rowZoneIdx;

      if (isLit) {
        // Base fill with alpha decay
        const baseAlpha = sg.alpha * 0.35;
        ctx.fillStyle = `rgba(148,163,184,${baseAlpha})`;
        ctx.fillRect(x, y, cw, ch);

        // Texture overlay — zone-specific complexity
        drawStageTexture(ctx, x, y, cw, ch, texLevel, sg.alpha);
      }

      // Cell border — always visible as grid
      ctx.strokeStyle = isLit ? `rgba(148,163,184,${sg.alpha * 0.15})` : 'rgba(148,163,184,0.02)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, cw, ch);
    }
  }

  // Stage labels on left
  STAGES.forEach((stage, si) => {
    const topRow = STAGE_TOTAL_ROWS - 1 - ((si + 1) * STAGE_ROWS - 1);
    const botRow = STAGE_TOTAL_ROWS - 1 - (si * STAGE_ROWS);
    const midY = stageTop + ((topRow + botRow) / 2) * ch + ch / 2;

    ctx.font = `bold ${10 * s}px Inter,sans-serif`;
    ctx.fillStyle = 'rgba(148,163,184,0.35)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(STAGE_LABELS[stage], ml - 6 * s, midY);

    // Separator between stages
    if (si > 0) {
      const sepY = stageTop + topRow * ch + ch * STAGE_ROWS;
      ctx.beginPath();
      ctx.moveTo(ml, sepY);
      ctx.lineTo(ml + (TOTAL_DAYS + 1) * cw, sepY);
      ctx.strokeStyle = 'rgba(148,163,184,0.06)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  });

  // Section divider label
  const dividerY = mt + P2V2C2_ROWS * ch + gap / 2;
  ctx.font = `bold ${8 * s}px Inter,sans-serif`;
  ctx.fillStyle = 'rgba(148,163,184,0.15)';
  ctx.textAlign = 'center';
  ctx.fillText('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', ml + ((TOTAL_DAYS + 1) * cw) / 2, dividerY);

  // ── P2V2C2 SECTION (top) ──
  for (let d = 0; d <= TOTAL_DAYS; d++) {
    const x = ml + d * cw;
    for (let r = 0; r < P2V2C2_ROWS; r++) {
      const visualRow = P2V2C2_ROWS - 1 - r;
      const y = p2Top + visualRow * ch;
      const dim = dimForRow(r);
      const col = DIM_COLORS[dim];
      const lit = state.grid[d][r];

      if (lit) {
        ctx.fillStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.45)`;
        ctx.fillRect(x, y, cw, ch);
      }

      ctx.strokeStyle = lit
        ? `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.3)`
        : 'rgba(148,163,184,0.04)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, cw, ch);
    }
  }

  // P2V2C2 dimension labels
  DIMS.forEach((dim, di) => {
    const col = DIM_COLORS[dim];
    const topVisualRow = P2V2C2_ROWS - 1 - (di * 5 + 4);
    const botVisualRow = P2V2C2_ROWS - 1 - (di * 5);
    const midY = p2Top + ((topVisualRow + botVisualRow) / 2) * ch + ch / 2;

    ctx.font = `bold ${11 * s}px Inter,sans-serif`;
    ctx.fillStyle = col.h + '99';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(DIM_LABELS[dim], ml - 6 * s, midY);

    if (di > 0) {
      const sepY = p2Top + topVisualRow * ch + ch * 5;
      ctx.beginPath();
      ctx.moveTo(ml, sepY);
      ctx.lineTo(ml + (TOTAL_DAYS + 1) * cw, sepY);
      ctx.strokeStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.12)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  });

  // ── DAP Milestone lines (span both sections) ──
  sortedMilestones.forEach(ms => {
    const x = ml + ms.day * cw;
    ctx.beginPath();
    ctx.moveTo(x, p2Top - 4 * s);
    ctx.lineTo(x, stageTop + STAGE_TOTAL_ROWS * ch + 4 * s);
    ctx.strokeStyle = 'rgba(52,211,153,0.30)';
    ctx.lineWidth = 2 * s;
    ctx.stroke();

    ctx.save();
    ctx.translate(x, p2Top - 10 * s);
    ctx.rotate(-Math.PI / 4);
    ctx.font = `bold ${8 * s}px Inter,sans-serif`;
    ctx.fillStyle = '#34d399';
    ctx.textAlign = 'left';
    ctx.fillText(ms.label, 0, 0);
    ctx.restore();
  });

  // ── Scoring event markers + stakeholder vines ──
  state.events.forEach((ev, i) => {
    const x = ml + ev.day * cw;

    // Event line spans both sections
    ctx.beginPath();
    ctx.moveTo(x, p2Top - 2 * s);
    ctx.lineTo(x, stageTop + STAGE_TOTAL_ROWS * ch + 2 * s);
    ctx.strokeStyle = 'rgba(96,165,250,0.2)';
    ctx.lineWidth = 2 * s;
    ctx.stroke();

    // Label below stage section
    ctx.font = `bold ${9 * s}px Inter,sans-serif`;
    ctx.fillStyle = 'rgba(96,165,250,0.6)';
    ctx.textAlign = 'center';
    ctx.fillText(`#${i+1} ${ev.label}`, x + cw / 2, stageTop + STAGE_TOTAL_ROWS * ch + 18 * s);

    // Stakeholder circles + vines
    const stakes = ev.stakeholders || [];
    const stakeSpacing = 14 * s;
    const stakeBaseY = stageTop + STAGE_TOTAL_ROWS * ch + 30 * s;

    stakes.forEach((stake, si) => {
      const cfg = ROLE_CONFIG[stake.role] || ROLE_CONFIG.OTHER;
      const stakeX = x + cw / 2;
      const stakeY = stakeBaseY + si * stakeSpacing;
      const r = cfg.r * s * 0.7;

      stake.dims.forEach(dim => {
        const di = DIMS.indexOf(dim);
        if (di < 0) return;
        const col = DIM_COLORS[dim];
        const topVisualRow = P2V2C2_ROWS - 1 - (di * 5 + 4);
        const botVisualRow = P2V2C2_ROWS - 1 - (di * 5);
        const targetY = p2Top + ((topVisualRow + botVisualRow) / 2) * ch + ch / 2;
        const targetX = x + cw / 2;

        const cpX1 = stakeX + (si % 2 === 0 ? -1 : 1) * 12 * s;
        const cpY1 = stakeY - (stakeY - targetY) * 0.3;
        const cpX2 = targetX + (si % 2 === 0 ? 1 : -1) * 8 * s;
        const cpY2 = targetY + (stakeY - targetY) * 0.15;

        ctx.beginPath();
        ctx.moveTo(stakeX, stakeY - r);
        ctx.bezierCurveTo(cpX1, cpY1, cpX2, cpY2, targetX, targetY);
        ctx.strokeStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.25)`;
        ctx.lineWidth = 1.5 * s;
        ctx.setLineDash(cfg.fill ? [] : [4 * s, 3 * s]);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.arc(targetX, targetY, 3 * s, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.5)`;
        ctx.fill();
      });

      ctx.beginPath();
      ctx.arc(stakeX, stakeY, r, 0, Math.PI * 2);
      if (cfg.fill) { ctx.fillStyle = cfg.color; ctx.fill(); }
      else { ctx.strokeStyle = cfg.color; ctx.lineWidth = 2 * s; ctx.setLineDash([3 * s, 2 * s]); ctx.stroke(); ctx.setLineDash([]); }

      ctx.font = `bold ${7 * s}px Inter,sans-serif`;
      ctx.fillStyle = cfg.color;
      ctx.textAlign = 'left';
      ctx.fillText(`${cfg.label}: ${stake.name}`, stakeX + r + 4 * s, stakeY + 2 * s);
    });
  });

  // Day labels at top
  for (let d = 0; d <= TOTAL_DAYS; d += 5) {
    const x = ml + d * cw + cw / 2;
    ctx.font = `${8 * s}px Inter,sans-serif`;
    ctx.fillStyle = 'rgba(148,163,184,0.2)';
    ctx.textAlign = 'center';
    ctx.fillText(`D${d}`, x, p2Top - 3 * s);
  }
}

function renderRadial(W, H) {
  const cxr = W / 2, cyr = H / 2;
  const maxR = Math.min(W, H) / 2 - 120;
  const centerR = 45;
  const totalAngle = Math.PI * 2;
  const startAngle = -Math.PI / 2;

  // Two rings: stage (inner) and P2V2C2 (outer)
  const gapBetweenRings = 18;
  const stageRingWidth = (maxR - centerR - gapBetweenRings) * 0.45;
  const stageInnerR = centerR;
  const stageOuterR = centerR + stageRingWidth;
  const p2InnerR = stageOuterR + gapBetweenRings;
  const p2OuterR = maxR;
  const p2UnitR = (p2OuterR - p2InnerR) / 30;

  const sortedMilestones = [...state.milestones].sort((a, b) => a.day - b.day);

  const rAt = (val) => p2InnerR + val * p2UnitR;
  const aAt = (day) => startAngle + (day / TOTAL_DAYS) * totalAngle;

  // Reference circles
  ctx.beginPath(); ctx.arc(cxr, cyr, stageInnerR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(148,163,184,0.05)'; ctx.lineWidth = 0.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cxr, cyr, stageOuterR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(148,163,184,0.05)'; ctx.lineWidth = 0.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cxr, cyr, p2InnerR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(148,163,184,0.04)'; ctx.lineWidth = 0.5; ctx.stroke();
  for (let sv = 0; sv <= 30; sv += 5) {
    const r = rAt(sv);
    ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(148,163,184,0.03)'; ctx.lineWidth = 0.5; ctx.stroke();
  }

  // DAP Milestone lines
  sortedMilestones.forEach(ms => {
    const a = aAt(ms.day);
    ctx.beginPath();
    ctx.moveTo(cxr + (centerR - 3) * Math.cos(a), cyr + (centerR - 3) * Math.sin(a));
    ctx.lineTo(cxr + (maxR + 8) * Math.cos(a), cyr + (maxR + 8) * Math.sin(a));
    ctx.strokeStyle = 'rgba(52,211,153,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const lr = maxR + 18;
    ctx.save();
    ctx.translate(cxr + lr * Math.cos(a), cyr + lr * Math.sin(a));
    let rot = a + Math.PI / 2;
    if (a > 0 && a < Math.PI) rot += Math.PI;
    ctx.rotate(rot);
    ctx.font = 'bold 9px Inter,sans-serif';
    ctx.fillStyle = '#34d399';
    ctx.textAlign = 'center';
    ctx.fillText(ms.label, 0, 0);
    ctx.restore();
  });

  // ── STAGE RING (inner) — static gauge, fills outward from center ──
  // Find current stage from the last active day
  let lastActiveDayForStage = 0;
  for (let d = TOTAL_DAYS; d >= 0; d--) {
    if (state.stageGrid[d].stage) { lastActiveDayForStage = d; break; }
  }
  const currentSg = stageForDay(lastActiveDayForStage);
  const currentStageIdx = currentSg.stage ? STAGES.indexOf(currentSg.stage) : -1;
  const stageUnitR = stageRingWidth / STAGE_TOTAL_ROWS;
  const litStageRows = currentStageIdx >= 0 ? (currentStageIdx + 1) * STAGE_ROWS : 0;

  // Draw all 30 rows as concentric rings (grid always visible)
  for (let r = 0; r < STAGE_TOTAL_ROWS; r++) {
    const ringInnerR = stageInnerR + r * stageUnitR;
    const ringOuterR = stageInnerR + (r + 1) * stageUnitR;
    const isLit = r < litStageRows;

    // Grid lines — always visible
    ctx.beginPath();
    ctx.arc(cxr, cyr, ringOuterR, 0, Math.PI * 2);
    ctx.strokeStyle = isLit ? 'rgba(148,163,184,0.08)' : 'rgba(148,163,184,0.03)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Each row's texture is determined by which zone it belongs to (not current stage)
    // Discover zone (rows 0-5) = level 0 (smooth), Qualify (6-11) = level 1, etc.
    const rowStageIdx = Math.floor(r / STAGE_ROWS);
    const texLevel = rowStageIdx;

    if (isLit) {
      // Fill the full ring
      ctx.beginPath();
      ctx.arc(cxr, cyr, ringInnerR, 0, Math.PI * 2);
      ctx.arc(cxr, cyr, ringOuterR, Math.PI * 2, 0, true);
      ctx.closePath();
      ctx.fillStyle = `rgba(148,163,184,${currentSg.alpha * 0.25})`;
      ctx.fill();

      // Texture overlay — each zone keeps its own complexity
      const segCount = 36;
      for (let seg = 0; seg < segCount; seg++) {
        const segA1 = (seg / segCount) * Math.PI * 2;
        const segA2 = ((seg + 1) / segCount) * Math.PI * 2;
        drawStageTextureRadial(ctx, cxr, cyr, ringInnerR, ringOuterR, segA1, segA2, texLevel, currentSg.alpha);
      }
    }
  }

  // Stage zone separators (radial lines at stage boundaries)
  for (let si = 1; si < STAGES.length; si++) {
    const boundaryR = stageInnerR + si * STAGE_ROWS * stageUnitR;
    ctx.beginPath();
    ctx.arc(cxr, cyr, boundaryR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(148,163,184,0.08)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Stage labels on the gauge (at 9 o'clock position)
  STAGES.forEach((stage, si) => {
    const midR = stageInnerR + (si * STAGE_ROWS + STAGE_ROWS / 2) * stageUnitR;
    const labelAngle = Math.PI; // 9 o'clock
    const lx = cxr + midR * Math.cos(labelAngle);
    const ly = cyr + midR * Math.sin(labelAngle);
    const isActive = si <= currentStageIdx;
    ctx.font = `bold 7px Inter,sans-serif`;
    ctx.fillStyle = isActive ? 'rgba(226,232,240,0.5)' : 'rgba(148,163,184,0.12)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(STAGE_LABELS[stage], lx, ly);
  });

  // ── P2V2C2 RING (outer) ──
  for (let d = 0; d <= TOTAL_DAYS; d++) {
    const a1 = aAt(d);
    const a2 = aAt(d + 1);
    const scores = scoresForDay(d);
    const total = totalForDay(d);
    if (total === 0) continue;

    let cumulBottom = 0;
    DIMS.forEach((dim) => {
      const col = DIM_COLORS[dim];
      const val = scores[dim] || 0;
      if (val === 0) return;

      const innerR = rAt(cumulBottom);
      const outerR = rAt(cumulBottom + val);

      ctx.beginPath();
      ctx.arc(cxr, cyr, innerR, a1, a2);
      ctx.arc(cxr, cyr, outerR, a2, a1, true);
      ctx.closePath();
      ctx.fillStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.35)`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.4)`;
      ctx.lineWidth = 0.3;
      ctx.stroke();

      cumulBottom += val;
    });
  }

  // ── STAKEHOLDER CIRCLES + VINES ──
  const stakeOrbitR = maxR + 50;
  const allStakes = getAllStakeholdersForRendering();
  const eventGroups = {};
  allStakes.forEach(s => {
    if (!eventGroups[s.eventIndex]) eventGroups[s.eventIndex] = [];
    eventGroups[s.eventIndex].push(s);
  });

  Object.entries(eventGroups).forEach(([eiStr, stakes]) => {
    const ei = +eiStr;
    const ev = state.events[ei];
    const eventAngle = aAt(ev.day);
    const spreadPerStake = 0.06;
    const groupOffset = -(stakes.length - 1) * spreadPerStake / 2;

    stakes.forEach((stake, si) => {
      const cfg = ROLE_CONFIG[stake.role] || ROLE_CONFIG.OTHER;
      const sAngle = eventAngle + groupOffset + si * spreadPerStake;
      const sx = cxr + stakeOrbitR * Math.cos(sAngle);
      const sy = cyr + stakeOrbitR * Math.sin(sAngle);
      const nodeR = cfg.r * 1.4;

      stake.dims.forEach(dim => {
        const di = DIMS.indexOf(dim);
        if (di < 0) return;
        const col = DIM_COLORS[dim];
        const scores = scoresForDay(ev.day);

        let cumulBelow = 0;
        for (let k = 0; k < di; k++) cumulBelow += (scores[DIMS[k]] || 0);
        const dimScore = scores[dim] || 0;
        const dimMidR = rAt(cumulBelow + dimScore / 2);
        const targetX = cxr + dimMidR * Math.cos(eventAngle);
        const targetY = cyr + dimMidR * Math.sin(eventAngle);

        const midR = (stakeOrbitR + dimMidR) / 2 * 0.7;
        const midAngle = (sAngle + eventAngle) / 2;
        const cpX = cxr + midR * Math.cos(midAngle);
        const cpY = cyr + midR * Math.sin(midAngle);

        const grad = ctx.createLinearGradient(sx, sy, targetX, targetY);
        grad.addColorStop(0, `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.15)`);
        grad.addColorStop(0.5, `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.35)`);
        grad.addColorStop(1, `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.5)`);

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo(cpX, cpY, targetX, targetY);
        ctx.strokeStyle = grad;
        ctx.lineWidth = cfg.fill ? 2.0 : 1.2;
        ctx.setLineDash(cfg.fill ? [] : [4, 3]);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.arc(targetX, targetY, 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.7)`;
        ctx.fill();
      });

      // Glow
      const glowGrad = ctx.createRadialGradient(sx, sy, nodeR * 0.5, sx, sy, nodeR * 2.5);
      glowGrad.addColorStop(0, cfg.color + '30');
      glowGrad.addColorStop(1, cfg.color + '00');
      ctx.beginPath(); ctx.arc(sx, sy, nodeR * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad; ctx.fill();

      ctx.beginPath();
      ctx.arc(sx, sy, nodeR, 0, Math.PI * 2);
      if (cfg.fill) {
        ctx.fillStyle = cfg.color; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
      } else {
        ctx.fillStyle = '#0f172a'; ctx.fill();
        ctx.strokeStyle = cfg.color; ctx.lineWidth = 2;
        ctx.setLineDash([3, 2]); ctx.stroke(); ctx.setLineDash([]);
      }

      ctx.font = `bold ${nodeR * 0.8}px Inter,sans-serif`;
      ctx.fillStyle = cfg.fill ? '#fff' : cfg.color;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(cfg.label, sx, sy);

      const labelR = stakeOrbitR + nodeR + 12;
      const lx = cxr + labelR * Math.cos(sAngle);
      const ly = cyr + labelR * Math.sin(sAngle);
      ctx.save();
      ctx.translate(lx, ly);
      let rot = sAngle + Math.PI / 2;
      if (sAngle > 0 && sAngle < Math.PI) rot += Math.PI;
      ctx.rotate(rot);
      ctx.font = '8px Inter,sans-serif';
      ctx.fillStyle = 'rgba(226,232,240,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText(stake.name, 0, 0);
      ctx.restore();
    });
  });

  // Scoring event markers
  state.events.forEach((ev) => {
    const a = aAt(ev.day);
    const markerR = centerR + 4;
    const mx = cxr + markerR * Math.cos(a);
    const my = cyr + markerR * Math.sin(a);
    ctx.beginPath(); ctx.arc(mx, my, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(96,165,250,0.6)'; ctx.fill();
  });

  // Center
  let lastActiveDay = 0;
  for (let d = TOTAL_DAYS; d >= 0; d--) {
    if (state.grid[d].some(v => v)) { lastActiveDay = d; break; }
  }
  const total = totalForDay(lastActiveDay);
  const sg = stageForDay(lastActiveDay);
  const hue = total >= 22 ? 142 : total >= 12 ? 45 : 220;
  const cg = ctx.createRadialGradient(cxr - 5, cyr - 6, centerR * 0.1, cxr, cyr, centerR);
  cg.addColorStop(0, `hsla(${hue},40%,60%,0.85)`);
  cg.addColorStop(0.6, `hsla(${hue},30%,30%,0.7)`);
  cg.addColorStop(1, `hsla(${hue},20%,15%,0.5)`);
  ctx.beginPath(); ctx.arc(cxr, cyr, centerR, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = `hsla(${hue},30%,50%,0.2)`; ctx.lineWidth = 1; ctx.stroke();

  ctx.font = 'bold 24px Inter,sans-serif'; ctx.fillStyle = '#f8fafc';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(total, cxr, cyr - 8);
  ctx.font = '10px Inter,sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.5)';
  ctx.fillText('/30', cxr, cyr + 6);
  if (sg.stage) {
    ctx.font = 'bold 9px Inter,sans-serif';
    ctx.fillStyle = 'rgba(148,163,184,0.4)';
    ctx.fillText(STAGE_LABELS[sg.stage].toUpperCase(), cxr, cyr + 18);
  }
}

// ═══════════════════════════════════════════════════════
// CLICK HANDLING — toggle P2V2C2 grid cells
// ═══════════════════════════════════════════════════════
let isDragging = false;
let dragValue = null;

function getCellFromMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left);
  const sy = (e.clientY - rect.top);

  const day = Math.floor((sx - MARGIN.left) / CELL_W);
  const visualRow = Math.floor((sy - MARGIN.top) / CELL_H);
  const row = P2V2C2_ROWS - 1 - visualRow;

  if (day < 0 || day > TOTAL_DAYS || row < 0 || row >= P2V2C2_ROWS) return null;
  return { day, row };
}

canvas.addEventListener('mousedown', (e) => {
  if (state.mode !== 'flat') return;
  const cell = getCellFromMouse(e);
  if (!cell) return;
  isDragging = true;
  dragValue = !state.grid[cell.day][cell.row];
  state.grid[cell.day][cell.row] = dragValue;
  render();
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging || state.mode !== 'flat') return;
  const cell = getCellFromMouse(e);
  if (!cell) return;
  state.grid[cell.day][cell.row] = dragValue;
  render();
});

canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; });

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildLegend();
buildMilestoneUI();
buildEventUI();
sizeCanvas();
render();
window.addEventListener('resize', () => { sizeCanvas(); render(); });
</script>
</body>
</html>
