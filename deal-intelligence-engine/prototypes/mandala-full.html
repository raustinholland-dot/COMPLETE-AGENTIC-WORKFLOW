    { scored_at:'2026-01-15', stage:'qualify', pain:3, power:3, vision:3, value:3, change:3, control:3, total:18, pe_sponsor:3, trend:'improving', delta:6, activity:6, days_in_stage:1, dap:{exists:true,agreed:true,milestones:5,total:14,gap:false}, stakeholders:[{role:'C',confirmed:true,position:'champion'},{role:'PES',confirmed:false,position:'es'}] },
    { scored_at:'2026-02-01', stage:'prove', pain:4, power:4, vision:4, value:4, change:4, control:4, total:24, pe_sponsor:4, trend:'improving', delta:6, activity:8, days_in_stage:1, dap:{exists:true,agreed:true,milestones:9,total:14,gap:false}, stakeholders:[{role:'C',confirmed:true,position:'champion'},{role:'ES',confirmed:true,position:'es'},{role:'DM',confirmed:true,position:'dm'}] },
    { scored_at:'2026-02-15', stage:'negotiate', pain:5, power:5, vision:5, value:5, change:4, control:4, total:28, pe_sponsor:5, trend:'improving', delta:4, activity:7, days_in_stage:1, dap:{exists:true,agreed:true,milestones:12,total:14,gap:false}, stakeholders:[{role:'C',confirmed:true,position:'champion'},{role:'ES',confirmed:true,position:'es'},{role:'DM',confirmed:true,position:'dm'}] },

// ============================================================
//  CONSTANTS
// ============================================================
const STAGE_COLORS = {
  discover: '#cbd5e1', qualify: '#a5b4fc', prove: '#6366f1',
  negotiate: '#4338ca', close: '#ca8a04'
};

const DIM_NAMES = ['Pain', 'Power', 'Vision', 'Value', 'Change', 'Control'];
const DIM_KEYS  = ['pain', 'power', 'vision', 'value', 'change', 'control'];
const DIM_LABELS = ['P', 'Pw', 'V', 'Va', 'Ch', 'Co'];

const STAKEHOLDER_ANGLES = { champion: 30, es: 90, dm: 210 }; // degrees from top

const STAGE_THRESHOLDS = { discover: 30, qualify: 45, prove: 60, negotiate: 30, close: 999 };

function scoreColor(s) {
  if (s <= 1) return '#b91c1c';
  if (s === 2) return '#f59e0b';
  if (s === 3) return '#eab308';
  if (s === 4) return '#22c55e';
  return '#15803d';
}

function activityOpacity(a) {
  if (a <= 1) return 0.5;
  if (a <= 4) return 0.75;
  return 1.0;
}

function degToRad(d) { return d * Math.PI / 180; }

// ============================================================
//  MANDALA RENDERER
// ============================================================
class MandalaRenderer {
  constructor(canvas, deal, scale) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.deal = deal;
    this.scale = scale || 1;
    this.cx = canvas.width / 2;
    this.cy = canvas.height / 2;
    this.time = 0;

    // Radii (scaled)
    this.rCenter = 28 * scale;
    this.rHalo = 33 * scale;
    this.rHaloWidth = 3.5 * scale;
    this.rArmsStart = 38 * scale;
    this.rArmsEnd = 140 * scale;
    this.rBoundaryBase = 150 * scale;
    this.rSatellite = 160 * scale;

    // Hit-test geometry cache (populated during draw)
    this.hitZones = [];
  }

  latest() {
    return this.deal.scoring_runs[this.deal.scoring_runs.length - 1];
  }

  draw(timestamp) {
    this.time = timestamp || 0;
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.hitZones = [];

    this.drawArms();
    this.drawBoundary();
    this.drawPESponsorHalo();
    this.drawCenterCircle();
    this.drawStakeholderDots();
    this.drawLabels();
  }

  // ---- Zone 1: Center Circle ----
  drawCenterCircle() {
    const ctx = this.ctx;
    const latest = this.latest();
    const stageColor = STAGE_COLORS[latest.stage] || '#cbd5e1';

    ctx.save();

    // Trend animation on border
    if (latest.trend === 'improving') {
      // Rotating bright arc
      const angle = (this.time / 2000) * Math.PI * 2;
      const grad = ctx.createConicGradient(angle, this.cx, this.cy);
      grad.addColorStop(0, 'rgba(99,102,241,0.9)');
      grad.addColorStop(0.15, 'rgba(167,139,250,0.7)');
      grad.addColorStop(0.3, 'rgba(99,102,241,0.1)');
      grad.addColorStop(1, 'rgba(99,102,241,0.1)');
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, this.rCenter + 3 * this.scale, 0, Math.PI * 2);
      ctx.lineWidth = 3 * this.scale;
      ctx.strokeStyle = grad;
      ctx.stroke();
    } else if (latest.trend === 'declining') {
      // Pulsing red glow
      const pulse = (Math.sin(this.time / 750 * Math.PI) + 1) / 2;
      ctx.shadowColor = '#ef4444';
      ctx.shadowBlur = 8 + pulse * 12;
    } else {
      // Stable: static white border
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, this.rCenter + 1.5 * this.scale, 0, Math.PI * 2);
      ctx.lineWidth = 2 * this.scale;
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.stroke();
    }

    // Fill circle
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.rCenter, 0, Math.PI * 2);
    ctx.fillStyle = stageColor;
    ctx.fill();

    if (latest.trend === 'declining') {
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, this.rCenter, 0, Math.PI * 2);
      ctx.lineWidth = 2 * this.scale;
      ctx.strokeStyle = '#ef4444';
      ctx.stroke();
    }

    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';

    // Total score text
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.round(18 * this.scale)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(latest.total, this.cx, this.cy);
    ctx.restore();

    // Hit zone
    this.hitZones.push({
      type: 'center',
      test: (x, y) => Math.hypot(x - this.cx, y - this.cy) <= this.rCenter,
      data: { stage: latest.stage, total: latest.total, deal_value: this.deal.deal_value_usd, close_date: this.deal.close_date, cas: latest.stage }
    });
  }

  // ---- Zone 2: PE Sponsor Halo ----
  drawPESponsorHalo() {
    const ctx = this.ctx;
    const latest = this.latest();
    const score = latest.pe_sponsor;
    if (score === 0) return;

    const r = this.rHalo;
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, r, 0, Math.PI * 2);

    if (score <= 2) {
      ctx.setLineDash([4 * this.scale, 4 * this.scale]);
      ctx.lineWidth = 3 * this.scale;
      ctx.strokeStyle = '#b91c1c';
    } else if (score === 3) {
      ctx.setLineDash([]);
      ctx.lineWidth = 3 * this.scale;
      ctx.strokeStyle = '#f59e0b';
    } else {
      ctx.setLineDash([]);
      ctx.lineWidth = 4 * this.scale;
      ctx.strokeStyle = '#15803d';
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // ---- Zone 3: Radial Arms ----
  drawArms() {
    const ctx = this.ctx;
    const runs = this.deal.scoring_runs;
    const numRuns = runs.length;
    const radialSpace = this.rArmsEnd - this.rArmsStart;
    const ringWidth = Math.max(3 * this.scale, Math.min(12 * this.scale, radialSpace / numRuns));

    for (let dimIdx = 0; dimIdx < 6; dimIdx++) {
      const armAngle = -90 + dimIdx * 60; // degrees, -90 = top (12 o'clock)

      for (let runIdx = 0; runIdx < numRuns; runIdx++) {
        const run = runs[runIdx];
        const dimKey = DIM_KEYS[dimIdx];
        const score = run[dimKey];
        const isLast = runIdx === numRuns - 1;

        // Radial position
        const rInner = this.rArmsStart + runIdx * ringWidth;
        const rOuter = rInner + ringWidth;

        // Angular width based on score (5 to 55 degrees)
        const angularWidth = 5 + (score / 5) * 50;
        const startAngle = degToRad(armAngle - angularWidth / 2);
        const endAngle = degToRad(armAngle + angularWidth / 2);

        ctx.save();
        ctx.globalAlpha = activityOpacity(run.activity);

        // Draw annular sector
        ctx.beginPath();
        ctx.arc(this.cx, this.cy, rOuter, startAngle, endAngle);
        ctx.arc(this.cx, this.cy, rInner, endAngle, startAngle, true);
        ctx.closePath();
        ctx.fillStyle = scoreColor(score);
        ctx.fill();

        // Thin border between segments
        ctx.globalAlpha = 1;
        ctx.lineWidth = 0.5 * this.scale;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.stroke();

        // Outermost ring special treatment (delta glow/border)
        if (isLast && runIdx > 0) {
          const prevRun = runs[runIdx - 1];
          const scoreDelta = score - prevRun[dimKey];

          if (scoreDelta >= 4) {
            // Green outer glow
            ctx.save();
            ctx.shadowColor = '#22c55e';
            ctx.shadowBlur = 10 * this.scale;
            ctx.beginPath();
            ctx.arc(this.cx, this.cy, rOuter, startAngle, endAngle);
            ctx.arc(this.cx, this.cy, rInner, endAngle, startAngle, true);
            ctx.closePath();
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2 * this.scale;
            ctx.stroke();
            ctx.restore();
          } else if (scoreDelta >= 1) {
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 1.5 * this.scale;
            ctx.stroke();
          } else if (scoreDelta <= -4) {
            ctx.save();
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 10 * this.scale;
            ctx.beginPath();
            ctx.arc(this.cx, this.cy, rOuter, startAngle, endAngle);
            ctx.arc(this.cx, this.cy, rInner, endAngle, startAngle, true);
            ctx.closePath();
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2 * this.scale;
            ctx.stroke();
            ctx.restore();
          } else if (scoreDelta <= -1) {
            ctx.strokeStyle = '#f59e0b';
            ctx.lineWidth = 1.5 * this.scale;
            ctx.stroke();
          }
        }

        ctx.restore();

        // Hit zone for this segment
        this.hitZones.push({
          type: 'segment',
          test: (x, y) => {
            const dx = x - this.cx;
            const dy = y - this.cy;
            const dist = Math.hypot(dx, dy);
            if (dist < rInner || dist > rOuter) return false;
            let angle = Math.atan2(dy, dx);
            return angle >= startAngle && angle <= endAngle;
          },
          data: {
            dim: DIM_NAMES[dimIdx],
            score: score,
            date: run.scored_at,
            delta: isLast && runIdx > 0 ? score - runs[runIdx-1][dimKey] : 0,
            activity: run.activity
          }
        });
      }
    }
  }

  // ---- Zone 4: Outer Boundary ----
  drawBoundary() {
    const ctx = this.ctx;
    const latest = this.latest();
    const dap = latest.dap;
    const stage = latest.stage;
    const dis = latest.days_in_stage;

    // Days-in-stage compression
    const threshold = STAGE_THRESHOLDS[stage] || 60;
    const normalGap = 10 * this.scale;
    const minGap = 2 * this.scale;
    const compressionRatio = Math.min(1, dis / threshold);
    const gap = normalGap - compressionRatio * (normalGap - minGap);
    const boundaryR = this.rArmsEnd + gap;

    // Color and style
    let color, width, dashed;
    if (!dap.exists) {
      color = '#cbd5e1'; width = 1 * this.scale; dashed = true;
    } else if (!dap.agreed) {
      color = '#b45309'; width = 2 * this.scale; dashed = false;
    } else {
      color = '#15803d'; width = 2.5 * this.scale; dashed = false;
    }

    // 14-day gap flash
    if (dap.gap) {
      const flash = Math.sin(this.time / 400 * Math.PI) > 0;
      color = flash ? color : '#ef4444';
    }

    const progress = dap.total > 0 ? dap.milestones / dap.total : 0;
    const solidEnd = -Math.PI / 2 + progress * Math.PI * 2;
    const fullEnd = -Math.PI / 2 + Math.PI * 2;

    ctx.save();

    // Solid portion (milestones complete)
    if (progress > 0) {
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, boundaryR, -Math.PI / 2, solidEnd);
      ctx.lineWidth = width;
      ctx.strokeStyle = color;
      ctx.setLineDash([]);
      ctx.stroke();
    }

    // Dashed remainder
    if (progress < 1) {
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, boundaryR, progress > 0 ? solidEnd : -Math.PI / 2, fullEnd);
      ctx.lineWidth = width;
      ctx.strokeStyle = dashed ? color : 'rgba(255,255,255,0.15)';
      ctx.setLineDash([4 * this.scale, 4 * this.scale]);
      ctx.stroke();
    }

    ctx.setLineDash([]);
    ctx.restore();

    // Store boundary radius for satellite positioning
    this.actualBoundaryR = boundaryR;

    // Hit zone
    this.hitZones.push({
      type: 'boundary',
      test: (x, y) => {
        const d = Math.hypot(x - this.cx, y - this.cy);
        return d >= boundaryR - 6 * this.scale && d <= boundaryR + 6 * this.scale;
      },
      data: {
        dap_exists: dap.exists, dap_agreed: dap.agreed,
        milestones: dap.milestones, total: dap.total, gap: dap.gap,
        days_in_stage: dis, stage: stage
      }
    });
  }

  // ---- Zone 5: Stakeholder Dots ----
  drawStakeholderDots() {
    const ctx = this.ctx;
    const latest = this.latest();
    const satR = (this.actualBoundaryR || this.rBoundaryBase) + 12 * this.scale;
    const dotR = 3.5 * this.scale;

    const positions = { champion: 30, es: 90, dm: 210 };

    for (const [posKey, angleDeg] of Object.entries(positions)) {
      const stakeholder = latest.stakeholders.find(s => s.position === posKey);
      const angle = degToRad(angleDeg - 90); // offset to canvas coords (top = -90)
      const dx = this.cx + Math.cos(angle) * satR;
      const dy = this.cy + Math.sin(angle) * satR;

      if (!stakeholder) continue;

      ctx.save();
      ctx.beginPath();
      ctx.arc(dx, dy, dotR, 0, Math.PI * 2);

      if (stakeholder.confirmed) {
        ctx.fillStyle = '#15803d';
        ctx.fill();
      } else {
        ctx.lineWidth = 1.5 * this.scale;
        ctx.strokeStyle = '#f59e0b';
        ctx.stroke();
      }
      ctx.restore();

      // Hit zone
      this.hitZones.push({
        type: 'stakeholder',
        test: (x, y) => Math.hypot(x - dx, y - dy) <= dotR + 4 * this.scale,
        data: { role: stakeholder.role, confirmed: stakeholder.confirmed, position: posKey }
      });
    }
  }

  // ---- Dimension Labels ----
  drawLabels() {
    const ctx = this.ctx;
    const labelR = this.rArmsEnd + 2 * this.scale;

    ctx.save();
    ctx.font = `${Math.round(9 * this.scale)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (let i = 0; i < 6; i++) {
      const angle = degToRad(-90 + i * 60);
      const lx = this.cx + Math.cos(angle) * labelR;
      const ly = this.cy + Math.sin(angle) * labelR;
      ctx.fillText(DIM_LABELS[i], lx, ly);
    }
    ctx.restore();
  }

  // ---- Hit Testing ----
  hitTest(x, y) {
    // Iterate in reverse so topmost drawn elements are checked first
    for (let i = this.hitZones.length - 1; i >= 0; i--) {
      if (this.hitZones[i].test(x, y)) return this.hitZones[i];
    }
    return null;
  }
}

// ============================================================
//  ANIMATION LOOP
// ============================================================
const mainCanvas = document.getElementById('mainCanvas');
const idealCanvas = document.getElementById('idealCanvas');
const mainRenderer = new MandalaRenderer(mainCanvas, SAMPLE_DEAL, 1);
const idealRenderer = new MandalaRenderer(idealCanvas, IDEAL_DEAL, 0.5);

function animate(ts) {
  mainRenderer.draw(ts);
  idealRenderer.draw(ts);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ============================================================
//  TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');

mainCanvas.addEventListener('mousemove', (e) => {
  const rect = mainCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const hit = mainRenderer.hitTest(x, y);

  if (hit) {
    let html = '';
    const d = hit.data;
    switch (hit.type) {
      case 'center':
        html = `<strong>Deal Stage:</strong> ${d.stage}<br>
                <strong>P2V2C2 Total:</strong> ${d.total}/30<br>
                <strong>Deal Value:</strong> $${(d.deal_value||0).toLocaleString()}<br>
                <strong>Close Date:</strong> ${d.close_date}`;
        break;
      case 'segment':
        html = `<strong>${d.dim}</strong><br>
                Score: ${d.score}/5<br>
                Date: ${d.date}<br>
                Delta: ${d.delta >= 0 ? '+' : ''}${d.delta}<br>
                Docs: ${d.activity}`;
        break;
      case 'stakeholder':
        const roleNames = { C:'Champion', PC:'Potential Champion', ES:'Executive Sponsor', PES:'Potential Exec Sponsor', DM:'Decision Maker', UDM:'Unconfirmed Decision Maker' };
        html = `<strong>${roleNames[d.role] || d.role}</strong><br>
                Status: ${d.confirmed ? 'Confirmed' : 'Potential'}`;
        break;
      case 'boundary':
        html = `<strong>DAP Status</strong><br>
                Exists: ${d.dap_exists ? 'Yes' : 'No'}<br>
                Agreed: ${d.dap_agreed ? 'Yes' : 'No'}<br>
                Milestones: ${d.milestones}/${d.total}<br>
                14-day Gap: ${d.gap ? 'YES' : 'No'}<br>
                Days in ${d.stage}: ${d.days_in_stage}`;
        break;
    }
    tooltip.innerHTML = html;
    tooltip.classList.add('visible');
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    tooltip.classList.remove('visible');
  }
});

mainCanvas.addEventListener('mouseleave', () => {
  tooltip.classList.remove('visible');
});

// ============================================================
//  TIMELINE PANEL
// ============================================================
(function buildTimeline() {
  const panel = document.getElementById('timelinePanel');
  const stageBg = { discover:'#334155', qualify:'#3730a3', prove:'#4338ca', negotiate:'#312e81', close:'#854d0e' };
  const runs = SAMPLE_DEAL.scoring_runs;

  for (let i = runs.length - 1; i >= 0; i--) {
    const r = runs[i];
    const trendClass = r.delta > 0 ? 'trend-up' : r.delta < 0 ? 'trend-down' : 'trend-flat';
    const trendSymbol = r.delta > 0 ? '+' + r.delta : r.delta;
    const div = document.createElement('div');
    div.className = 'timeline-entry';
    div.innerHTML = `
      <span class="date">${r.scored_at}</span>
      <span class="stage-badge" style="background:${stageBg[r.stage] || '#334155'}; color:#e2e8f0;">${r.stage}</span>
      <div class="scores">
        P:${r.pain} Pw:${r.power} V:${r.vision} Va:${r.value} Ch:${r.change} Co:${r.control}
      </div>
      <div>
        <span class="total">${r.total}/30</span>
        <span class="${trendClass}" style="margin-left:8px;">${r.trend} (${trendSymbol})</span>
        &middot; PES: ${r.pe_sponsor} &middot; Docs: ${r.activity}
      </div>
      <div class="scores">DAP: ${r.dap.milestones}/${r.dap.total} ${r.dap.gap ? '<span style="color:#ef4444;">GAP</span>' : ''} ${r.dap.agreed ? '<span style="color:#15803d;">Agreed</span>' : ''}</div>
    `;
    panel.appendChild(div);
  }
})();

  const items = [

      title: 'Zone 1: Center Circle',
      desc: 'Fill color = deal stage (slate to gold). Number = P2V2C2 total (0-30). Border animates: clockwise spin (improving), static white (stable), red pulse (declining).'
    },
    {
      swatch: '<div style="width:28px;height:28px;border-radius:50%;border:3px solid #15803d;"></div>',
      title: 'Zone 2: PE Sponsor Halo',
      desc: 'Ring around center. None = 0, dashed red = 1-2, solid amber = 3, solid green = 4-5.'
    },
    {
      swatch: '<div style="width:28px;height:28px;border-radius:4px;background:linear-gradient(135deg,#b91c1c 0%,#f59e0b 25%,#eab308 50%,#22c55e 75%,#15803d 100%);"></div>',
      title: 'Zone 3: Radial Arms (x6)',
      desc: 'Pain/Power/Vision/Value/Change/Control. Stacked rings = scoring history (inner=oldest). Width = score, color = red-to-green, opacity = doc activity.'
    },
    {
      swatch: '<div style="width:28px;height:28px;border-radius:50%;border:2.5px solid #15803d;border-right:2.5px dashed rgba(255,255,255,0.2);"></div>',
      title: 'Zone 4: DAP Boundary',
      desc: 'Outer ring encodes Dual Action Plan. Style: dashed (none), amber (exists), green (agreed). Solid arc = milestone progress. Flashes red on 14-day gap. Gap compresses as deal stalls.'
    },
    {
      swatch: '<div style="display:flex;gap:4px;align-items:center;"><div style="width:10px;height:10px;border-radius:50%;background:#15803d;"></div><div style="width:10px;height:10px;border-radius:50%;border:2px solid #f59e0b;"></div></div>',

})();
