<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Deal — Playground</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#08080f; color:#e2e8f0;
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    display:flex; height:100vh; overflow:hidden;
  }

  /* ── LEFT: Controls ── */
  .controls {
    width:340px; min-width:340px; background:#0c0c18;
    border-right:1px solid #1e293b; overflow-y:auto;
    padding:20px 16px; display:flex; flex-direction:column; gap:16px;
  }
  .controls h1 { font-size:16px; font-weight:800; color:#f8fafc; letter-spacing:-0.3px; }
  .controls h2 {
    font-size:11px; font-weight:700; color:#64748b;
    text-transform:uppercase; letter-spacing:0.5px;
    margin-top:8px; padding-bottom:6px;
    border-bottom:1px solid #1e293b;
  }
  .ctrl-row { display:flex; align-items:center; gap:8px; }
  .ctrl-row label { font-size:11px; color:#94a3b8; min-width:90px; flex-shrink:0; }
  .ctrl-row input[type=range] { flex:1; accent-color:#6366f1; height:4px; }
  .ctrl-row .val { font-size:11px; font-weight:700; color:#cbd5e1; min-width:28px; text-align:right; }
  .ctrl-row select {
    flex:1; background:#1e293b; border:1px solid #334155;
    color:#e2e8f0; font-size:11px; padding:4px 6px; border-radius:4px;
    font-family:inherit;
  }

  .dim-controls { display:flex; flex-direction:column; gap:4px; }
  .dim-row { display:flex; align-items:center; gap:6px; }
  .dim-row .dim-name { font-size:10px; font-weight:700; min-width:52px; }
  .dim-row input[type=range] { flex:1; height:3px; }
  .dim-row .val { font-size:10px; font-weight:600; color:#94a3b8; min-width:16px; text-align:right; }

  .score-curve-row { display:flex; align-items:center; gap:4px; margin-bottom:2px; }
  .score-curve-row .dim-name { font-size:10px; font-weight:700; min-width:52px; }
  .curve-slots { display:flex; gap:2px; flex:1; }
  .curve-slot {
    width:18px; height:22px; background:#1e293b; border:1px solid #334155;
    border-radius:3px; font-size:9px; font-weight:700; color:#94a3b8;
    text-align:center; line-height:22px; cursor:pointer; user-select:none;
    transition:background 0.1s;
  }
  .curve-slot:hover { background:#334155; }

  .stake-row { display:flex; align-items:center; gap:6px; font-size:10px; }
  .stake-row .name { color:#cbd5e1; font-weight:600; flex:1; }
  .stake-row select { width:50px; background:#1e293b; border:1px solid #334155;
    color:#e2e8f0; font-size:9px; padding:2px; border-radius:3px; font-family:inherit; }
  .stake-row .remove { color:#475569; cursor:pointer; font-size:14px; }
  .stake-row .remove:hover { color:#ef4444; }

  .btn {
    padding:6px 12px; font-size:11px; font-weight:700; font-family:inherit;
    border:1px solid #334155; border-radius:6px; cursor:pointer;
    background:#1e293b; color:#e2e8f0; transition:background 0.15s;
  }
  .btn:hover { background:#334155; }
  .btn-accent { background:#4f46e5; border-color:#6366f1; color:#fff; }
  .btn-accent:hover { background:#6366f1; }
  .btn-export { background:#0f172a; border-color:#22c55e; color:#22c55e; }
  .btn-export:hover { background:#14532d; color:#fff; }
  .export-output {
    margin-top:6px; padding:8px; font-size:9px; font-family:'SF Mono',monospace;
    background:#0a0a14; border:1px solid #1e293b; border-radius:6px;
    color:#94a3b8; max-height:120px; overflow-y:auto; word-break:break-all;
    display:none; line-height:1.4; user-select:all; cursor:text;
  }
  .export-output.visible { display:block; }
  .copied-flash { color:#22c55e !important; transition:color 0.3s; }
  .btn-row { display:flex; gap:6px; flex-wrap:wrap; }

  .presets { display:flex; flex-wrap:wrap; gap:4px; }
  .preset-btn {
    padding:4px 8px; font-size:10px; font-weight:600; font-family:inherit;
    background:#1e293b; border:1px solid #334155; border-radius:4px;
    color:#94a3b8; cursor:pointer; transition:all 0.12s;
  }
  .preset-btn:hover { background:#334155; color:#e2e8f0; }
  .preset-btn.active { background:#4f46e5; border-color:#6366f1; color:#fff; }

  /* ── RIGHT: Canvas ── */
  .viz-area {
    flex:1; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .viz-area canvas { border-radius:14px; cursor:grab; }
  .viz-area canvas:active { cursor:grabbing; }
  .tt {
    position:absolute; pointer-events:none; opacity:0;
    background:rgba(8,8,15,0.96); border:1px solid #1e293b;
    border-radius:10px; padding:12px 16px; font-size:11px;
    color:#cbd5e1; max-width:280px; transition:opacity 0.12s;
    z-index:10; line-height:1.6; backdrop-filter:blur(12px);
  }
  .tt.visible { opacity:1; }
  .tt strong { color:#f8fafc; }
</style>
</head>
<body>

<div class="controls" id="controls">
  <h1>Living Deal Playground</h1>
  <p style="font-size:10px;color:#475569;line-height:1.5;">Twist the dials. Watch it change in real time.</p>

  <h2>Presets</h2>
  <div class="presets" id="presets"></div>

  <h2>Deal Shape</h2>
  <div class="ctrl-row">
    <label>Total Inputs</label>
    <input type="range" id="numInputs" min="3" max="200" value="40">
    <span class="val" id="numInputsVal">40</span>
  </div>
  <div class="ctrl-row">
    <label>Time Span (days)</label>
    <input type="range" id="timeSpan" min="7" max="365" value="60">
    <span class="val" id="timeSpanVal">60</span>
  </div>
  <div class="ctrl-row">
    <label>Deal Value ($K)</label>
    <input type="range" id="dealValue" min="25" max="2000" value="200" step="25">
    <span class="val" id="dealValueVal">200</span>
  </div>
  <div class="ctrl-row">
    <label>PE Sponsor</label>
    <input type="range" id="peSponsor" min="0" max="5" value="2">
    <span class="val" id="peSponsorVal">2</span>
  </div>
  <div class="ctrl-row">
    <label>DAP Progress</label>
    <input type="range" id="dapProgress" min="0" max="14" value="5">
    <span class="val" id="dapProgressVal">5</span>
  </div>
  <div class="ctrl-row">
    <label>Gap Variance</label>
    <input type="range" id="gapVariance" min="0" max="100" value="40">
    <span class="val" id="gapVarianceVal">40</span>
  </div>
  <div class="ctrl-row">
    <label>Bar Height Scale</label>
    <input type="range" id="barHeightScale" min="20" max="200" value="100">
    <span class="val" id="barHeightScaleVal">100</span>
  </div>

  <h2>Dimension Weights (input distribution)</h2>
  <div class="dim-controls" id="dimWeights"></div>

  <h2>Score Curves (click to cycle 0-5)</h2>
  <p style="font-size:9px;color:#334155;margin-bottom:4px;">Left=start of deal, Right=end of deal</p>
  <div id="scoreCurves"></div>

  <h2>Stakeholders</h2>
  <div id="stakeList"></div>
  <div class="btn-row" style="margin-top:6px;">
    <button class="btn" id="addStake">+ Add</button>
  </div>

  <h2>Share State</h2>
  <div class="btn-row">
    <button class="btn btn-export" id="exportBtn">Copy Settings JSON</button>
    <button class="btn" id="importBtn">Import JSON</button>
  </div>
  <div class="export-output" id="exportOutput"></div>
  <input type="file" id="importFile" accept=".json" style="display:none;">

  <h2>Visual Tuning</h2>
  <div class="ctrl-row">
    <label>Gap Dimming</label>
    <input type="range" id="gapDimming" min="0" max="100" value="60">
    <span class="val" id="gapDimmingVal">60</span>
  </div>
  <div class="ctrl-row">
    <label>Texture Intensity</label>
    <input type="range" id="textureIntensity" min="0" max="100" value="50">
    <span class="val" id="textureIntensityVal">50</span>
  </div>
  <div class="ctrl-row">
    <label>Connection Alpha</label>
    <input type="range" id="connAlpha" min="0" max="100" value="30">
    <span class="val" id="connAlphaVal">30</span>
  </div>
  <div class="ctrl-row">
    <label>Intricacy Scale</label>
    <input type="range" id="intricacyScale" min="0" max="100" value="50">
    <span class="val" id="intricacyScaleVal">50</span>
  </div>
  <div class="ctrl-row">
    <label>Glow Intensity</label>
    <input type="range" id="glowIntensity" min="0" max="100" value="40">
    <span class="val" id="glowIntensityVal">40</span>
  </div>
</div>

<div class="viz-area">
  <canvas id="mainCanvas" width="1400" height="1400"></canvas>
  <div id="tooltip" class="tt"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const DIMS = ['pain','power','vision','value','change','control'];
const DIM_LABELS = ['Pain','Power','Vision','Value','Change','Control'];
const DIM_COLORS = {
  pain:   {rgb:[239,68,68],  h:'#ef4444'},
  power:  {rgb:[59,130,246], h:'#3b82f6'},
  vision: {rgb:[139,92,246], h:'#8b5cf6'},
  value:  {rgb:[245,158,11], h:'#f59e0b'},
  change: {rgb:[34,197,94],  h:'#22c55e'},
  control:{rgb:[6,182,212],  h:'#06b6d4'}
};
const DOC_TYPES = ['email','call','document','meeting'];
const ROLES = ['PC','C','PES','ES','UDM','DM','OTHER'];
const ROLE_WEIGHT = {DM:1,ES:0.8,C:0.7,PES:0.5,UDM:0.45,PC:0.3,OTHER:0.2};
const ROLE_STYLE = {
  PC:   {color:'#94a3b8',r:10, fill:false,dash:[5,5]},
  C:    {color:'#818cf8',r:16, fill:true, dash:[]},
  PES:  {color:'#fbbf24',r:12, fill:false,dash:[5,5]},
  ES:   {color:'#ca8a04',r:18, fill:true, dash:[]},
  UDM:  {color:'#94a3b8',r:13, fill:false,dash:[5,5]},
  DM:   {color:'#22c55e',r:24, fill:true, dash:[]},
  OTHER:{color:'#475569',r:8,  fill:false,dash:[4,5]}
};

function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {
  numInputs: 40,
  timeSpan: 60,
  dealValue: 200,
  peSponsor: 2,
  dapProgress: 5,
  gapVariance: 40,
  barHeightScale: 100,
  gapDimming: 60,
  textureIntensity: 50,
  connAlpha: 30,
  intricacyScale: 50,
  glowIntensity: 40,
  dimWeights: { pain:5, power:2, vision:4, value:3, change:2, control:3 },
  scoreCurves: {
    pain:   [1,2,3,3,4],
    power:  [0,1,1,2,2],
    vision: [1,2,3,3,4],
    value:  [0,1,2,3,3],
    change: [0,1,2,2,3],
    control:[0,1,2,2,3]
  },
  stakeholders: [
    { name:'Champion', role:'C', dims:['pain','vision','value','control','change'] },
    { name:'Exec Sponsor', role:'PES', dims:['power','value','change'] },
    { name:'Decision Maker', role:'UDM', dims:['power'] }
  ],
  seed: 42
};

// ═══════════════════════════════════════════════════════
// PRESETS
// ═══════════════════════════════════════════════════════
const PRESETS = {
  'Fresh Lead': {
    numInputs:8, timeSpan:14, dealValue:75, peSponsor:0, dapProgress:0, gapVariance:30,
    dimWeights:{pain:3,power:1,vision:2,value:1,change:0,control:1},
    scoreCurves:{pain:[0,1,2],power:[0,0,1],vision:[0,1,1],value:[0,0,1],change:[0,0,0],control:[0,0,1]},
    stakeholders:[{name:'IT Contact',role:'PC',dims:['pain','vision']}]
  },
  'Mid-Cycle': {
    numInputs:47, timeSpan:56, dealValue:285, peSponsor:3, dapProgress:7, gapVariance:45,
    dimWeights:{pain:5,power:2,vision:4,value:3,change:2,control:3},
    scoreCurves:{pain:[1,2,3,3,2,3,4],power:[0,1,1,2,1,2,2],vision:[1,2,3,3,2,3,4],value:[0,1,2,2,2,3,3],change:[0,1,2,2,1,2,3],control:[0,1,2,2,2,3,3]},
    stakeholders:[
      {name:'Sarah Chen',role:'C',dims:['pain','vision','value','control','change']},
      {name:'Mike Torres',role:'PES',dims:['power','value','change']},
      {name:'Board Chair',role:'UDM',dims:['power']}
    ]
  },
  'Mature Enterprise': {
    numInputs:140, timeSpan:180, dealValue:1200, peSponsor:5, dapProgress:12, gapVariance:50,
    dimWeights:{pain:5,power:4,vision:5,value:5,change:4,control:4},
    scoreCurves:{pain:[1,2,3,4,5,5],power:[0,1,2,3,3,4],vision:[1,2,3,4,5,5],value:[0,1,2,3,4,5],change:[0,1,2,3,4,5],control:[0,1,2,3,4,5]},
    stakeholders:[
      {name:'James Wright',role:'C',dims:['pain','vision','value','control','change']},
      {name:'Dr. Patel',role:'ES',dims:['power','value','change','vision']},
      {name:'CFO Office',role:'DM',dims:['power','value']},
      {name:'Compliance',role:'OTHER',dims:['control','change']},
      {name:'Legal',role:'OTHER',dims:['control','value']},
      {name:'IT Security',role:'OTHER',dims:['control','vision']}
    ]
  },
  'Stalled Deal': {
    numInputs:25, timeSpan:120, dealValue:180, peSponsor:1, dapProgress:3, gapVariance:80,
    dimWeights:{pain:4,power:1,vision:3,value:1,change:1,control:2},
    scoreCurves:{pain:[1,2,3,3,2,2],power:[0,1,1,1,1,1],vision:[1,2,2,3,2,2],value:[0,1,1,1,1,1],change:[0,1,1,1,0,0],control:[0,1,2,2,2,2]},
    stakeholders:[
      {name:'Contact',role:'PC',dims:['pain','vision']},
      {name:'Exec',role:'PES',dims:['power']}
    ]
  },
  'Pain-Heavy': {
    numInputs:60, timeSpan:45, dealValue:350, peSponsor:2, dapProgress:4, gapVariance:30,
    dimWeights:{pain:10,power:1,vision:3,value:2,change:1,control:1},
    scoreCurves:{pain:[2,3,4,4,5],power:[0,0,1,1,1],vision:[1,2,2,3,3],value:[0,1,1,2,2],change:[0,0,1,1,2],control:[0,1,1,1,2]},
    stakeholders:[
      {name:'CISO',role:'C',dims:['pain','vision','control']},
      {name:'CEO',role:'PES',dims:['power','pain']}
    ]
  },
  'Balanced Close': {
    numInputs:100, timeSpan:90, dealValue:500, peSponsor:5, dapProgress:13, gapVariance:25,
    dimWeights:{pain:4,power:4,vision:4,value:4,change:4,control:4},
    scoreCurves:{pain:[2,3,4,5,5],power:[1,2,3,4,5],vision:[2,3,4,5,5],value:[1,2,3,4,5],change:[1,2,3,4,5],control:[1,2,3,4,5]},
    stakeholders:[
      {name:'Champion',role:'C',dims:['pain','vision','value','change','control']},
      {name:'Exec Sponsor',role:'ES',dims:['power','value','change']},
      {name:'Decision Maker',role:'DM',dims:['power','value']},
      {name:'Legal',role:'OTHER',dims:['control']}
    ]
  },
  'Minimum Viable': {
    numInputs:3, timeSpan:7, dealValue:25, peSponsor:0, dapProgress:0, gapVariance:20,
    dimWeights:{pain:1,power:0,vision:1,value:0,change:0,control:0},
    scoreCurves:{pain:[0,1],power:[0,0],vision:[0,1],value:[0,0],change:[0,0],control:[0,0]},
    stakeholders:[]
  }
};

// ═══════════════════════════════════════════════════════
// UI SETUP
// ═══════════════════════════════════════════════════════
function buildUI() {
  // Presets
  const presetsEl = document.getElementById('presets');
  presetsEl.innerHTML = '';
  Object.keys(PRESETS).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = name;
    btn.onclick = () => applyPreset(name);
    presetsEl.appendChild(btn);
  });

  // Dim weights
  const dwEl = document.getElementById('dimWeights');
  dwEl.innerHTML = '';
  DIMS.forEach(dim => {
    const row = document.createElement('div');
    row.className = 'dim-row';
    const col = DIM_COLORS[dim];
    row.innerHTML = `
      <span class="dim-name" style="color:${col.h}">${dim[0].toUpperCase()+dim.slice(1)}</span>
      <input type="range" min="0" max="10" value="${state.dimWeights[dim]}" data-dim="${dim}" class="dw-slider" style="accent-color:${col.h}">
      <span class="val dw-val" data-dim="${dim}">${state.dimWeights[dim]}</span>`;
    dwEl.appendChild(row);
  });
  dwEl.querySelectorAll('.dw-slider').forEach(sl => {
    sl.oninput = () => {
      const d = sl.dataset.dim;
      state.dimWeights[d] = +sl.value;
      dwEl.querySelector(`.dw-val[data-dim="${d}"]`).textContent = sl.value;
      rebuild();
    };
  });

  // Score curves
  const scEl = document.getElementById('scoreCurves');
  scEl.innerHTML = '';
  DIMS.forEach(dim => {
    const row = document.createElement('div');
    row.className = 'score-curve-row';
    const col = DIM_COLORS[dim];
    const curve = state.scoreCurves[dim];
    let slotsHTML = '';
    curve.forEach((v, i) => {
      const intensity = v / 5;
      slotsHTML += `<div class="curve-slot" data-dim="${dim}" data-idx="${i}"
        style="background:rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},${0.1+intensity*0.6});
        color:${intensity > 0.4 ? '#fff' : col.h}">${v}</div>`;
    });
    row.innerHTML = `<span class="dim-name" style="color:${col.h}">${dim[0].toUpperCase()+dim.slice(1)}</span>
      <div class="curve-slots">${slotsHTML}</div>
      <button class="btn" style="font-size:9px;padding:2px 6px;" data-dim="${dim}" data-action="add">+</button>
      <button class="btn" style="font-size:9px;padding:2px 6px;" data-dim="${dim}" data-action="remove">-</button>`;
    scEl.appendChild(row);
  });
  scEl.querySelectorAll('.curve-slot').forEach(slot => {
    slot.onclick = () => {
      const d = slot.dataset.dim, i = +slot.dataset.idx;
      state.scoreCurves[d][i] = (state.scoreCurves[d][i] + 1) % 6;
      buildUI(); rebuild();
    };
  });
  scEl.querySelectorAll('.btn[data-action="add"]').forEach(btn => {
    btn.onclick = () => {
      const d = btn.dataset.dim;
      const last = state.scoreCurves[d][state.scoreCurves[d].length - 1] || 0;
      state.scoreCurves[d].push(Math.min(last + 1, 5));
      buildUI(); rebuild();
    };
  });
  scEl.querySelectorAll('.btn[data-action="remove"]').forEach(btn => {
    btn.onclick = () => {
      const d = btn.dataset.dim;
      if (state.scoreCurves[d].length > 1) state.scoreCurves[d].pop();
      buildUI(); rebuild();
    };
  });

  // Stakeholders
  buildStakeUI();
}

function buildStakeUI() {
  const el = document.getElementById('stakeList');
  el.innerHTML = '';
  state.stakeholders.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'stake-row';
    row.style.marginBottom = '4px';
    row.innerHTML = `
      <span class="name">${s.name}</span>
      <select class="stake-role" data-idx="${i}">
        ${ROLES.map(r => `<option value="${r}" ${r===s.role?'selected':''}>${r}</option>`).join('')}
      </select>
      <span class="remove" data-idx="${i}">&times;</span>`;
    el.appendChild(row);
    // Dim checkboxes
    const dimRow = document.createElement('div');
    dimRow.style.cssText = 'display:flex;gap:3px;margin:2px 0 6px 0;flex-wrap:wrap;';
    DIMS.forEach(d => {
      const checked = s.dims.includes(d);
      const col = DIM_COLORS[d];
      const chip = document.createElement('span');
      chip.style.cssText = `font-size:8px;padding:2px 5px;border-radius:3px;cursor:pointer;
        background:${checked ? `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.3)` : '#1e293b'};
        color:${checked ? col.h : '#475569'};border:1px solid ${checked ? col.h+'66' : '#334155'};`;
      chip.textContent = d[0].toUpperCase() + d.slice(1, 3);
      chip.onclick = () => {
        if (s.dims.includes(d)) s.dims = s.dims.filter(x => x !== d);
        else s.dims.push(d);
        buildStakeUI(); rebuild();
      };
      dimRow.appendChild(chip);
    });
    el.appendChild(dimRow);
  });
  el.querySelectorAll('.stake-role').forEach(sel => {
    sel.onchange = () => { state.stakeholders[+sel.dataset.idx].role = sel.value; rebuild(); };
  });
  el.querySelectorAll('.remove').forEach(btn => {
    btn.onclick = () => { state.stakeholders.splice(+btn.dataset.idx, 1); buildStakeUI(); rebuild(); };
  });
}

document.getElementById('addStake').onclick = () => {
  const names = ['Contact','Analyst','VP','Director','CFO','CTO','CISO','Board','Legal','Compliance','Procurement','IT Lead'];
  const name = names[state.stakeholders.length % names.length];
  state.stakeholders.push({ name, role:'PC', dims:['pain'] });
  buildStakeUI(); rebuild();
};

// Wire up sliders
['numInputs','timeSpan','dealValue','peSponsor','dapProgress','gapVariance','barHeightScale',
 'gapDimming','textureIntensity','connAlpha','intricacyScale','glowIntensity'].forEach(id => {
  const sl = document.getElementById(id);
  const valEl = document.getElementById(id + 'Val');
  sl.oninput = () => {
    state[id] = +sl.value;
    valEl.textContent = sl.value;
    rebuild();
  };
});

function applyPreset(name) {
  const p = PRESETS[name];
  Object.assign(state, {
    numInputs: p.numInputs, timeSpan: p.timeSpan, dealValue: p.dealValue,
    peSponsor: p.peSponsor, dapProgress: p.dapProgress, gapVariance: p.gapVariance || 40,
    dimWeights: {...p.dimWeights},
    scoreCurves: Object.fromEntries(DIMS.map(d => [d, [...(p.scoreCurves[d] || [0])]])),
    stakeholders: p.stakeholders.map(s => ({...s, dims:[...s.dims]}))
  });
  state.seed = Math.floor(Math.random() * 10000);
  // Sync sliders
  ['numInputs','timeSpan','dealValue','peSponsor','dapProgress','gapVariance'].forEach(id => {
    const sl = document.getElementById(id);
    if (sl) { sl.value = state[id]; document.getElementById(id+'Val').textContent = state[id]; }
  });
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
  buildUI(); rebuild();
}

// ═══════════════════════════════════════════════════════
// DATA GENERATION
// ═══════════════════════════════════════════════════════
function generateDeal() {
  const rng = seededRng(state.seed);
  const inputs = [];
  const weights = {...state.dimWeights};
  let totalW = 0;
  DIMS.forEach(d => totalW += weights[d]);
  if (totalW === 0) { DIMS.forEach(d => { weights[d] = 1; totalW += 1; }); }
  DIMS.forEach(d => weights[d] /= totalW);

  let currentDay = 0;
  const dayStep = state.timeSpan / Math.max(state.numInputs, 1);
  const gapFactor = state.gapVariance / 50;

  for (let i = 0; i < state.numInputs; i++) {
    let r = rng(), cumul = 0, dim = DIMS[0];
    for (const d of DIMS) { cumul += weights[d]; if (r < cumul) { dim = d; break; } }

    const typeR = rng();
    const docType = typeR < 0.42 ? 'email' : typeR < 0.68 ? 'call' : typeR < 0.86 ? 'document' : 'meeting';

    const gapVar = 0.2 + rng() * (1.8 + gapFactor * 3);
    currentDay += dayStep * gapVar;

    const t = state.numInputs <= 1 ? 0 : i / (state.numInputs - 1);
    const curve = state.scoreCurves[dim];
    const ci = t * (curve.length - 1);
    const lo = Math.floor(ci), hi = Math.min(lo + 1, curve.length - 1);
    const frac = ci - lo;
    const score = Math.round(curve[lo] * (1 - frac) + curve[hi] * frac);

    let stakeIdx = -1;
    if (state.stakeholders.length > 0 && rng() < 0.72) {
      const rel = state.stakeholders.filter(s => s.dims.includes(dim));
      const pool = rel.length > 0 ? rel : state.stakeholders;
      const chosen = pool[Math.floor(rng() * pool.length)];
      stakeIdx = state.stakeholders.indexOf(chosen);
    }

    const subRefs = Math.floor(t * 3.5 * rng() + 0.3);

    // Depth: how much of this dimension was discussed in this input
    // Calls/meetings have more depth. Emails less. Random variance.
    const typeDepthBase = docType === 'call' ? 0.6 : docType === 'meeting' ? 0.7 : docType === 'document' ? 0.4 : 0.25;
    const depth = typeDepthBase + rng() * 0.5 + (score / 5) * 0.3;

    inputs.push({
      id: i, dim, docType,
      day: Math.round(currentDay),
      scoreInt: score,
      stakeholderIdx: stakeIdx,
      stakeholderName: stakeIdx >= 0 ? state.stakeholders[stakeIdx].name : null,
      subRefs,
      depth: Math.min(depth, 1.5)
    });
  }

  // Compute total from latest scores per dim
  const lastScores = {};
  DIMS.forEach(d => {
    const dimInps = inputs.filter(inp => inp.dim === d);
    lastScores[d] = dimInps.length > 0 ? dimInps[dimInps.length - 1].scoreInt : 0;
  });
  const total = DIMS.reduce((s, d) => s + lastScores[d], 0);

  return {
    name: 'Live Preview',
    value: state.dealValue * 1000,
    stage: total >= 22 ? 'Close' : total >= 16 ? 'Negotiate' : total >= 10 ? 'Prove' : total >= 5 ? 'Qualify' : 'Discover',
    total,
    pe_sponsor: state.peSponsor,
    dap: { exists: state.dapProgress > 0, agreed: state.dapProgress >= 5, progress: state.dapProgress, total: 14 },
    stakeholders: state.stakeholders.map(s => ({...s, activity: Math.floor(10 + Math.random() * 20)})),
    inputs
  };
}

// ═══════════════════════════════════════════════════════
// RENDERER (same as v2 but with tuning knobs)
// ═══════════════════════════════════════════════════════
let currentDeal = null;
let currentBars = [];
let currentStakeNodes = [];
let hovered = null;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const ttEl = document.getElementById('tooltip');
const W = 1400, H = 1400, cx = 700, cy = 700;

// Force canvas display to a square — use available height
function sizeCanvas() {
  const h = window.innerHeight;
  canvas.style.width = h + 'px';
  canvas.style.height = h + 'px';
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

// ── Zoom & Pan ──
let zoomLevel = 1.8;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;

// World-space mouse position helper
function screenToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const canvasX = (clientX - rect.left) * (W / rect.width);
  const canvasY = (clientY - rect.top) * (H / rect.height);
  const offX = W/2 - (cx + panX) * zoomLevel;
  const offY = H/2 - (cy + panY) * zoomLevel;
  return { x: (canvasX - offX) / zoomLevel, y: (canvasY - offY) / zoomLevel, cx: canvasX, cy: canvasY };
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  // Get the world point under the mouse BEFORE zoom changes
  const w = screenToWorld(e.clientX, e.clientY);
  const oldZoom = zoomLevel;
  // Gentle zoom — 3% per tick, very controllable
  const factor = e.deltaY > 0 ? 0.97 : 1.03;
  zoomLevel = Math.max(0.2, Math.min(zoomLevel * factor, 30));
  // Pin that world point under the mouse AFTER zoom changes
  panX = w.x - cx - (w.cx - W/2) / zoomLevel;
  panY = w.y - cy - (w.cy - H/2) / zoomLevel;
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartPanX = panX;
    panStartPanY = panY;
  }
});
canvas.addEventListener('mousemove', e => {
  if (isPanning) {
    const rect = canvas.getBoundingClientRect();
    // Convert pixel drag to world-space units
    const scale = W / (rect.width * zoomLevel);
    panX = panStartPanX - (e.clientX - panStartX) * scale;
    panY = panStartPanY - (e.clientY - panStartY) * scale;
  }
});
canvas.addEventListener('mouseup', () => { isPanning = false; });
canvas.addEventListener('mouseleave', () => { isPanning = false; });

// Double-click to reset zoom
canvas.addEventListener('dblclick', () => { zoomLevel = 1.8; panX = 0; panY = 0; });

function rebuild() {
  currentDeal = generateDeal();
  const deal = currentDeal;

  // Center is the dominant visual — large, fixed, the "ball" you see first
  const centerR = 90;
  const peHaloR = centerR + (deal.pe_sponsor > 0 ? 6 + deal.pe_sponsor * 2.4 : 0);
  const innerBarR = peHaloR + 12; // tight gap — bars hug the center
  const heightScale = state.barHeightScale / 100;

  // ── HELIX SPOKE MODEL ──
  // Each day is a spoke. All spokes originate from 12 o'clock (-PI/2).
  // As days progress, each spoke rotates slightly clockwise (angular step per day).
  // The BASE RADIUS of each spoke grows outward based on cumulative P2V2C2 growth.
  // Progressing deals spiral outward like a helix. Stalled deals stay flat.

  const allDays = deal.inputs.map(i => i.day);
  const maxDay = Math.max(...allDays, 1);
  const numSpokes = Math.max(maxDay, state.timeSpan);

  // Angular step per day — how much the spoke rotates per day
  // One full revolution per ~30 days, so you can see the twist
  const angularStepPerDay = (Math.PI * 2) / 30;

  // Group inputs by day
  const spokeInputs = {};
  deal.inputs.forEach(inp => {
    const day = inp.day;
    if (!spokeInputs[day]) spokeInputs[day] = [];
    spokeInputs[day].push(inp);
  });

  // Compute cumulative score growth per day for radial expansion
  // Sort inputs by day, track running average score
  const sortedInputs = [...deal.inputs].sort((a, b) => a.day - b.day);
  const cumulativeScore = {}; // day → cumulative score factor
  let runningSum = 0;
  let runningCount = 0;
  sortedInputs.forEach(inp => {
    runningSum += inp.scoreInt;
    runningCount++;
    cumulativeScore[inp.day] = runningSum / runningCount; // average score so far (0-5)
  });

  // For days with no inputs, interpolate from nearest known
  const knownDays = Object.keys(cumulativeScore).map(Number).sort((a,b) => a-b);

  function getCumulativeAt(day) {
    if (cumulativeScore[day] !== undefined) return cumulativeScore[day];
    if (knownDays.length === 0) return 0;
    // Find nearest known day before this one
    let prev = 0;
    for (const kd of knownDays) {
      if (kd <= day) prev = cumulativeScore[kd];
      else break;
    }
    return prev;
  }

  // Build spoke positions — angle and base radius for each day
  const spokePositions = []; // day → { angle, baseR }
  const radiusGrowthPerScore = 8; // how much radius grows per avg score point
  for (let d = 0; d <= numSpokes; d++) {
    const angle = -Math.PI / 2 + d * angularStepPerDay;
    const cumScore = getCumulativeAt(d);
    // Base radius grows outward with cumulative score
    // Even day 0 starts at innerBarR; growth stacks on top
    const baseR = innerBarR + cumScore * radiusGrowthPerScore;
    spokePositions[d] = { angle, baseR };
  }

  // Angular width per spoke (based on angular density)
  const spokeAngle = angularStepPerDay;

  // Build bars
  const bars = [];
  let globalMaxOuterR = innerBarR;

  // Dim counts for glow
  const dimCounts = {};
  const dimTotalDepth = {};
  DIMS.forEach(d => {
    const dimInps = deal.inputs.filter(i => i.dim === d);
    dimCounts[d] = dimInps.length;
    dimTotalDepth[d] = dimInps.reduce((s, inp) => s + (inp.depth || 0.5), 0);
  });

  Object.keys(spokeInputs).forEach(dayStr => {
    const day = parseInt(dayStr);
    const inputs = spokeInputs[day];
    const sp = spokePositions[day] || spokePositions[numSpokes];

    const spokeCenter = sp.angle;
    const halfSpoke = spokeAngle * 0.35;

    // Stack inputs radially from this spoke's base radius
    let currentR = sp.baseR;

    inputs.forEach((inp, ii) => {
      const depthFactor = inp.depth || 0.5;
      const scoreFactor = Math.max(inp.scoreInt / 5, 0.1);
      const di = DIMS.indexOf(inp.dim);

      const barHeight = Math.max(4, (8 + depthFactor * 20 + scoreFactor * 15) * heightScale);

      const innerR = currentR;
      const outerR = currentR + barHeight;
      currentR = outerR + 1.5;

      let widthMul = 1;
      if (inp.docType === 'email') widthMul = 0.5;
      else if (inp.docType === 'call') widthMul = 0.85;
      else if (inp.docType === 'meeting') widthMul = 1.2;

      const barHalfWidth = halfSpoke * widthMul;

      if (outerR > globalMaxOuterR) globalMaxOuterR = outerR;

      bars.push({
        inp, dim: inp.dim, di, idx: ii, day,
        innerR, outerR,
        aStart: spokeCenter - barHalfWidth,
        aEnd: spokeCenter + barHalfWidth,
        aInnerStart: spokeCenter - barHalfWidth,
        aInnerEnd: spokeCenter + barHalfWidth,
        aOuterStart: spokeCenter - barHalfWidth,
        aOuterEnd: spokeCenter + barHalfWidth,
        spokeCenter,
        delta: 0,
        intricacy: inp.subRefs,
        gapAlphaPenalty: 0,
        gapDays: 0,
        depthFactor,
        isNewStakeholder: false
      });
    });
  });

  // Store spoke metadata for rendering
  const spokeData = { numSpokes, spokeAngle, maxDay, spokePositions, angularStepPerDay };

  // DAP ring floats just beyond actual bar extent — compact, not distant
  const dapR = Math.max(globalMaxOuterR + 30, innerBarR + 80);

  // Stakeholder ring hugs close — not a distant orbit
  const stakeRingR = Math.max(globalMaxOuterR + 70, dapR + 28);

  // Stakeholders
  const stakeNodes = [];
  if (deal.stakeholders.length) {
    const totalW = deal.stakeholders.reduce((s, st) => s + (ROLE_WEIGHT[st.role]||0.2), 0);
    let a = -Math.PI / 2;
    deal.stakeholders.forEach((s, i) => {
      const w = ROLE_WEIGHT[s.role] || 0.2;
      const span = (w / totalW) * Math.PI * 2;
      const mid = a + span / 2;
      a += span;
      const cfg = ROLE_STYLE[s.role] || ROLE_STYLE.OTHER;
      stakeNodes.push({ s, cfg, angle: mid, i,
        x: cx + stakeRingR * Math.cos(mid),
        y: cy + stakeRingR * Math.sin(mid) });
    });
  }

  currentBars = bars;
  currentStakeNodes = stakeNodes;

  currentDeal._layout = {
    centerR, peHaloR, innerBarR,
    maxBarR: globalMaxOuterR,
    dapR, stakeRingR, dimCounts, dimTotalDepth, spokeData
  };
}

function render(time) {
  ctx.clearRect(0, 0, W, H);
  if (!currentDeal) return;

  // Apply zoom & pan — center of canvas stays centered
  ctx.save();
  const offsetX = W/2 - (cx + panX) * zoomLevel;
  const offsetY = H/2 - (cy + panY) * zoomLevel;
  ctx.setTransform(zoomLevel, 0, 0, zoomLevel, offsetX, offsetY);

  const deal = currentDeal;
  const L = deal._layout;
  const t = time / 1000;
  const bars = currentBars;

  // ── Helix spoke lines (one per day, spiraling outward) ──
  const spoke = L.spokeData;
  const gridMax = Math.max(L.maxBarR, L.dapR);
  const sp = spoke.spokePositions;

  // Draw the spiral backbone — connect each day's base point to the next
  ctx.beginPath();
  for (let d = 0; d <= spoke.numSpokes; d++) {
    const pos = sp[d];
    if (!pos) continue;
    const px = cx + pos.baseR * Math.cos(pos.angle);
    const py = cy + pos.baseR * Math.sin(pos.angle);
    if (d === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = 'rgba(148,163,184,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Draw individual spoke lines from center outward at each day's angle
  for (let d = 0; d <= spoke.numSpokes; d++) {
    const pos = sp[d];
    if (!pos) continue;
    const a = pos.angle;
    const isWeek = d > 0 && d % 7 === 0;
    const isMonth = d > 0 && d % 30 === 0;
    // Spoke extends from innerBarR to beyond the bar area
    const outerExtent = Math.max(pos.baseR + 40, gridMax + 8);
    ctx.beginPath();
    ctx.moveTo(cx + L.innerBarR * Math.cos(a), cy + L.innerBarR * Math.sin(a));
    ctx.lineTo(cx + outerExtent * Math.cos(a), cy + outerExtent * Math.sin(a));
    ctx.strokeStyle = isMonth ? 'rgba(148,163,184,0.12)' : isWeek ? 'rgba(148,163,184,0.06)' : 'rgba(148,163,184,0.015)';
    ctx.lineWidth = isMonth ? 1.2 : isWeek ? 0.8 : 0.3;
    ctx.stroke();
  }

  // ── Concentric grid rings (reference circles) ──
  for (let i = 0; i <= 4; i++) {
    const r = L.innerBarR + (gridMax - L.innerBarR) * (i / 4);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(148,163,184,${i === 0 ? 0.04 : 0.012})`;
    ctx.lineWidth = 0.5; ctx.stroke();
  }

  // ── Bars ──
  const hovDim = hovered?.type === 'dim' ? hovered.dim : null;
  const hovStake = hovered?.type === 'stake' ? hovered.idx : null;
  const hovBar = hovered?.type === 'bar' ? hovered.barIdx : null;
  const texMul = state.textureIntensity / 100;
  const intricMul = state.intricacyScale / 100;

  bars.forEach((bar, bi) => {
    const col = DIM_COLORS[bar.dim];
    const inp = bar.inp;

    let alpha = 0.6 + (inp.scoreInt / 5) * 0.4;
    alpha -= bar.gapAlphaPenalty; // long gaps dim the bar
    alpha = Math.max(alpha, 0.15);

    const isLit = bar.dim === hovDim || (hovStake !== null && inp.stakeholderIdx === hovStake) || bi === hovBar;
    const isDimmed = (hovDim || hovStake !== null || hovBar !== null) && !isLit;
    if (isDimmed) alpha = 0.03;
    else if (isLit) alpha = Math.min(alpha + 0.25, 1);

    ctx.save();
    ctx.globalAlpha = alpha;

    // ── Asymmetric trapezoid bar shape ──
    // Inner edge width can differ from outer edge width
    const iS = bar.aInnerStart, iE = bar.aInnerEnd;
    const oS = bar.aOuterStart, oE = bar.aOuterEnd;

    ctx.beginPath();
    // Inner arc (from inner-start to inner-end)
    ctx.arc(cx, cy, bar.innerR, iS, iE);
    // Right side: connect inner-end to outer-end
    ctx.lineTo(cx + bar.outerR * Math.cos(oE), cy + bar.outerR * Math.sin(oE));
    // Outer arc (from outer-end back to outer-start)
    ctx.arc(cx, cy, bar.outerR, oE, oS, true);
    // Left side: connect outer-start back to inner-start
    ctx.lineTo(cx + bar.innerR * Math.cos(iS), cy + bar.innerR * Math.sin(iS));
    ctx.closePath();

    // New stakeholder scallop: notch on outer edge
    if (bar.isNewStakeholder && !isDimmed) {
      const notchA = (oS + oE) / 2;
      const notchR = bar.outerR - (bar.outerR - bar.innerR) * 0.25;
      // Draw a small cutout
      ctx.moveTo(cx + notchR * Math.cos(notchA - 0.01), cy + notchR * Math.sin(notchA - 0.01));
      ctx.arc(cx, cy, notchR, notchA - 0.015, notchA + 0.015);
    }

    // Gradient fill
    const midA = (iS + iE + oS + oE) / 4;
    const gx1 = cx + bar.innerR * Math.cos(midA), gy1 = cy + bar.innerR * Math.sin(midA);
    const gx2 = cx + bar.outerR * Math.cos(midA), gy2 = cy + bar.outerR * Math.sin(midA);
    const grad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);

    // Score level affects fill intensity: low scores are wispier
    const fillBase = 0.15 + (inp.scoreInt / 5) * 0.35;
    const fillTip = 0.4 + (inp.scoreInt / 5) * 0.55;
    grad.addColorStop(0, `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},${fillBase})`);
    grad.addColorStop(1, `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},${fillTip})`);
    ctx.fillStyle = grad;
    ctx.fill();

    // Texture overlay
    if (texMul > 0) {
      ctx.save();
      ctx.clip();
      const texAlpha = 0.06 * texMul;
      // Approximate bar bounds for texturing
      const bCenterX = cx + ((bar.innerR + bar.outerR) / 2) * Math.cos(midA);
      const bCenterY = cy + ((bar.innerR + bar.outerR) / 2) * Math.sin(midA);
      const ext = bar.outerR - bar.innerR + 20;

      if (inp.docType === 'email') {
        ctx.strokeStyle = `rgba(255,255,255,${texAlpha})`;
        ctx.lineWidth = 0.5;
        for (let d = -ext; d < ext; d += 3.5) {
          ctx.beginPath();
          ctx.moveTo(bCenterX - ext + d, bCenterY - ext);
          ctx.lineTo(bCenterX + ext + d, bCenterY + ext);
          ctx.stroke();
        }
      } else if (inp.docType === 'call') {
        ctx.strokeStyle = `rgba(255,255,255,${texAlpha * 1.2})`;
        ctx.lineWidth = 0.6;
        for (let d = -ext; d < ext; d += 3) {
          ctx.beginPath();
          ctx.moveTo(bCenterX - ext, bCenterY + d);
          ctx.lineTo(bCenterX + ext, bCenterY + d);
          ctx.stroke();
        }
      } else if (inp.docType === 'meeting') {
        ctx.fillStyle = `rgba(255,255,255,${texAlpha * 1.3})`;
        for (let dy = -ext; dy < ext; dy += 4.5) {
          for (let dx = -ext; dx < ext; dx += 4.5) {
            ctx.beginPath();
            ctx.arc(bCenterX + dx, bCenterY + dy, 0.6, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
      ctx.restore();
    }

    // Intricacy notches
    if (bar.intricacy > 0 && intricMul > 0) {
      const depth = bar.outerR - bar.innerR;
      if (depth > 4) {
        const numNotches = Math.min(Math.round(bar.intricacy * intricMul), 5);
        ctx.strokeStyle = `rgba(0,0,0,${0.15 + intricMul * 0.15})`;
        ctx.lineWidth = 0.6;
        for (let n = 0; n < numNotches; n++) {
          const nt = (n + 1) / (numNotches + 1);
          const nr = bar.innerR + nt * depth;
          ctx.beginPath();
          ctx.arc(cx, cy, nr, bar.aStart + 0.003, bar.aEnd - 0.003);
          ctx.stroke();
        }
      }
    }

    // Delta highlights on outer edge (asymmetric)
    if (!isDimmed) {
      if (bar.delta >= 2) {
        ctx.beginPath(); ctx.arc(cx, cy, bar.outerR, bar.aOuterStart, bar.aOuterEnd);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2.5; ctx.stroke();
      } else if (bar.delta >= 1) {
        ctx.beginPath(); ctx.arc(cx, cy, bar.outerR, bar.aOuterStart, bar.aOuterEnd);
        ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
      } else if (bar.delta <= -2) {
        // Big drop: red edge + the bar is already tapered
        ctx.beginPath(); ctx.arc(cx, cy, bar.outerR, bar.aOuterStart, bar.aOuterEnd);
        ctx.strokeStyle = 'rgba(239,68,68,0.35)'; ctx.lineWidth = 2; ctx.stroke();
      } else if (bar.delta <= -1) {
        ctx.beginPath(); ctx.arc(cx, cy, bar.outerR, bar.aOuterStart, bar.aOuterEnd);
        ctx.strokeStyle = 'rgba(239,68,68,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();
      }
    }

    // Border — use asymmetric shape
    ctx.beginPath();
    ctx.arc(cx, cy, bar.innerR, bar.aInnerStart, bar.aInnerEnd);
    ctx.lineTo(cx + bar.outerR * Math.cos(bar.aOuterEnd), cy + bar.outerR * Math.sin(bar.aOuterEnd));
    ctx.arc(cx, cy, bar.outerR, bar.aOuterEnd, bar.aOuterStart, true);
    ctx.lineTo(cx + bar.innerR * Math.cos(bar.aInnerStart), cy + bar.innerR * Math.sin(bar.aInnerStart));
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 0.4; ctx.stroke();

    ctx.restore();
  });

  // ── DAP ──
  const dap = deal.dap;
  if (dap.exists) {
    const progress = dap.progress / dap.total;
    const endA = -Math.PI / 2 + Math.PI * 2 * progress;
    ctx.beginPath(); ctx.arc(cx, cy, L.dapR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(71,85,105,0.05)'; ctx.lineWidth = 2;
    ctx.setLineDash(dap.agreed ? [] : [4,6]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx, cy, L.dapR, -Math.PI / 2, endA);
    ctx.strokeStyle = dap.agreed ? 'rgba(34,197,94,0.4)' : 'rgba(245,158,11,0.35)';
    ctx.lineWidth = 3; ctx.setLineDash([]); ctx.stroke();
    for (let i = 0; i < dap.progress; i++) {
      const ta = -Math.PI / 2 + (i / dap.total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx + (L.dapR-4)*Math.cos(ta), cy + (L.dapR-4)*Math.sin(ta));
      ctx.lineTo(cx + (L.dapR+4)*Math.cos(ta), cy + (L.dapR+4)*Math.sin(ta));
      ctx.strokeStyle = dap.agreed ? 'rgba(34,197,94,0.25)' : 'rgba(245,158,11,0.2)';
      ctx.lineWidth = 1; ctx.stroke();
    }
  } else {
    ctx.beginPath(); ctx.arc(cx, cy, L.dapR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(71,85,105,0.06)'; ctx.lineWidth = 1;
    ctx.setLineDash([6,10]); ctx.stroke(); ctx.setLineDash([]);
  }

  // ── Stakeholder connections ──
  const connMul = state.connAlpha / 100;
  currentStakeNodes.forEach((sn, si) => {
    const relBars = bars.filter(b => b.inp.stakeholderIdx === si);
    relBars.forEach(bar => {
      const col = DIM_COLORS[bar.dim];
      const midA = (bar.aStart + bar.aEnd) / 2;
      const targetR = (bar.innerR + bar.outerR) / 2;
      const tx = cx + targetR * Math.cos(midA), ty = cy + targetR * Math.sin(midA);

      const isLit = si === hovStake || bar.dim === hovDim || bars.indexOf(bar) === hovBar;
      const isDimmed = (hovStake !== null || hovDim || hovBar !== null) && !isLit;

      let a1 = sn.angle, a2 = midA;
      if (Math.abs(a2-a1) > Math.PI) { if (a2>a1) a1+=Math.PI*2; else a2+=Math.PI*2; }
      const mA = (a1+a2)/2;
      const pullR = targetR * 0.28;
      const cpx = cx + pullR * Math.cos(mA), cpy = cy + pullR * Math.sin(mA);

      const baseA = 0.03 * connMul;
      const alpha = isDimmed ? 0.005 : isLit ? 0.45 * connMul : baseA;
      const width = isDimmed ? 0.2 : isLit ? 2.2 : 0.4;

      ctx.beginPath();
      ctx.moveTo(sn.x, sn.y);
      ctx.quadraticCurveTo(cpx, cpy, tx, ty);
      ctx.strokeStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},${alpha})`;
      ctx.lineWidth = width; ctx.stroke();
    });
  });

  // ── Center — the dominant "ball" ──
  const total = deal.total;
  const hue = total >= 22 ? 142 : total >= 12 ? 45 : 0;

  // Outer glow — soft ambient halo
  const gr2 = ctx.createRadialGradient(cx, cy, L.centerR * 0.6, cx, cy, L.centerR * 2.0);
  gr2.addColorStop(0, `hsla(${hue},55%,50%,0.12)`);
  gr2.addColorStop(0.5, `hsla(${hue},45%,40%,0.04)`);
  gr2.addColorStop(1, `hsla(${hue},55%,55%,0)`);
  ctx.beginPath(); ctx.arc(cx, cy, L.centerR * 2.0, 0, Math.PI * 2);
  ctx.fillStyle = gr2; ctx.fill();

  // Main sphere gradient — layered for depth
  const cg = ctx.createRadialGradient(cx - L.centerR * 0.2, cy - L.centerR * 0.25, L.centerR * 0.1, cx, cy, L.centerR);
  cg.addColorStop(0, `hsla(${hue},55%,70%,0.9)`);
  cg.addColorStop(0.35, `hsla(${hue},50%,50%,0.85)`);
  cg.addColorStop(0.7, `hsla(${hue},40%,28%,0.8)`);
  cg.addColorStop(1, `hsla(${hue},30%,14%,0.65)`);
  ctx.beginPath(); ctx.arc(cx, cy, L.centerR, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.fill();

  // Subtle inner ring for definition
  ctx.beginPath(); ctx.arc(cx, cy, L.centerR, 0, Math.PI * 2);
  ctx.strokeStyle = `hsla(${hue},40%,50%,0.25)`;
  ctx.lineWidth = 1.5; ctx.stroke();

  // Score — large and prominent
  ctx.fillStyle = '#f8fafc';
  ctx.font = 'bold 44px Inter,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy - 12);
  // Stage label
  ctx.font = '600 18px Inter,sans-serif';
  ctx.fillStyle = 'rgba(248,250,252,0.5)';
  ctx.fillText(deal.stage.toUpperCase(), cx, cy + 20);
  // Deal value — subtle
  ctx.font = '14px Inter,sans-serif';
  ctx.fillStyle = 'rgba(248,250,252,0.25)';
  ctx.fillText('$' + (deal.value / 1000).toFixed(0) + 'k', cx, cy + 38);

  // PE Halo
  if (deal.pe_sponsor > 0) {
    const pe = deal.pe_sponsor;
    const pr = L.centerR + 6 + pe * 2.2;
    ctx.beginPath(); ctx.arc(cx, cy, pr, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(250,204,21,${0.06 + pe * 0.04})`;
    ctx.lineWidth = 2 + pe * 0.6; ctx.stroke();
  }

  // ── Stakeholder nodes ──
  currentStakeNodes.forEach((sn, si) => {
    const s = sn.s, cfg = sn.cfg;
    const isH = si === hovStake;
    const isLinked = hovDim && s.dims.includes(hovDim);
    const isDimmed = (hovStake !== null && !isH) || (hovDim && !isLinked);

    ctx.save();
    ctx.globalAlpha = isDimmed ? 0.06 : 1;

    const actFactor = Math.min((s.activity || 5) / 20, 1);
    if (actFactor > 0.15 && !isDimmed) {
      const pr = cfg.r + 3 + Math.sin(t * 2 + si * 2.1) * 2;
      const pg = ctx.createRadialGradient(sn.x, sn.y, cfg.r, sn.x, sn.y, pr + 6);
      pg.addColorStop(0, `rgba(255,255,255,${actFactor * 0.06})`);
      pg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(sn.x, sn.y, pr + 6, 0, Math.PI * 2);
      ctx.fillStyle = pg; ctx.fill();
    }

    ctx.beginPath(); ctx.arc(sn.x, sn.y, cfg.r, 0, Math.PI * 2);
    if (cfg.fill) {
      ctx.fillStyle = isH ? '#f8fafc' : cfg.color; ctx.fill();
    } else {
      ctx.strokeStyle = isH ? '#f8fafc' : cfg.color;
      ctx.lineWidth = 1.5; ctx.setLineDash(cfg.dash); ctx.stroke(); ctx.setLineDash([]);
    }

    const lr = L.stakeRingR + cfg.r + 20;
    const lx = cx + lr * Math.cos(sn.angle), ly = cy + lr * Math.sin(sn.angle);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (isH) {
      ctx.font = '16px Inter,sans-serif'; ctx.fillStyle = '#f8fafc';
      ctx.fillText(s.name, lx, ly - 8);
      ctx.font = '12px Inter,sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.6)';
      ctx.fillText(s.role, lx, ly + 8);
    } else {
      ctx.font = `${Math.max(12, cfg.r * 1.5)}px Inter,sans-serif`;
      ctx.fillStyle = `rgba(148,163,184,${isDimmed ? 0.05 : 0.35})`;
      ctx.fillText(s.role, lx, ly);
    }
    ctx.restore();
  });

  // ── Time labels along the helix (week/month markers) ──
  const spokeD = L.spokeData;
  const sPos = spokeD.spokePositions;
  ctx.font = '11px Inter,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let d = 0; d <= spokeD.numSpokes; d++) {
    if (d === 0 || d % 7 === 0) {
      const pos = sPos[d];
      if (!pos) continue;
      const a = pos.angle;
      const labelR = pos.baseR + 22;
      const isMonth = d > 0 && d % 30 === 0;
      const lx = cx + labelR * Math.cos(a), ly = cy + labelR * Math.sin(a);
      ctx.fillStyle = isMonth ? 'rgba(248,250,252,0.4)' : 'rgba(148,163,184,0.25)';
      ctx.font = isMonth ? 'bold 13px Inter,sans-serif' : '11px Inter,sans-serif';
      const label = d === 0 ? 'Day 1' : isMonth ? `M${d/30}` : `W${d/7}`;
      ctx.fillText(label, lx, ly);
    }
  }

  ctx.restore(); // end zoom/pan transform
}

// ── Hover ──
canvas.addEventListener('mousemove', e => {
  if (isPanning) return; // don't hover while panning
  const w = screenToWorld(e.clientX, e.clientY);
  const mx = w.x, my = w.y;
  let found = null;

  for (let i = 0; i < currentStakeNodes.length; i++) {
    const sn = currentStakeNodes[i];
    const dx = mx - sn.x, dy = my - sn.y;
    if (dx*dx+dy*dy < (sn.cfg.r+8)**2) { found = {type:'stake',idx:i}; break; }
  }

  if (!found) {
    const dx = mx-cx, dy = my-cy;
    if (dx*dx+dy*dy < ((currentDeal?._layout.centerR||20)+5)**2) found = {type:'center'};
  }

  if (!found) {
    const dx=mx-cx, dy=my-cy, dist=Math.sqrt(dx*dx+dy*dy), angle=Math.atan2(dy,dx);
    for (let bi=currentBars.length-1; bi>=0; bi--) {
      const bar = currentBars[bi];
      if (dist < bar.innerR || dist > bar.outerR) continue;
      let a = angle, aS = bar.aStart, aE = bar.aEnd;
      while (a < aS-Math.PI) a += Math.PI*2;
      while (a > aS+Math.PI) a -= Math.PI*2;
      if (a >= aS && a <= aE) { found = {type:'bar',barIdx:bi,dim:bar.dim}; break; }
    }
  }

  // (Spoke model: no sector-based dim hover — bars carry dim info directly)

  hovered = found;

  if (found && currentDeal) {
    let html = '';
    if (found.type === 'stake') {
      const s = currentDeal.stakeholders[found.idx];
      const barCount = currentBars.filter(b => b.inp.stakeholderIdx === found.idx).length;
      html = `<strong>${s.name}</strong><br>
        <span style="color:#94a3b8">${s.role}</span><br>
        <span style="color:#64748b;font-size:10px">${barCount} direct inputs</span><br>
        <span style="color:#64748b;font-size:10px">Touches: ${s.dims.map(d => `<span style="color:${DIM_COLORS[d].h}">${d[0].toUpperCase()+d.slice(1)}</span>`).join(', ')}</span>`;
    } else if (found.type === 'bar') {
      const bar = currentBars[found.barIdx];
      const inp = bar.inp;
      const col = DIM_COLORS[bar.dim];
      const dStr = bar.delta > 0 ? `<span style="color:#22c55e">+${bar.delta}</span>` : bar.delta < 0 ? `<span style="color:#ef4444">${bar.delta}</span>` : '=';
      html = `<span style="color:${col.h};font-weight:700">${DIM_LABELS[bar.di]}</span> · Day ${inp.day}<br>
        <span style="font-size:13px;font-weight:800;color:${col.h}">${inp.scoreInt}/5</span> ${dStr}<br>
        <span style="color:#64748b;font-size:10px">${inp.docType}${bar.gapDays > 1 ? ` · ${bar.gapDays}d gap` : ''} · depth ${(inp.depth||0).toFixed(1)} · ${inp.subRefs} sub-refs</span>
        ${inp.stakeholderName ? `<br><span style="color:#94a3b8;font-size:10px">From: ${inp.stakeholderName}</span>` : ''}`;
    } else if (found.type === 'dim') {
      const dim = found.dim;
      const col = DIM_COLORS[dim];
      const dimInps = currentDeal.inputs.filter(i => i.dim === dim);
      const scores = dimInps.map(i => i.scoreInt);
      const current = scores.length ? scores[scores.length-1] : 0;
      const types = {};
      dimInps.forEach(i => { types[i.docType] = (types[i.docType]||0)+1; });
      html = `<span style="color:${col.h};font-weight:800">${DIM_LABELS[DIMS.indexOf(dim)]}</span><br>
        <span style="font-size:14px;font-weight:800;color:${col.h}">${current}/5</span><br>
        <span style="color:#64748b;font-size:10px">${dimInps.length} inputs · ${Object.entries(types).map(([t,n])=>`${n} ${t}s`).join(', ')}</span>`;
    } else {
      html = `<strong>${currentDeal.name}</strong><br>
        <span style="font-size:15px;font-weight:800">${currentDeal.total}/30</span><br>
        <span style="color:#94a3b8;font-size:10px">${currentDeal.stage} · $${currentDeal.value >= 1e6 ? (currentDeal.value/1e6).toFixed(1)+'M' : Math.round(currentDeal.value/1000)+'K'} · ${currentDeal.inputs.length} inputs</span>`;
    }
    ttEl.innerHTML = html;
    const px = Math.min(e.offsetX + 14, W - 200);
    const py = Math.max(e.offsetY - 10, 10);
    ttEl.style.left = (e.clientX - canvas.parentElement.getBoundingClientRect().left + 14) + 'px';
    ttEl.style.top = (e.clientY - canvas.parentElement.getBoundingClientRect().top - 10) + 'px';
    ttEl.classList.add('visible');
  } else {
    ttEl.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => { hovered = null; ttEl.classList.remove('visible'); });

// ── Export / Import ──
document.getElementById('exportBtn').onclick = () => {
  const exportData = {
    numInputs: state.numInputs,
    timeSpan: state.timeSpan,
    dealValue: state.dealValue,
    peSponsor: state.peSponsor,
    dapProgress: state.dapProgress,
    gapVariance: state.gapVariance,
    barHeightScale: state.barHeightScale,
    gapDimming: state.gapDimming,
    textureIntensity: state.textureIntensity,
    connAlpha: state.connAlpha,
    intricacyScale: state.intricacyScale,
    glowIntensity: state.glowIntensity,
    dimWeights: {...state.dimWeights},
    scoreCurves: Object.fromEntries(DIMS.map(d => [d, [...state.scoreCurves[d]]])),
    stakeholders: state.stakeholders.map(s => ({name:s.name, role:s.role, dims:[...s.dims]}))
  };
  const json = JSON.stringify(exportData, null, 2);
  const outputEl = document.getElementById('exportOutput');
  outputEl.textContent = json;
  outputEl.classList.add('visible');
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('exportBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied-flash');
    setTimeout(() => { btn.textContent = 'Copy Settings JSON'; btn.classList.remove('copied-flash'); }, 1500);
  });
};

document.getElementById('importBtn').onclick = () => {
  const json = prompt('Paste settings JSON:');
  if (!json) return;
  try {
    const data = JSON.parse(json);
    // Apply all settings
    ['numInputs','timeSpan','dealValue','peSponsor','dapProgress','gapVariance',
     'barHeightScale','gapDimming','textureIntensity','connAlpha','intricacyScale','glowIntensity'].forEach(key => {
      if (data[key] !== undefined) {
        state[key] = data[key];
        const sl = document.getElementById(key);
        if (sl) { sl.value = data[key]; document.getElementById(key+'Val').textContent = data[key]; }
      }
    });
    if (data.dimWeights) state.dimWeights = {...data.dimWeights};
    if (data.scoreCurves) state.scoreCurves = Object.fromEntries(DIMS.map(d => [d, [...(data.scoreCurves[d] || state.scoreCurves[d])]]));
    if (data.stakeholders) state.stakeholders = data.stakeholders.map(s => ({name:s.name, role:s.role, dims:[...s.dims]}));
    state.seed = Math.floor(Math.random() * 10000);
    buildUI();
    rebuild();
    document.getElementById('exportOutput').classList.remove('visible');
  } catch(e) { alert('Invalid JSON: ' + e.message); }
};

// ── Init ──
buildUI();
rebuild();

function animate(ts) {
  render(ts);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
