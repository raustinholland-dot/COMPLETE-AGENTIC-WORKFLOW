<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timeline Builder — Configurable Icicle / Radial</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f172a; color:#e2e8f0; font-family:Inter,system-ui,sans-serif; display:flex; height:100vh; overflow:hidden; }

  #controls {
    width: 320px; min-width:320px; background:#0c1322; border-right:1px solid #1e293b;
    overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px;
    font-size:12px;
  }
  #controls h2 { font-size:14px; color:#94a3b8; margin-bottom:4px; }
  #controls h3 { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:1px; margin:8px 0 4px; }

  .ctrl-row { display:flex; align-items:center; gap:8px; }
  .ctrl-row label { width:90px; color:#94a3b8; font-size:11px; flex-shrink:0; }
  .ctrl-row input[type=range] { flex:1; accent-color:#3b82f6; }
  .ctrl-row .val { width:32px; text-align:right; color:#64748b; font-size:10px; }

  select {
    background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:4px;
    padding:3px 6px; font-size:11px; width:100%;
  }

  .track-card {
    background:#1e293b; border:1px solid #334155; border-radius:6px; padding:8px;
    margin-bottom:6px;
  }
  .track-card .track-header { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .track-card .track-swatch { width:12px; height:12px; border-radius:2px; flex-shrink:0; }
  .track-card .track-name { font-weight:600; font-size:12px; flex:1; }
  .track-card .track-remove { cursor:pointer; color:#64748b; font-size:14px; line-height:1; }
  .track-card .track-remove:hover { color:#ef4444; }
  .track-card .track-controls { display:flex; flex-direction:column; gap:4px; }
  .track-card .track-controls .ctrl-row label { width:70px; }

  .spike-card {
    background:#1a2332; border:1px solid #2d3b4f; border-radius:6px; padding:8px;
    margin-bottom:6px;
  }
  .spike-card .spike-header { display:flex; align-items:center; gap:6px; }
  .spike-card .spike-swatch { width:3px; height:16px; border-radius:1px; flex-shrink:0; }

  .score-event {
    display:flex; gap:6px; align-items:center; padding:4px 6px;
    border-bottom:1px solid #1e293b; font-size:10px;
  }
  .score-event .se-day { color:#64748b; width:40px; }
  .score-event .se-scores { display:flex; gap:2px; flex:1; }
  .score-event .se-chip {
    padding:1px 4px; border-radius:2px; font-size:9px; font-weight:600;
  }
  .score-event .se-total { color:#60a5fa; font-weight:700; width:28px; text-align:right; }

  .email-list { max-height:140px; overflow-y:auto; }
  .email-item {
    display:flex; gap:6px; align-items:center; padding:3px 6px;
    border-bottom:1px solid #1e293b; font-size:10px; color:#94a3b8;
  }
  .email-item .em-day { color:#64748b; width:36px; }
  .email-item .em-type { font-weight:600; width:50px; }
  .email-item .em-dim { font-size:9px; }

  button {
    background:#334155; color:#e2e8f0; border:1px solid #475569; border-radius:4px;
    padding:5px 10px; cursor:pointer; font-size:11px;
  }
  button:hover { background:#475569; }
  .btn-add { background:#1e3a5f; border-color:#2563eb; }
  .btn-add:hover { background:#2563eb; }
  .btn-toggle { background:#4c1d95; border-color:#7c3aed; }
  .btn-toggle:hover { background:#7c3aed; }

  .mode-label {
    text-align:center; font-size:10px; color:#7c3aed; font-weight:700;
    letter-spacing:1px; text-transform:uppercase; padding:4px;
    background:#1a1030; border-radius:4px;
  }

  #canvasWrap { flex:1; position:relative; overflow:hidden; }
  #mainCanvas { display:block; }
  #tooltip {
    position:absolute; pointer-events:none; background:rgba(15,23,42,0.92);
    border:1px solid #334155; border-radius:6px; padding:8px 10px;
    font-size:11px; line-height:1.4; color:#e2e8f0;
    opacity:0; transition:opacity 0.12s; max-width:260px;
  }
  #tooltip.visible { opacity:1; }
</style>
</head>
<body>

<div id="controls">
  <h2>Timeline Builder</h2>

  <div class="mode-label" id="modeLabel">FLAT TIMELINE</div>
  <button class="btn-toggle" id="toggleMode">Switch to Radial</button>

  <h3>Timeline</h3>
  <div class="ctrl-row">
    <label>Days (DAP)</label>
    <input type="range" id="totalDays" min="30" max="365" value="120">
    <span class="val" id="totalDaysVal">120</span>
  </div>
  <div class="ctrl-row">
    <label>Scoring Events</label>
    <input type="range" id="numScoreEvents" min="3" max="30" value="10">
    <span class="val" id="numScoreEventsVal">10</span>
  </div>
  <div class="ctrl-row">
    <label>Emails/Calls</label>
    <input type="range" id="numEmails" min="5" max="100" value="35">
    <span class="val" id="numEmailsVal">35</span>
  </div>
  <div class="ctrl-row">
    <label>Seed</label>
    <input type="range" id="seed" min="1" max="9999" value="42">
    <span class="val" id="seedVal">42</span>
  </div>

  <h3>Tracks</h3>
  <div id="trackList"></div>
  <button class="btn-add" id="addTrack">+ Add Track</button>

  <h3>Spike Events</h3>
  <div id="spikeList"></div>
  <button class="btn-add" id="addSpike">+ Add Spike Type</button>

  <h3>Scoring Events</h3>
  <div id="scoreEventList" style="max-height:180px;overflow-y:auto;background:#0f172a;border-radius:4px;border:1px solid #1e293b;"></div>

  <h3>Emails & Interactions</h3>
  <div id="emailList" class="email-list" style="background:#0f172a;border-radius:4px;border:1px solid #1e293b;"></div>
</div>

<div id="canvasWrap">
  <canvas id="mainCanvas" width="1600" height="1000"></canvas>
  <div id="tooltip"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA SOURCES
// ═══════════════════════════════════════════════════════
const SOURCES = {
  'pain':       { label:'Pain',          color:'#f87171', rgb:[248,113,113], max:5 },
  'power':      { label:'Power',         color:'#a78bfa', rgb:[167,139,250], max:5 },
  'vision':     { label:'Vision',        color:'#38bdf8', rgb:[56,189,248],  max:5 },
  'value':      { label:'Value',         color:'#4ade80', rgb:[74,222,128],  max:5 },
  'change':     { label:'Change',        color:'#fb923c', rgb:[251,146,60],  max:5 },
  'control':    { label:'Control',       color:'#e879f9', rgb:[232,121,249], max:5 },
  'total':      { label:'Total P2V2C2',  color:'#60a5fa', rgb:[96,165,250],  max:30 },
  'dap':        { label:'DAP Adherence', color:'#34d399', rgb:[52,211,153],  max:100 },
  'pe_sponsor': { label:'PE Sponsor',    color:'#fbbf24', rgb:[251,191,36],  max:5 },
};

const SPIKE_TYPES = {
  'new_stakeholder':  { label:'New Stakeholder',  color:'#22d3ee', dash:[] },
  'stage_change':     { label:'Stage Change',      color:'#a78bfa', dash:[] },
  'dap_milestone':    { label:'DAP Milestone',     color:'#34d399', dash:[4,4] },
  'risk_flag':        { label:'Risk Flag',          color:'#ef4444', dash:[] },
};

const DIMS = ['pain','power','vision','value','change','control'];
const DIM_COLORS = {
  pain:'#f87171', power:'#a78bfa', vision:'#38bdf8',
  value:'#4ade80', change:'#fb923c', control:'#e879f9'
};

function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {
  mode: 'flat',
  totalDays: 120,
  numScoreEvents: 10,
  numEmails: 35,
  seed: 42,
  tracks: [
    { source:'dap',     height:1.0, opacity:0.8 },
    { source:'total',   height:0.7, opacity:0.7 },
    { source:'pain',    height:0.5, opacity:0.9 },
    { source:'power',   height:0.5, opacity:0.9 },
    { source:'vision',  height:0.5, opacity:0.9 },
    { source:'value',   height:0.4, opacity:0.9 },
    { source:'change',  height:0.4, opacity:0.9 },
    { source:'control', height:0.4, opacity:0.9 },
  ],
  spikes: [
    { type:'new_stakeholder', enabled:true },
    { type:'stage_change',    enabled:true },
    { type:'dap_milestone',   enabled:true },
    { type:'risk_flag',       enabled:true },
  ],
};

// ═══════════════════════════════════════════════════════
// GENERATE DATA
// ═══════════════════════════════════════════════════════
function generateTimeline() {
  const rng = seededRng(state.seed);
  const days = state.totalDays;

  // ── 1. SCORING EVENTS — these are the moments P2V2C2 is re-evaluated ──
  const scoreEvents = [];
  const scores = { pain:0, power:0, vision:0, value:0, change:0, control:0 };
  let dapAdherence = 15;
  let peSponsor = 0;

  const nScore = state.numScoreEvents;
  const scoreGap = days / (nScore + 1);

  for (let i = 0; i < nScore; i++) {
    const day = Math.round(scoreGap * (i + 1) + (rng() - 0.5) * scoreGap * 0.6);
    const t = i / Math.max(nScore - 1, 1);

    // Each scoring event bumps 1-3 dimensions
    const numDimsBumped = 1 + Math.floor(rng() * 2.5);
    const bumped = [];
    for (let b = 0; b < numDimsBumped; b++) {
      const dimWeights = [1.5, 1, 1.2, 0.8 + t, 0.5 + t, 0.3 + t];
      let r = rng() * dimWeights.reduce((a,v)=>a+v,0), cumul = 0, pick = 0;
      for (let d = 0; d < 6; d++) { cumul += dimWeights[d]; if (r < cumul) { pick = d; break; } }
      const dim = DIMS[pick];
      const target = Math.min(5, Math.round(t * 4.2 + rng() * 1.8));
      const oldScore = scores[dim];
      scores[dim] = Math.min(5, Math.max(scores[dim], Math.round(scores[dim] * 0.3 + target * 0.7)));
      if (scores[dim] !== oldScore) bumped.push(dim);
    }

    dapAdherence = Math.min(100, Math.max(0, dapAdherence + (rng() - 0.25) * 18 + t * 5));
    if (rng() < 0.12 && peSponsor < 5) peSponsor++;

    const total = DIMS.reduce((s, d) => s + scores[d], 0);

    scoreEvents.push({
      day: Math.min(day, days),
      scores: { ...scores },
      total,
      dap: Math.round(dapAdherence),
      pe_sponsor: peSponsor,
      bumped,
    });
  }

  // ── 2. EMAILS & INTERACTIONS — these happen between scoring events ──
  const emails = [];
  const nEmails = state.numEmails;
  let emailDay = 0;
  const emailGap = days / nEmails;

  for (let i = 0; i < nEmails; i++) {
    emailDay = Math.min(emailDay + Math.max(1, Math.round(emailGap * (0.2 + rng() * 1.6))), days);
    const typeR = rng();
    const docType = typeR < 0.45 ? 'email' : typeR < 0.7 ? 'call' : typeR < 0.88 ? 'document' : 'meeting';

    // Which dimension(s) this interaction touches
    const dimWeights = [1.5, 1, 1.2, 0.8, 0.6, 0.4];
    let r = rng() * dimWeights.reduce((a,v)=>a+v,0), cumul = 0, primaryDim = 0;
    for (let d = 0; d < 6; d++) { cumul += dimWeights[d]; if (r < cumul) { primaryDim = d; break; } }

    // Find which scoring event this falls before (for connection lines)
    let nearestScoreIdx = scoreEvents.findIndex(se => se.day >= emailDay);
    if (nearestScoreIdx < 0) nearestScoreIdx = scoreEvents.length - 1;

    emails.push({
      day: emailDay,
      docType,
      primaryDim,
      dimLabel: DIMS[primaryDim],
      nearestScoreIdx,
    });
  }

  // ── 3. SPIKE EVENTS ──
  const spikeEvents = [];
  const stakeholderNames = ['CTO','CISO','CFO','VP Ops','Legal','Procurement','Board','IT Dir'];
  const stages = ['Discover','Qualify','Prove','Negotiate','Close'];
  let stakeIdx = 0, stageIdx = 0;

  scoreEvents.forEach((se, i) => {
    const t = i / Math.max(nScore - 1, 1);
    if (rng() < 0.2 && stakeIdx < stakeholderNames.length) {
      spikeEvents.push({ day: se.day, type:'new_stakeholder', label: stakeholderNames[stakeIdx++] });
    }
    const expectedStage = Math.min(4, Math.floor(t * 5));
    if (expectedStage > stageIdx) {
      stageIdx = expectedStage;
      spikeEvents.push({ day: se.day, type:'stage_change', label: stages[stageIdx] });
    }
    if (rng() < 0.15) {
      spikeEvents.push({ day: se.day, type:'dap_milestone', label: `Milestone ${Math.floor(t * 14) + 1}` });
    }
    if (rng() < 0.08) {
      spikeEvents.push({ day: se.day, type:'risk_flag', label: rng() < 0.5 ? 'No response 14d' : 'Champion silent' });
    }
  });

  return { scoreEvents, emails, spikeEvents };
}

// ═══════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════
function buildTrackUI() {
  const el = document.getElementById('trackList');
  el.innerHTML = '';
  state.tracks.forEach((track, i) => {
    const src = SOURCES[track.source];
    const card = document.createElement('div');
    card.className = 'track-card';
    card.innerHTML = `
      <div class="track-header">
        <div class="track-swatch" style="background:${src.color}"></div>
        <div class="track-name">${src.label}</div>
        <span class="track-remove" data-idx="${i}">&times;</span>
      </div>
      <div class="track-controls">
        <select class="track-source" data-idx="${i}">
          ${Object.entries(SOURCES).map(([k,v]) => `<option value="${k}" ${k===track.source?'selected':''}>${v.label}</option>`).join('')}
        </select>
        <div class="ctrl-row">
          <label>Height</label>
          <input type="range" class="track-height" data-idx="${i}" min="0.1" max="2" step="0.1" value="${track.height}">
          <span class="val">${track.height.toFixed(1)}</span>
        </div>
        <div class="ctrl-row">
          <label>Opacity</label>
          <input type="range" class="track-opacity" data-idx="${i}" min="0.1" max="1" step="0.05" value="${track.opacity}">
          <span class="val">${track.opacity.toFixed(2)}</span>
        </div>
      </div>`;
    el.appendChild(card);
  });
  el.querySelectorAll('.track-source').forEach(sel => {
    sel.onchange = () => { state.tracks[+sel.dataset.idx].source = sel.value; buildTrackUI(); render(); };
  });
  el.querySelectorAll('.track-height').forEach(sl => {
    sl.oninput = () => { state.tracks[+sl.dataset.idx].height = +sl.value; sl.nextElementSibling.textContent = (+sl.value).toFixed(1); render(); };
  });
  el.querySelectorAll('.track-opacity').forEach(sl => {
    sl.oninput = () => { state.tracks[+sl.dataset.idx].opacity = +sl.value; sl.nextElementSibling.textContent = (+sl.value).toFixed(2); render(); };
  });
  el.querySelectorAll('.track-remove').forEach(btn => {
    btn.onclick = () => { state.tracks.splice(+btn.dataset.idx, 1); buildTrackUI(); render(); };
  });
}

function buildSpikeUI() {
  const el = document.getElementById('spikeList');
  el.innerHTML = '';
  state.spikes.forEach((spike, i) => {
    const st = SPIKE_TYPES[spike.type];
    const card = document.createElement('div');
    card.className = 'spike-card';
    card.innerHTML = `<div class="spike-header">
      <div class="spike-swatch" style="background:${st.color}"></div>
      <label style="flex:1;font-size:11px;color:#cbd5e1">
        <input type="checkbox" class="spike-toggle" data-idx="${i}" ${spike.enabled?'checked':''}>
        ${st.label}
      </label>
      <span class="track-remove" data-idx="${i}" style="cursor:pointer;color:#64748b">&times;</span>
    </div>`;
    el.appendChild(card);
  });
  el.querySelectorAll('.spike-toggle').forEach(cb => {
    cb.onchange = () => { state.spikes[+cb.dataset.idx].enabled = cb.checked; render(); };
  });
  el.querySelectorAll('.track-remove').forEach(btn => {
    btn.onclick = () => { state.spikes.splice(+btn.dataset.idx, 1); buildSpikeUI(); render(); };
  });
}

function buildScoreEventList(scoreEvents) {
  const el = document.getElementById('scoreEventList');
  el.innerHTML = '';
  scoreEvents.forEach((se, i) => {
    const row = document.createElement('div');
    row.className = 'score-event';
    const chips = DIMS.map(d => {
      const s = se.scores[d];
      const c = DIM_COLORS[d];
      const bright = se.bumped.includes(d);
      return `<span class="se-chip" style="background:${c}${bright?'44':'15'};color:${c}${bright?'':'88'}">${d[0].toUpperCase()}${s}</span>`;
    }).join('');
    row.innerHTML = `<span class="se-day">D${se.day}</span><span class="se-scores">${chips}</span><span class="se-total">${se.total}</span>`;
    el.appendChild(row);
  });
}

function buildEmailList(emails) {
  const el = document.getElementById('emailList');
  el.innerHTML = '';
  emails.forEach(em => {
    const row = document.createElement('div');
    row.className = 'email-item';
    const c = DIM_COLORS[em.dimLabel];
    row.innerHTML = `<span class="em-day">D${em.day}</span>
      <span class="em-type" style="color:${({email:'#94a3b8',call:'#60a5fa',document:'#fbbf24',meeting:'#34d399'})[em.docType]}">${em.docType}</span>
      <span class="em-dim" style="color:${c}">${em.dimLabel}</span>`;
    el.appendChild(row);
  });
}

document.getElementById('addTrack').onclick = () => {
  const used = state.tracks.map(t => t.source);
  const avail = Object.keys(SOURCES).find(k => !used.includes(k)) || 'pain';
  state.tracks.push({ source: avail, height: 0.5, opacity: 0.8 });
  buildTrackUI(); render();
};
document.getElementById('addSpike').onclick = () => {
  const used = state.spikes.map(s => s.type);
  const avail = Object.keys(SPIKE_TYPES).find(k => !used.includes(k));
  if (avail) { state.spikes.push({ type: avail, enabled: true }); buildSpikeUI(); render(); }
};
document.getElementById('toggleMode').onclick = () => {
  state.mode = state.mode === 'flat' ? 'radial' : 'flat';
  document.getElementById('modeLabel').textContent = state.mode === 'flat' ? 'FLAT TIMELINE' : 'RADIAL VIEW';
  document.getElementById('toggleMode').textContent = state.mode === 'flat' ? 'Switch to Radial' : 'Switch to Flat';
  sizeCanvas(); render();
};

['totalDays','numScoreEvents','numEmails','seed'].forEach(id => {
  const sl = document.getElementById(id);
  sl.oninput = () => { state[id] = +sl.value; document.getElementById(id + 'Val').textContent = sl.value; render(); };
});

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function sizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  if (state.mode === 'flat') {
    canvas.width = wrap.clientWidth * 2;
    canvas.height = wrap.clientHeight * 2;
    canvas.style.width = wrap.clientWidth + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
  } else {
    const s = Math.min(wrap.clientWidth, wrap.clientHeight);
    canvas.width = s * 2; canvas.height = s * 2;
    canvas.style.width = s + 'px'; canvas.style.height = s + 'px';
  }
}
sizeCanvas();
window.addEventListener('resize', () => { sizeCanvas(); render(); });

// Helper: get track value from a scoring event
function getTrackVal(source, se) {
  if (DIMS.includes(source)) return se.scores[source] || 0;
  if (source === 'total') return se.total;
  if (source === 'dap') return se.dap;
  if (source === 'pe_sponsor') return se.pe_sponsor;
  return 0;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const { scoreEvents, emails, spikeEvents } = generateTimeline();
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  buildScoreEventList(scoreEvents);
  buildEmailList(emails);

  if (state.mode === 'flat') renderFlat(scoreEvents, emails, spikeEvents, W, H);
  else renderRadial(scoreEvents, emails, spikeEvents, W, H);
}

function renderFlat(scoreEvents, emails, spikeEvents, W, H) {
  const margin = { left: 140, right: 40, top: 50, bottom: 80 };
  const plotW = W - margin.left - margin.right;
  const plotH = H - margin.top - margin.bottom;
  const days = state.totalDays;
  const tracks = state.tracks;
  if (tracks.length === 0) return;

  const totalHeightWeight = tracks.reduce((s, t) => s + t.height, 0);
  // NO gaps — tracks lay flush on top of each other
  const availH = plotH;

  // ── Time axis ──
  ctx.strokeStyle = 'rgba(148,163,184,0.08)';
  ctx.lineWidth = 1;
  for (let d = 0; d <= days; d += 7) {
    const x = margin.left + (d / days) * plotW;
    ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, H - margin.bottom); ctx.stroke();
    if (d % 14 === 0) {
      ctx.font = '18px Inter,sans-serif';
      ctx.fillStyle = d % 30 === 0 ? 'rgba(248,250,252,0.3)' : 'rgba(148,163,184,0.12)';
      ctx.textAlign = 'center';
      ctx.fillText(d === 0 ? 'Start' : d % 30 === 0 ? `M${d/30}` : `W${Math.round(d/7)}`, x, margin.top - 14);
    }
  }

  // ── Scoring event vertical markers ──
  scoreEvents.forEach((se, i) => {
    const x = margin.left + (se.day / days) * plotW;
    ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + plotH);
    ctx.strokeStyle = 'rgba(96,165,250,0.1)';
    ctx.lineWidth = 1.5; ctx.stroke();
    // Score # label at top
    ctx.font = 'bold 16px Inter,sans-serif';
    ctx.fillStyle = 'rgba(96,165,250,0.25)';
    ctx.textAlign = 'center';
    ctx.fillText(`#${i+1}`, x, margin.top - 2);
  });

  // ── Render each track — flush stacking, steps at scoring events ──
  let trackY = margin.top;

  tracks.forEach((track, ti) => {
    const src = SOURCES[track.source];
    const trackH = (track.height / totalHeightWeight) * availH;

    // Track label
    ctx.font = 'bold 18px Inter,sans-serif';
    ctx.fillStyle = src.color + '88';
    ctx.textAlign = 'right';
    ctx.fillText(src.label, margin.left - 10, trackY + trackH / 2 + 5);

    // Track background
    ctx.fillStyle = `rgba(${src.rgb[0]},${src.rgb[1]},${src.rgb[2]},0.015)`;
    ctx.fillRect(margin.left, trackY, plotW, trackH);

    // Steps at scoring events — value holds from one scoring event to the next
    // Before first scoring event: value is 0
    // Between scoring events: value stays at last scored value
    const segments = [];
    // Before first score event
    if (scoreEvents.length > 0) {
      segments.push({ x1: 0, x2: scoreEvents[0].day, val: 0 });
    }
    scoreEvents.forEach((se, i) => {
      const val = getTrackVal(track.source, se);
      const nextDay = i < scoreEvents.length - 1 ? scoreEvents[i + 1].day : days;
      segments.push({ x1: se.day, x2: nextDay, val });
    });

    segments.forEach(seg => {
      const norm = Math.min(seg.val / src.max, 1);
      if (norm <= 0) return;

      const x1 = margin.left + (seg.x1 / days) * plotW;
      const x2 = margin.left + (seg.x2 / days) * plotW;
      const barH = norm * trackH;
      const barY = trackY + trackH - barH;
      const alpha = track.opacity * (0.3 + norm * 0.7);

      ctx.fillStyle = `rgba(${src.rgb[0]},${src.rgb[1]},${src.rgb[2]},${alpha})`;
      ctx.fillRect(x1, barY, x2 - x1, barH);

      // Top edge
      ctx.beginPath(); ctx.moveTo(x1, barY); ctx.lineTo(x2, barY);
      ctx.strokeStyle = `rgba(${src.rgb[0]},${src.rgb[1]},${src.rgb[2]},${alpha * 0.7})`;
      ctx.lineWidth = 1.5; ctx.stroke();
    });

    trackY += trackH; // NO gap — flush
  });

  // ── Email/interaction ticks at the bottom ──
  const emailY = H - margin.bottom + 10;
  const emailH = margin.bottom - 20;

  emails.forEach(em => {
    const x = margin.left + (em.day / days) * plotW;
    const dimColor = DIM_COLORS[em.dimLabel];

    // Tick mark
    const tickH = em.docType === 'meeting' ? emailH * 0.9 : em.docType === 'call' ? emailH * 0.7 : em.docType === 'document' ? emailH * 0.5 : emailH * 0.35;
    ctx.beginPath();
    ctx.moveTo(x, emailY + emailH);
    ctx.lineTo(x, emailY + emailH - tickH);
    ctx.strokeStyle = dimColor + '88';
    ctx.lineWidth = em.docType === 'meeting' ? 3 : em.docType === 'call' ? 2 : 1.2;
    ctx.stroke();

    // Connection line from email tick up to the track area
    // Find which track matches this email's dimension
    const trackIdx = state.tracks.findIndex(t => t.source === em.dimLabel);
    if (trackIdx >= 0) {
      // Calculate that track's Y position
      let ty = margin.top;
      for (let ti = 0; ti < trackIdx; ti++) {
        ty += (state.tracks[ti].height / totalHeightWeight) * availH;
      }
      const targetTrackH = (state.tracks[trackIdx].height / totalHeightWeight) * availH;
      const targetY = ty + targetTrackH;

      ctx.beginPath();
      ctx.moveTo(x, emailY + emailH - tickH);
      ctx.lineTo(x, targetY);
      ctx.strokeStyle = dimColor + '12';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([2, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Tiny dot at top of tick
    ctx.beginPath();
    ctx.arc(x, emailY + emailH - tickH, 2, 0, Math.PI * 2);
    ctx.fillStyle = dimColor + 'aa';
    ctx.fill();
  });

  // Email area label
  ctx.font = 'bold 16px Inter,sans-serif';
  ctx.fillStyle = 'rgba(148,163,184,0.3)';
  ctx.textAlign = 'right';
  ctx.fillText('Emails/Calls', margin.left - 10, emailY + emailH / 2 + 4);

  // ── Spike events ──
  const enabledTypes = state.spikes.filter(s => s.enabled).map(s => s.type);
  spikeEvents.filter(se => enabledTypes.includes(se.type)).forEach(se => {
    const st = SPIKE_TYPES[se.type];
    const x = margin.left + (se.day / days) * plotW;

    ctx.beginPath();
    ctx.moveTo(x, margin.top);
    ctx.lineTo(x, margin.top + plotH + emailH + 10);
    ctx.strokeStyle = st.color + '44';
    ctx.lineWidth = 2;
    ctx.setLineDash(st.dash); ctx.stroke(); ctx.setLineDash([]);

    ctx.beginPath(); ctx.arc(x, margin.top - 6, 5, 0, Math.PI * 2);
    ctx.fillStyle = st.color; ctx.fill();

    ctx.save();
    ctx.translate(x + 6, margin.top + 20);
    ctx.rotate(-Math.PI / 4);
    ctx.font = 'bold 14px Inter,sans-serif';
    ctx.fillStyle = st.color + 'bb';
    ctx.textAlign = 'left';
    ctx.fillText(se.label, 0, 0);
    ctx.restore();
  });
}

function renderRadial(scoreEvents, emails, spikeEvents, W, H) {
  const cxr = W / 2, cyr = H / 2;
  const maxR = Math.min(W, H) / 2 - 80;
  const centerR = 60;
  const days = state.totalDays;
  const tracks = state.tracks;
  if (tracks.length === 0) return;

  const totalAngle = Math.PI * 2;
  const startAngle = -Math.PI / 2;
  const totalHeightWeight = tracks.reduce((s, t) => s + t.height, 0);
  const availR = maxR - centerR; // NO gaps

  // Reference circles
  for (let i = 0; i <= 4; i++) {
    const r = centerR + availR * (i / 4);
    ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(148,163,184,${i === 0 ? 0.06 : 0.02})`;
    ctx.lineWidth = 0.5; ctx.stroke();
  }

  // Time ticks
  for (let d = 0; d <= days; d += 7) {
    const a = startAngle + (d / days) * totalAngle;
    ctx.beginPath();
    ctx.moveTo(cxr + (centerR - 4) * Math.cos(a), cyr + (centerR - 4) * Math.sin(a));
    ctx.lineTo(cxr + (maxR + 4) * Math.cos(a), cyr + (maxR + 4) * Math.sin(a));
    ctx.strokeStyle = d % 30 === 0 ? 'rgba(148,163,184,0.08)' : 'rgba(148,163,184,0.02)';
    ctx.lineWidth = d % 30 === 0 ? 1 : 0.5; ctx.stroke();
    if (d % 14 === 0) {
      const lr = maxR + 18;
      ctx.font = d % 30 === 0 ? 'bold 18px Inter,sans-serif' : '16px Inter,sans-serif';
      ctx.fillStyle = d % 30 === 0 ? 'rgba(248,250,252,0.3)' : 'rgba(148,163,184,0.12)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(d === 0 ? 'Start' : d % 30 === 0 ? `M${d/30}` : `W${Math.round(d/7)}`,
        cxr + lr * Math.cos(a), cyr + lr * Math.sin(a));
    }
  }

  // Scoring event radial markers
  scoreEvents.forEach((se, i) => {
    const a = startAngle + (se.day / days) * totalAngle;
    ctx.beginPath();
    ctx.moveTo(cxr + centerR * Math.cos(a), cyr + centerR * Math.sin(a));
    ctx.lineTo(cxr + maxR * Math.cos(a), cyr + maxR * Math.sin(a));
    ctx.strokeStyle = 'rgba(96,165,250,0.08)'; ctx.lineWidth = 1.5; ctx.stroke();
  });

  // Tracks — concentric rings, no gaps, steps at scoring events
  let trackInnerR = centerR;

  tracks.forEach((track, ti) => {
    const src = SOURCES[track.source];
    const trackThickness = (track.height / totalHeightWeight) * availR;

    // Background ring
    ctx.beginPath(); ctx.arc(cxr, cyr, trackInnerR + trackThickness / 2, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${src.rgb[0]},${src.rgb[1]},${src.rgb[2]},0.02)`;
    ctx.lineWidth = trackThickness; ctx.stroke();

    // Build segments from scoring events
    const segments = [];
    if (scoreEvents.length > 0) {
      segments.push({ a1: startAngle, a2: startAngle + (scoreEvents[0].day / days) * totalAngle, val: 0 });
    }
    scoreEvents.forEach((se, i) => {
      const val = getTrackVal(track.source, se);
      const a1 = startAngle + (se.day / days) * totalAngle;
      const nextDay = i < scoreEvents.length - 1 ? scoreEvents[i + 1].day : days;
      const a2 = startAngle + (nextDay / days) * totalAngle;
      segments.push({ a1, a2, val });
    });

    segments.forEach(seg => {
      const norm = Math.min(seg.val / src.max, 1);
      if (norm <= 0) return;
      const barThickness = norm * trackThickness;
      const barOuterR = trackInnerR + trackThickness;
      const barInnerR = barOuterR - barThickness;
      const alpha = track.opacity * (0.3 + norm * 0.7);

      ctx.beginPath();
      ctx.arc(cxr, cyr, barInnerR, seg.a1, seg.a2);
      ctx.arc(cxr, cyr, barOuterR, seg.a2, seg.a1, true);
      ctx.closePath();
      ctx.fillStyle = `rgba(${src.rgb[0]},${src.rgb[1]},${src.rgb[2]},${alpha})`;
      ctx.fill();

      ctx.beginPath(); ctx.arc(cxr, cyr, barInnerR, seg.a1, seg.a2);
      ctx.strokeStyle = `rgba(${src.rgb[0]},${src.rgb[1]},${src.rgb[2]},${alpha * 0.5})`;
      ctx.lineWidth = 0.8; ctx.stroke();
    });

    trackInnerR += trackThickness; // NO gap
  });

  // Email ticks — outside the tracks
  const emailBaseR = maxR + 6;
  emails.forEach(em => {
    const a = startAngle + (em.day / days) * totalAngle;
    const dimColor = DIM_COLORS[em.dimLabel];
    const tickLen = em.docType === 'meeting' ? 22 : em.docType === 'call' ? 16 : em.docType === 'document' ? 11 : 7;

    ctx.beginPath();
    ctx.moveTo(cxr + emailBaseR * Math.cos(a), cyr + emailBaseR * Math.sin(a));
    ctx.lineTo(cxr + (emailBaseR + tickLen) * Math.cos(a), cyr + (emailBaseR + tickLen) * Math.sin(a));
    ctx.strokeStyle = dimColor + '88';
    ctx.lineWidth = em.docType === 'meeting' ? 2.5 : em.docType === 'call' ? 1.8 : 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cxr + (emailBaseR + tickLen) * Math.cos(a), cyr + (emailBaseR + tickLen) * Math.sin(a), 1.5, 0, Math.PI * 2);
    ctx.fillStyle = dimColor + 'aa'; ctx.fill();
  });

  // Spikes
  const enabledTypes = state.spikes.filter(s => s.enabled).map(s => s.type);
  spikeEvents.filter(se => enabledTypes.includes(se.type)).forEach(se => {
    const st = SPIKE_TYPES[se.type];
    const a = startAngle + (se.day / days) * totalAngle;
    const spikeR = maxR + 50;

    ctx.beginPath();
    ctx.moveTo(cxr + (centerR - 4) * Math.cos(a), cyr + (centerR - 4) * Math.sin(a));
    ctx.lineTo(cxr + spikeR * Math.cos(a), cyr + spikeR * Math.sin(a));
    ctx.strokeStyle = st.color + '44'; ctx.lineWidth = 1.5;
    ctx.setLineDash(st.dash); ctx.stroke(); ctx.setLineDash([]);

    ctx.beginPath(); ctx.arc(cxr + spikeR * Math.cos(a), cyr + spikeR * Math.sin(a), 4, 0, Math.PI * 2);
    ctx.fillStyle = st.color; ctx.fill();

    ctx.save();
    const lR = spikeR + 14;
    ctx.translate(cxr + lR * Math.cos(a), cyr + lR * Math.sin(a));
    ctx.rotate(a + Math.PI / 2);
    ctx.font = '14px Inter,sans-serif'; ctx.fillStyle = st.color + '99';
    ctx.textAlign = 'center'; ctx.fillText(se.label, 0, 0);
    ctx.restore();
  });

  // Center
  const lastEv = scoreEvents[scoreEvents.length - 1];
  const hue = lastEv && lastEv.total >= 22 ? 142 : lastEv && lastEv.total >= 12 ? 45 : 220;
  const cg = ctx.createRadialGradient(cxr - 10, cyr - 12, centerR * 0.1, cxr, cyr, centerR);
  cg.addColorStop(0, `hsla(${hue},40%,60%,0.85)`);
  cg.addColorStop(0.6, `hsla(${hue},30%,30%,0.7)`);
  cg.addColorStop(1, `hsla(${hue},20%,15%,0.5)`);
  ctx.beginPath(); ctx.arc(cxr, cyr, centerR, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = `hsla(${hue},30%,50%,0.2)`; ctx.lineWidth = 1; ctx.stroke();

  if (lastEv) {
    ctx.font = 'bold 36px Inter,sans-serif'; ctx.fillStyle = '#f8fafc';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lastEv.total, cxr, cyr - 6);
    ctx.font = '16px Inter,sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.5)';
    ctx.fillText('/30', cxr, cyr + 18);
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildTrackUI();
buildSpikeUI();
render();
</script>
