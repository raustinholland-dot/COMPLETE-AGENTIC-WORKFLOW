<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Texture Explorer — Stage Ring Themes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body { background:#0f172a; color:#e2e8f0; font-family:'Inter',system-ui,sans-serif; display:flex; }

  /* ── SIDEBAR ── */
  #sidebar {
    width:240px; min-width:240px; height:100vh; overflow-y:auto;
    background:#0c1322; border-right:1px solid #1e293b;
    padding:12px; display:flex; flex-direction:column; gap:10px;
    scrollbar-width:thin; scrollbar-color:#1e293b #0c1322;
  }
  #sidebar::-webkit-scrollbar { width:4px; }
  #sidebar::-webkit-scrollbar-track { background:#0c1322; }
  #sidebar::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

  .sb-title { font-size:14px; font-weight:700; color:#f8fafc; }
  .sb-sub { font-size:9px; color:#64748b; }

  .sb-section {
    border-bottom:1px solid #1e293b; padding-bottom:8px;
  }
  .sb-label {
    font-size:8px; color:#94a3b8; font-weight:600; text-transform:uppercase;
    letter-spacing:0.5px; margin-bottom:4px;
  }
  .sb-grid { display:flex; gap:2px; flex-wrap:wrap; }
  .toggle-btn {
    padding:3px 7px; font-size:8px; font-weight:600; font-family:inherit;
    background:#1e293b; border:1px solid #334155; color:#94a3b8;
    border-radius:3px; cursor:pointer; transition:all 0.15s;
  }
  .toggle-btn:hover { background:#334155; color:#e2e8f0; }
  .toggle-btn.active { background:#7c3aed; border-color:#a78bfa; color:#fff; }
  .toggle-btn.stage-btn.active { background:#0e7490; border-color:#22d3ee; color:#fff; }
  .toggle-btn.deal-btn.active { background:#0d9488; border-color:#2dd4bf; color:#fff; }
  .toggle-btn.opt-btn.active { background:#b45309; border-color:#f59e0b; color:#fff; }

  .deal-info { text-align:center; }
  .deal-info .deal-name { font-size:14px; font-weight:700; color:#f8fafc; }
  .deal-info .deal-meta { font-size:9px; color:#64748b; margin-top:1px; }
  .deal-info .score-badge {
    display:inline-block; margin-top:3px; padding:1px 8px; border-radius:8px;
    font-size:10px; font-weight:700;
  }


  .sb-slider { width:100%; accent-color:#7c3aed; cursor:pointer; height:4px; }
  .sb-slider-val { font-size:8px; color:#64748b; text-align:right; }

  /* ── COLLAPSIBLE SECTIONS ── */
  .sb-section-hdr {
    cursor:pointer; display:flex; align-items:center; justify-content:space-between;
    user-select:none;
  }
  .sb-section-hdr .sb-chevron {
    font-size:8px; color:#64748b; transition:transform 0.15s;
  }
  .sb-section-hdr.collapsed .sb-chevron { transform:rotate(-90deg); }
  .sb-section-body { overflow:hidden; transition:max-height 0.2s; }
  .sb-section-body.collapsed { max-height:0 !important; padding:0; margin:0; }

  /* ── MAIN CANVAS AREA ── */
  #canvasArea {
    flex:1; height:100vh; display:flex; align-items:flex-start; justify-content:flex-start;
    overflow:auto; position:relative; padding:8px;
  }
  #mainCanvas { border-radius:8px; background:#0a0f1e; flex-shrink:0; }
</style>
</head>
<body>

<div id="sidebar">
  <div>
    <div class="sb-title">Deal Lifecycle</div>
    <div class="sb-sub">90-day timeline · P2V2C2 · DAP milestones</div>
  </div>

  <!-- DEAL -->
  <div class="sb-section">
    <div class="sb-label">Deal</div>
    <div class="sb-grid" id="dealButtons"></div>
    <div class="deal-info" id="dealInfo" style="margin-top:4px"></div>
    <div class="sb-label" style="margin-top:6px">Deal Length <span class="sb-slider-val" id="dealLenVal">91 days</span></div>
    <input type="range" min="30" max="180" value="91" step="1" class="sb-slider" id="dealLenSlider">
  </div>

  <!-- SCORE EDITOR — big and prominent -->
  <div class="sb-section">
    <div class="sb-section-hdr" onclick="toggleSection(this)">
      <div class="sb-label" style="margin:0">Score Editor</div>
      <span class="sb-chevron">▼</span>
    </div>
    <div class="sb-section-body">
      <div class="sb-grid" id="milestoneButtons" style="margin:4px 0"></div>
      <div id="scoreEditorPanel" style="display:none">
        <div style="font-size:8px;color:#f8fafc;margin-bottom:4px" id="scoreEditorLabel"></div>
        <div id="scoreSliders"></div>
      </div>
    </div>
  </div>

  <!-- VIEW + ZOOM -->
  <div class="sb-section">
    <div class="sb-grid" id="viewButtons" style="margin-bottom:4px"></div>
    <div class="sb-label">Zoom <span class="sb-slider-val" id="zoomVal">100%</span></div>
    <input type="range" min="50" max="500" value="100" step="10" class="sb-slider" id="zoomSlider">
  </div>

  <!-- P2V2C2 STYLE -->
  <div class="sb-section">
    <div class="sb-section-hdr" onclick="toggleSection(this)">
      <div class="sb-label" style="margin:0">P2V2C2 Style</div>
      <span class="sb-chevron">▼</span>
    </div>
    <div class="sb-section-body">
      <div class="sb-grid" id="p2ThemeButtons"></div>
    </div>
  </div>

  <!-- EVENT LINES -->
  <div class="sb-section">
    <div class="sb-section-hdr" onclick="toggleSection(this)">
      <div class="sb-label" style="margin:0">Event Lines</div>
      <span class="sb-chevron">▼</span>
    </div>
    <div class="sb-section-body">
      <div class="sb-grid" id="eventStyleButtons"></div>
    </div>
  </div>

  <!-- DAP -->
  <div class="sb-section">
    <div class="sb-section-hdr" onclick="toggleSection(this)">
      <div class="sb-label" style="margin:0">DAP Style</div>
      <span class="sb-chevron">▼</span>
    </div>
    <div class="sb-section-body">
      <div class="sb-grid" id="dapStyleButtons"></div>
      <div class="sb-label" style="margin-top:4px">Intensity <span class="sb-slider-val" id="dapIntensityVal">100%</span></div>
      <input type="range" min="20" max="200" value="100" step="10" class="sb-slider" id="dapIntensitySlider">
    </div>
  </div>

  <!-- REGION SIZES -->
  <div class="sb-section">
    <div class="sb-section-hdr" onclick="toggleSection(this)">
      <div class="sb-label" style="margin:0">Region Sizes</div>
      <span class="sb-chevron">▼</span>
    </div>
    <div class="sb-section-body">
      <div class="sb-label" style="margin-top:4px">Stage Height <span class="sb-slider-val" id="stageHVal">40px</span></div>
      <input type="range" min="15" max="120" value="40" step="5" class="sb-slider" id="stageHSlider">
      <div class="sb-label" style="margin-top:4px">P2V2C2 Size <span class="sb-slider-val" id="p2PctVal">60%</span></div>
      <input type="range" min="20" max="100" value="60" step="5" class="sb-slider" id="p2PctSlider">
      <div class="sb-label" style="margin-top:4px">DAP Height <span class="sb-slider-val" id="dapHVal">40px</span></div>
      <input type="range" min="15" max="120" value="40" step="5" class="sb-slider" id="dapHSlider">
    </div>
  </div>

  <!-- STAGE TEXTURE (collapsed by default) -->
  <div class="sb-section">
    <div class="sb-section-hdr collapsed" onclick="toggleSection(this)">
      <div class="sb-label" style="margin:0">Stage Texture</div>
      <span class="sb-chevron">▼</span>
    </div>
    <div class="sb-section-body collapsed">
      <div class="sb-grid" id="stageThemeButtons"></div>
    </div>
  </div>

</div>

<div id="canvasArea">
  <canvas id="mainCanvas"></canvas>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const DIMS = ['pain','power','vision','value','change','control'];
const DIM_COLORS = {
  pain:   {h:'#f87171', rgb:[248,113,113]},
  power:  {h:'#a78bfa', rgb:[167,139,250]},
  vision: {h:'#38bdf8', rgb:[56,189,248]},
  value:  {h:'#4ade80', rgb:[74,222,128]},
  change: {h:'#fb923c', rgb:[251,146,60]},
  control:{h:'#e879f9', rgb:[232,121,249]},
};
const DIM_LABELS = {pain:'Pain',power:'Power',vision:'Vision',value:'Value',change:'Change',control:'Control'};
const STAGES = ['discover','qualify','prove','negotiate','close'];
const STAGE_LABELS = {discover:'Discover',qualify:'Qualify',prove:'Prove',negotiate:'Negotiate',close:'Close'};
let TOTAL_DAYS = 91;
const START_ANGLE = -Math.PI / 2; // 12 o'clock

const ROLE_CONFIG = {
  PC:  {color:'#94a3b8',fill:false,r:6,label:'PC'},
  C:   {color:'#6366f1',fill:true,r:7,label:'C'},
  PES: {color:'#f59e0b',fill:false,r:6,label:'PES'},
  ES:  {color:'#ca8a04',fill:true,r:7,label:'ES'},
  UDM: {color:'#94a3b8',fill:false,r:6,label:'UDM'},
  DM:  {color:'#15803d',fill:true,r:8,label:'DM'},
  OTHER:{color:'#64748b',fill:false,r:5,label:'OTH'},
};

// 18 DAP milestones with their typical day positions (compressed 90-day cycle)
const DAP_MILESTONES = [
  {cas:'1A', label:'Identify Pain', day:0},
  {cas:'1B', label:'Qualify Pain', day:5},
  {cas:'1C', label:'Champion Identified', day:10},
  {cas:'2A', label:'Sponsor Identified', day:15},
  {cas:'2B', label:'Sponsor Qualified', day:20},
  {cas:'2C', label:'Sponsor Selling', day:25},
  {cas:'3A', label:'Approach Doc Draft', day:30},
  {cas:'3B', label:'Document Approach', day:35},
  {cas:'3C', label:'Approach Agreed', day:40},
  {cas:'3D', label:'Proof Planned', day:45},
  {cas:'3E', label:'Proof Delivered', day:50},
  {cas:'4A', label:'Proposal Draft', day:55},
  {cas:'4B', label:'Proposal Delivered', day:60},
  {cas:'4C', label:'Negotiation', day:65},
  {cas:'4D', label:'Verbal Agree', day:70},
  {cas:'5A', label:'Contract Sent', day:75},
  {cas:'5B', label:'Contract Signed', day:80},
  {cas:'5VO', label:'Value Obtained', day:88},
];

// ═══════════════════════════════════════════════════════
// SEEDED RNG
// ═══════════════════════════════════════════════════════
function makeRng(seed) {
  let s = Math.abs(Math.floor(seed)) || 1;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

// ═══════════════════════════════════════════════════════
// TEXTURE THEMES
// ═══════════════════════════════════════════════════════
const THEMES = {
  wireframe: {
    name: 'Wireframe',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.95;
      ctx.strokeStyle = 'rgba(255,248,220,0.7)'; ctx.lineWidth = 0.8;
      if (level >= 1) { ctx.beginPath(); ctx.moveTo(x, y+h); ctx.lineTo(x+w, y); ctx.stroke(); }
      if (level >= 2) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+w, y+h); ctx.stroke(); }
      if (level >= 3) {
        ctx.beginPath(); ctx.moveTo(x, y+h/2); ctx.lineTo(x+w, y+h/2); ctx.moveTo(x+w/2, y); ctx.lineTo(x+w/2, y+h); ctx.stroke();
      }
      if (level >= 4) {
        ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w,y+h/2); ctx.lineTo(x+w/2,y+h); ctx.lineTo(x,y+h/2); ctx.closePath(); ctx.stroke();
      }
      ctx.restore();
    },
  },
  concentric: {
    name: 'Concentric',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.65)';
      const cx = x + w/2, cy = y + h/2, maxR = Math.min(w, h) / 2;
      for (let i = 1; i <= level; i++) {
        ctx.lineWidth = 0.7 + (level - i) * 0.15;
        ctx.beginPath(); ctx.arc(cx, cy, maxR * (i / (level + 0.5)), 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    }
  },
  waves: {
    name: 'Waves',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.7)';
      const amp = h / (2 + level);
      for (let wn = 0; wn < level; wn++) {
        const yOff = y + h * ((wn + 1) / (level + 1));
        ctx.lineWidth = 0.7 + (level - wn) * 0.15;
        ctx.beginPath();
        for (let px = 0; px <= w; px += 2) {
          const sy = yOff + Math.sin((px / w) * Math.PI * 2 * (1 + wn * 0.5) + wn * 0.8) * amp;
          px === 0 ? ctx.moveTo(x, sy) : ctx.lineTo(x + px, sy);
        }
        ctx.stroke();
      }
      ctx.restore();
    }
  },
  radialBurst: {
    name: 'Sunburst',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.65)';
      const cx = x + w/2, cy = y + h/2, maxR = Math.min(w, h) / 2;
      const rays = [0, 3, 6, 10, 16][level]; ctx.lineWidth = 0.7;
      for (let i = 0; i < rays; i++) {
        const a = (i / rays) * Math.PI * 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + maxR * Math.cos(a), cy + maxR * Math.sin(a)); ctx.stroke();
      }
      ctx.restore();
    }
  },
  hatching: {
    name: 'Hatching',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.65)';
      const sp = Math.max(4, 14 - level * 2.5);
      ctx.lineWidth = 0.5 + level * 0.15;
      for (let o = -h; o < w + h; o += sp) { ctx.beginPath(); ctx.moveTo(x + o, y + h); ctx.lineTo(x + o + h, y); ctx.stroke(); }
      if (level >= 3) for (let o = -h; o < w + h; o += sp) { ctx.beginPath(); ctx.moveTo(x + o, y); ctx.lineTo(x + o + h, y + h); ctx.stroke(); }
      ctx.restore();
    }
  },
  dots: {
    name: 'Stipple',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = 'rgba(255,248,220,0.7)';
      const density = [0, 2, 5, 10, 18][level];
      const rand = makeRng(x * 7 + y * 13);
      for (let i = 0; i < density; i++) {
        const r = 0.6 + rand() * (0.4 + level * 0.3);
        ctx.beginPath(); ctx.arc(x + rand() * w, y + rand() * h, r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }
  },
  weave: {
    name: 'Weave',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.65)';
      const gap = Math.max(5, 14 - level * 2); ctx.lineWidth = 0.6;
      for (let row = 0; row < h; row += gap) {
        ctx.beginPath();
        for (let px = 0; px <= w; px += 2) {
          const sy = y + row + Math.sin((px + row * 2) / (5 + level) * Math.PI) * (2 + level * 0.5);
          px === 0 ? ctx.moveTo(x, sy) : ctx.lineTo(x + px, sy);
        }
        ctx.stroke();
      }
      if (level >= 2) for (let col = 0; col < w; col += gap) {
        ctx.beginPath();
        for (let py = 0; py <= h; py += 2) {
          const sx = x + col + Math.sin((py + col * 2) / (5 + level) * Math.PI) * (2 + level * 0.5);
          py === 0 ? ctx.moveTo(sx, y) : ctx.lineTo(sx, y + py);
        }
        ctx.stroke();
      }
      ctx.restore();
    }
  },
  dataSpokes: {
    name: 'Data Spokes',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      const cx = x + w/2, cy = y + h/2, maxR = Math.min(w, h) / 2;
      const spokeCount = [0, 2, 4, 7, 10][level];
      const rand = makeRng(x * 11 + y * 7 + level * 3);
      for (let i = 0; i < spokeCount; i++) {
        const a = (i / spokeCount) * Math.PI * 2 + rand() * 0.3;
        ctx.strokeStyle = 'rgba(255,240,180,0.6)'; ctx.lineWidth = 0.3;
        ctx.setLineDash([1.5, 2]);
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + maxR * Math.cos(a), cy + maxR * Math.sin(a)); ctx.stroke(); ctx.setLineDash([]);
        const dotCount = 1 + Math.floor(level * 0.8);
        for (let d = 0; d < dotCount; d++) {
          const r = maxR * (0.2 + rand() * 0.75), dotR = 0.8 + rand() * 1.0;
          ctx.fillStyle = rand() > 0.5 ? 'rgba(255,255,240,0.8)' : 'rgba(255,245,200,0.7)';
          ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), dotR, 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.restore();
    }
  },
  pulseRings: {
    name: 'Pulse Rings',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      const cx = x + w/2, cy = y + h/2, maxR = Math.min(w, h) / 2;
      const rand = makeRng(x * 5 + y * 9);
      for (let ri = 0; ri < level; ri++) {
        const r = maxR * ((ri + 1) / (level + 0.5));
        ctx.strokeStyle = 'rgba(255,248,220,0.4)'; ctx.lineWidth = 0.4;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        const sc = 6 + level * 4;
        ctx.strokeStyle = 'rgba(255,248,220,0.65)'; ctx.lineWidth = 0.4; ctx.beginPath();
        for (let s = 0; s < sc; s++) {
          const a = (s / sc) * Math.PI * 2;
          const sH = (rand() * 0.5 + 0.2) * (maxR * 0.15) * (level / 4);
          ctx.moveTo(cx + (r - sH * 0.3) * Math.cos(a), cy + (r - sH * 0.3) * Math.sin(a));
          ctx.lineTo(cx + (r + sH) * Math.cos(a), cy + (r + sH) * Math.sin(a));
        }
        ctx.stroke();
      }
      ctx.restore();
    }
  },
  scatterField: {
    name: 'Scatter',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.95;
      const density = [0, 3, 10, 22, 40][level];
      const rand = makeRng(x * 13 + y * 17);
      for (let i = 0; i < density; i++) {
        const size = 0.6 + rand() * (0.8 + level * 0.4);
        ctx.fillStyle = rand() > 0.4 ? `rgba(255,250,220,${0.4 + rand() * 0.4})` : `rgba(255,240,200,${0.3 + rand() * 0.4})`;
        ctx.beginPath(); ctx.arc(x + rand() * w, y + rand() * h, size, 0, Math.PI * 2); ctx.fill();
      }
      if (level >= 3) {
        ctx.strokeStyle = 'rgba(255,248,220,0.2)'; ctx.lineWidth = 0.3;
        const r2 = makeRng(x * 3 + y * 7);
        for (let i = 0; i < level * 3; i++) { ctx.beginPath(); ctx.moveTo(x + r2() * w, y + r2() * h); ctx.lineTo(x + r2() * w, y + r2() * h); ctx.stroke(); }
      }
      ctx.restore();
    }
  },
  signalWave: {
    name: 'Signal',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      const wc = Math.ceil(level * 0.8);
      const rand = makeRng(x * 9 + y * 5 + level);
      for (let wn = 0; wn < wc; wn++) {
        const yB = y + h * ((wn + 1) / (wc + 1));
        ctx.strokeStyle = wn % 2 === 0 ? 'rgba(255,250,210,0.7)' : 'rgba(255,240,190,0.6)';
        ctx.lineWidth = 0.7 + (wc - wn) * 0.15;
        ctx.beginPath(); let px = 0; ctx.moveTo(x, yB);
        while (px < w) {
          const fl = 4 + rand() * (12 - level * 2);
          ctx.lineTo(x + Math.min(px + fl, w), yB); px += fl;
          if (px >= w) break;
          const sH = (rand() - 0.3) * h * (0.2 + level * 0.1), sW = 2 + rand() * 3;
          ctx.lineTo(x + px + sW * 0.3, yB - sH); ctx.lineTo(x + px + sW * 0.6, yB + sH * 0.4); ctx.lineTo(x + px + sW, yB);
          px += sW;
        }
        ctx.stroke();
      }
      ctx.restore();
    }
  },
  spiral: {
    name: 'Spiral',
    draw(ctx, x, y, w, h, level, alpha) {
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.65)';
      const cx = x + w/2, cy = y + h/2, maxR = Math.min(w, h) / 2;
      const arms = Math.min(level, 2), turns = 0.5 + level * 0.4; ctx.lineWidth = 0.7;
      for (let arm = 0; arm < arms; arm++) {
        const off = (arm / arms) * Math.PI * 2; ctx.beginPath();
        for (let t = 0; t <= 1; t += 0.01) {
          const a = off + t * turns * Math.PI * 2, r = t * maxR;
          t === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a)) : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        }
        ctx.stroke();
      }
      ctx.restore();
    }
  },

  // ── NEW TEXTURE THEMES (inspired by reference images) ──

  halftone: {
    name: 'Halftone',
    draw(ctx, x, y, w, h, level, alpha) {
      // Halftone dots — sparse small to dense large, like newspaper print
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = 'rgba(255,248,220,0.75)';
      const spacing = [0, 14, 10, 8, 6][level];
      const maxDotR = [0, 1.2, 1.8, 2.4, 2.8][level];
      const rand = makeRng(x * 11 + y * 23);
      for (let gy = 0; gy < h; gy += spacing) {
        for (let gx = 0; gx < w; gx += spacing) {
          const jx = (rand() - 0.5) * spacing * 0.3;
          const jy = (rand() - 0.5) * spacing * 0.3;
          const r = maxDotR * (0.3 + rand() * 0.7);
          ctx.beginPath();
          ctx.arc(x + gx + jx, y + gy + jy, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }
  },

  pixelDissolve: {
    name: 'Pixel',
    draw(ctx, x, y, w, h, level, alpha) {
      // Pixel dissolve — scattered square pixels, denser at higher levels
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      const pixelSize = [0, 6, 5, 4, 3][level];
      const density = [0, 0.06, 0.14, 0.28, 0.45][level];
      const rand = makeRng(x * 19 + y * 31);
      const cols = Math.ceil(w / pixelSize), rows = Math.ceil(h / pixelSize);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (rand() < density) {
            const shade = 0.2 + rand() * 0.5;
            ctx.fillStyle = `rgba(226,232,240,${shade})`;
            ctx.fillRect(x + c * pixelSize, y + r * pixelSize, pixelSize * 0.9, pixelSize * 0.9);
          }
        }
      }
      ctx.restore();
    }
  },

  diamondGrid: {
    name: 'Diamond',
    draw(ctx, x, y, w, h, level, alpha) {
      // Nested diamond/rhombus pattern — like the reference grid
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.65)';
      const spacing = Math.max(6, 18 - level * 3);
      ctx.lineWidth = 0.5 + level * 0.1;
      // Diamond grid = 45-degree rotated squares
      for (let gy = -spacing; gy < h + spacing; gy += spacing) {
        for (let gx = -spacing; gx < w + spacing; gx += spacing) {
          const cx = x + gx, cy = y + gy;
          const s = spacing * 0.4;
          ctx.beginPath();
          ctx.moveTo(cx, cy - s); ctx.lineTo(cx + s, cy);
          ctx.lineTo(cx, cy + s); ctx.lineTo(cx - s, cy);
          ctx.closePath(); ctx.stroke();
          if (level >= 3) {
            const s2 = s * 0.5;
            ctx.beginPath();
            ctx.moveTo(cx, cy - s2); ctx.lineTo(cx + s2, cy);
            ctx.lineTo(cx, cy + s2); ctx.lineTo(cx - s2, cy);
            ctx.closePath(); ctx.stroke();
          }
        }
      }
      ctx.restore();
    }
  },

  checkerboard: {
    name: 'Checker',
    draw(ctx, x, y, w, h, level, alpha) {
      // Checkerboard — gets finer/denser at higher levels
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      const cellSize = [0, 10, 8, 6, 4][level];
      const cols = Math.ceil(w / cellSize), rows = Math.ceil(h / cellSize);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r + c) % 2 === 0) {
            ctx.fillStyle = 'rgba(255,248,220,0.55)';
            ctx.fillRect(x + c * cellSize, y + r * cellSize, cellSize, cellSize);
          }
        }
      }
      ctx.restore();
    }
  },

  circuit: {
    name: 'Circuit',
    draw(ctx, x, y, w, h, level, alpha) {
      // Circuit board traces — orthogonal paths with node dots
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'rgba(255,248,220,0.6)';
      ctx.fillStyle = 'rgba(255,248,220,0.7)';
      const traceCount = [0, 1, 3, 5, 8][level];
      const rand = makeRng(x * 17 + y * 29 + level * 7);
      ctx.lineWidth = 0.6;
      for (let i = 0; i < traceCount; i++) {
        let px = x + rand() * w, py = y + rand() * h;
        ctx.beginPath(); ctx.moveTo(px, py);
        // Node at start
        ctx.fillRect(px - 1.5, py - 1.5, 3, 3);
        const segments = 2 + Math.floor(rand() * (level + 1));
        for (let s = 0; s < segments; s++) {
          if (rand() > 0.5) {
            // Horizontal
            px += (rand() - 0.5) * w * 0.5;
            px = Math.max(x, Math.min(x + w, px));
          } else {
            // Vertical
            py += (rand() - 0.5) * h * 0.5;
            py = Math.max(y, Math.min(y + h, py));
          }
          ctx.lineTo(px, py);
        }
        ctx.stroke();
        // Node at end
        ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }
  },

  verticalBars: {
    name: 'Bars',
    draw(ctx, x, y, w, h, level, alpha) {
      // Vertical bars with sine-wave modulated height — like the reference image
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = 'rgba(255,248,220,0.7)';
      const barSpacing = [0, 10, 7, 5, 3.5][level];
      const barWidth = barSpacing * 0.45;
      const rand = makeRng(x * 7 + y * 11);
      for (let bx = 0; bx < w; bx += barSpacing) {
        // Wave-modulated height
        const waveT = bx / w;
        const waveH = h * (0.2 + 0.6 * Math.abs(Math.sin(waveT * Math.PI * (1 + level * 0.5) + rand() * 2)));
        const barY = y + (h - waveH) / 2;
        ctx.fillRect(x + bx, barY, barWidth, waveH);
      }
      ctx.restore();
    }
  },

  barcode: {
    name: 'Barcode',
    draw(ctx, x, y, w, h, level, alpha) {
      // Frequency barcode — vertical lines of varying width/spacing like audio waveform
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = 'rgba(255,248,220,0.7)';
      const rand = makeRng(x * 13 + y * 37 + level);
      let bx = 0;
      while (bx < w) {
        const barW = 0.6 + rand() * (1.0 + level * 0.5);
        const gap = 1.0 + rand() * (6 - level * 1.2);
        const barH = h * (0.2 + rand() * (0.25 + level * 0.12));
        const barY = y + (h - barH) / 2;
        ctx.fillRect(x + bx, barY, barW, barH);
        bx += barW + gap;
      }
      ctx.restore();
    }
  },

  polkaDot: {
    name: 'Polka',
    draw(ctx, x, y, w, h, level, alpha) {
      // Regular polka dots — evenly spaced, size increases with level
      if (level <= 0) return;
      ctx.save(); ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = 'rgba(255,248,220,0.7)';
      const spacing = [0, 12, 10, 8, 6][level];
      const dotR = [0, 2.2, 2.5, 2.8, 3.0][level];
      for (let gy = spacing / 2; gy < h; gy += spacing) {
        const offset = (Math.floor(gy / spacing) % 2) * (spacing / 2);
        for (let gx = spacing / 2 + offset; gx < w; gx += spacing) {
          ctx.beginPath();
          ctx.arc(x + gx, y + gy, dotR, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }
  },
};

// Polar texture renderer — draws elements natively in polar coordinates
// All textures render as concentric arcs, radial lines, or polar-grid elements
function drawPolarTexture(themeKey, ctx, cx, cy, innerR, outerR, a1, a2, level, alpha) {
  if (level <= 0) return;
  ctx.save();

  // Clip to the annular wedge
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, a1, a2);
  ctx.arc(cx, cy, outerR, a2, a1, true);
  ctx.closePath();
  ctx.clip();

  ctx.globalAlpha = alpha * 0.9;
  const bandW = outerR - innerR;
  const arcSpan = Math.abs(a2 - a1);
  const midR = (innerR + outerR) / 2;
  const arcLen = arcSpan * midR;
  const rand = makeRng(Math.round(innerR * 7 + a1 * 100 + level * 13));

  const col1 = 'rgba(255,248,220,';  // warm white
  const col2 = 'rgba(255,240,190,';  // soft yellow

  switch (themeKey) {
    case 'wireframe': {
      // Radial lines + concentric arcs
      ctx.strokeStyle = col1 + '0.7)'; ctx.lineWidth = 0.8;
      const radialCount = Math.max(1, Math.round(arcLen / (18 - level * 2)));
      for (let i = 0; i <= radialCount; i++) {
        const a = a1 + (i / radialCount) * arcSpan;
        ctx.beginPath();
        ctx.moveTo(cx + innerR * Math.cos(a), cy + innerR * Math.sin(a));
        ctx.lineTo(cx + outerR * Math.cos(a), cy + outerR * Math.sin(a));
        ctx.stroke();
      }
      const ringCount = Math.max(1, level);
      for (let i = 1; i <= ringCount; i++) {
        const r = innerR + (i / (ringCount + 1)) * bandW;
        ctx.beginPath(); ctx.arc(cx, cy, r, a1, a2); ctx.stroke();
      }
      break;
    }
    case 'concentric': {
      ctx.strokeStyle = col1 + '0.65)';
      for (let i = 1; i <= level; i++) {
        const r = innerR + (i / (level + 0.5)) * bandW;
        ctx.lineWidth = 0.7 + (level - i) * 0.15;
        ctx.beginPath(); ctx.arc(cx, cy, r, a1, a2); ctx.stroke();
      }
      break;
    }
    case 'waves': {
      ctx.strokeStyle = col1 + '0.7)'; ctx.lineWidth = 0.7;
      for (let wn = 0; wn < level; wn++) {
        const baseR = innerR + ((wn + 1) / (level + 1)) * bandW;
        const amp = bandW / (3 + level);
        ctx.beginPath();
        const steps = Math.max(20, Math.round(arcLen / 2));
        for (let s = 0; s <= steps; s++) {
          const t = s / steps;
          const a = a1 + t * arcSpan;
          const r = baseR + Math.sin(t * Math.PI * 2 * (1 + wn * 0.5)) * amp;
          s === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
                   : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        }
        ctx.stroke();
      }
      break;
    }
    case 'radialBurst': {
      ctx.strokeStyle = col1 + '0.65)'; ctx.lineWidth = 0.7;
      const rays = [0, 3, 6, 10, 16][level];
      for (let i = 0; i < rays; i++) {
        const a = a1 + (i / rays) * arcSpan;
        ctx.beginPath();
        ctx.moveTo(cx + innerR * Math.cos(a), cy + innerR * Math.sin(a));
        ctx.lineTo(cx + outerR * Math.cos(a), cy + outerR * Math.sin(a));
        ctx.stroke();
      }
      break;
    }
    case 'hatching': {
      ctx.strokeStyle = col1 + '0.65)';
      const sp = Math.max(4, 14 - level * 2.5);
      ctx.lineWidth = 0.5 + level * 0.15;
      // Diagonal lines in polar: offset radial lines
      const count = Math.max(2, Math.round(arcLen / sp));
      for (let i = 0; i < count; i++) {
        const a = a1 + (i / count) * arcSpan;
        const aOff = arcSpan / count * 0.8;
        ctx.beginPath();
        ctx.moveTo(cx + innerR * Math.cos(a), cy + innerR * Math.sin(a));
        ctx.lineTo(cx + outerR * Math.cos(a + aOff), cy + outerR * Math.sin(a + aOff));
        ctx.stroke();
      }
      if (level >= 3) {
        for (let i = 0; i < count; i++) {
          const a = a1 + (i / count) * arcSpan;
          const aOff = arcSpan / count * 0.8;
          ctx.beginPath();
          ctx.moveTo(cx + innerR * Math.cos(a + aOff), cy + innerR * Math.sin(a + aOff));
          ctx.lineTo(cx + outerR * Math.cos(a), cy + outerR * Math.sin(a));
          ctx.stroke();
        }
      }
      break;
    }
    case 'dots': {
      ctx.fillStyle = col1 + '0.7)';
      const density = [0, 2, 5, 10, 18][level];
      for (let i = 0; i < density; i++) {
        const r = innerR + rand() * bandW;
        const a = a1 + rand() * arcSpan;
        const dotR = 0.6 + rand() * (0.4 + level * 0.3);
        ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), dotR, 0, Math.PI * 2); ctx.fill();
      }
      break;
    }
    case 'weave': {
      ctx.strokeStyle = col1 + '0.65)'; ctx.lineWidth = 0.6;
      const gap = Math.max(5, 14 - level * 2);
      // Concentric wavy arcs
      const ringC = Math.max(1, Math.round(bandW / gap));
      for (let ri = 0; ri < ringC; ri++) {
        const baseR = innerR + (ri + 0.5) / ringC * bandW;
        ctx.beginPath();
        const steps = Math.max(16, Math.round(arcLen / 3));
        for (let s = 0; s <= steps; s++) {
          const t = s / steps;
          const a = a1 + t * arcSpan;
          const r = baseR + Math.sin(t * Math.PI * (3 + level) + ri * 2) * (2 + level * 0.5);
          s === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
                   : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        }
        ctx.stroke();
      }
      break;
    }
    case 'dataSpokes': {
      const spokeCount = [0, 2, 4, 7, 10][level];
      for (let i = 0; i < spokeCount; i++) {
        const a = a1 + rand() * arcSpan;
        ctx.strokeStyle = col2 + '0.6)'; ctx.lineWidth = 0.5;
        ctx.setLineDash([2, 3]);
        ctx.beginPath();
        ctx.moveTo(cx + innerR * Math.cos(a), cy + innerR * Math.sin(a));
        ctx.lineTo(cx + outerR * Math.cos(a), cy + outerR * Math.sin(a));
        ctx.stroke(); ctx.setLineDash([]);
        const dotCount = 1 + Math.floor(level * 0.8);
        for (let d = 0; d < dotCount; d++) {
          const r = innerR + rand() * bandW;
          ctx.fillStyle = col1 + '0.8)';
          ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), 0.8 + rand(), 0, Math.PI * 2); ctx.fill();
        }
      }
      break;
    }
    case 'pulseRings': {
      for (let ri = 0; ri < level; ri++) {
        const r = innerR + ((ri + 1) / (level + 0.5)) * bandW;
        ctx.strokeStyle = col1 + '0.4)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.arc(cx, cy, r, a1, a2); ctx.stroke();
        ctx.strokeStyle = col1 + '0.65)'; ctx.lineWidth = 0.5;
        const tickCount = Math.max(4, 6 + level * 3);
        ctx.beginPath();
        for (let s = 0; s < tickCount; s++) {
          const a = a1 + (s / tickCount) * arcSpan;
          const sH = (rand() * 0.5 + 0.2) * (bandW * 0.12) * (level / 3);
          ctx.moveTo(cx + (r - sH) * Math.cos(a), cy + (r - sH) * Math.sin(a));
          ctx.lineTo(cx + (r + sH) * Math.cos(a), cy + (r + sH) * Math.sin(a));
        }
        ctx.stroke();
      }
      break;
    }
    case 'scatterField': {
      const density = [0, 3, 10, 22, 40][level];
      for (let i = 0; i < density; i++) {
        const r = innerR + rand() * bandW;
        const a = a1 + rand() * arcSpan;
        const size = 0.6 + rand() * (0.8 + level * 0.4);
        ctx.fillStyle = col1 + (0.4 + rand() * 0.4) + ')';
        ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), size, 0, Math.PI * 2); ctx.fill();
      }
      break;
    }
    case 'signalWave': {
      const wc = Math.ceil(level * 0.8);
      for (let wn = 0; wn < wc; wn++) {
        const baseR = innerR + ((wn + 1) / (wc + 1)) * bandW;
        ctx.strokeStyle = col1 + '0.7)'; ctx.lineWidth = 0.7;
        ctx.beginPath();
        const steps = Math.max(20, Math.round(arcLen / 3));
        let s = 0;
        const aStart = a1;
        ctx.moveTo(cx + baseR * Math.cos(aStart), cy + baseR * Math.sin(aStart));
        while (s < steps) {
          const flat = 2 + Math.floor(rand() * (6 - level));
          for (let f = 0; f < flat && s < steps; f++, s++) {
            const a = a1 + (s / steps) * arcSpan;
            ctx.lineTo(cx + baseR * Math.cos(a), cy + baseR * Math.sin(a));
          }
          if (s >= steps) break;
          const spike = baseR + (rand() - 0.3) * bandW * 0.4;
          const a = a1 + (s / steps) * arcSpan;
          ctx.lineTo(cx + spike * Math.cos(a), cy + spike * Math.sin(a));
          s++;
        }
        ctx.stroke();
      }
      break;
    }
    case 'spiral': {
      ctx.strokeStyle = col1 + '0.65)'; ctx.lineWidth = 0.7;
      const arms = Math.min(level, 2);
      for (let arm = 0; arm < arms; arm++) {
        ctx.beginPath();
        const steps = 60;
        for (let s = 0; s <= steps; s++) {
          const t = s / steps;
          const a = a1 + t * arcSpan + (arm / arms) * arcSpan;
          const r = innerR + t * bandW;
          if (a > a2) break;
          s === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
                   : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        }
        ctx.stroke();
      }
      break;
    }
    case 'halftone': {
      ctx.fillStyle = col1 + '0.75)';
      const spacing = [0, 14, 10, 8, 6][level];
      const maxDotR = [0, 1.2, 1.8, 2.4, 2.8][level];
      const ringCount = Math.max(1, Math.round(bandW / spacing));
      for (let ri = 0; ri < ringCount; ri++) {
        const r = innerR + (ri + 0.5) / ringCount * bandW;
        const circumArc = arcSpan * r;
        const dotCount = Math.max(1, Math.round(circumArc / spacing));
        for (let di = 0; di < dotCount; di++) {
          const a = a1 + (di + 0.5) / dotCount * arcSpan;
          const dr = maxDotR * (0.3 + rand() * 0.7);
          ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), dr, 0, Math.PI * 2); ctx.fill();
        }
      }
      break;
    }
    case 'pixelDissolve': {
      const pixelSize = [0, 6, 5, 4, 3][level];
      const density = [0, 0.06, 0.14, 0.28, 0.45][level];
      const ringCount = Math.max(1, Math.round(bandW / pixelSize));
      for (let ri = 0; ri < ringCount; ri++) {
        const r = innerR + (ri + 0.5) / ringCount * bandW;
        const circumArc = arcSpan * r;
        const cellCount = Math.max(1, Math.round(circumArc / pixelSize));
        for (let ci = 0; ci < cellCount; ci++) {
          if (rand() > density) continue;
          const a = a1 + (ci / cellCount) * arcSpan;
          const aW = arcSpan / cellCount * 0.85;
          const rH = bandW / ringCount * 0.85;
          const rInner = innerR + ri / ringCount * bandW;
          ctx.fillStyle = col1 + (0.3 + rand() * 0.5) + ')';
          ctx.beginPath();
          ctx.arc(cx, cy, rInner, a, a + aW);
          ctx.arc(cx, cy, rInner + rH, a + aW, a, true);
          ctx.closePath(); ctx.fill();
        }
      }
      break;
    }
    case 'diamondGrid': {
      ctx.strokeStyle = col1 + '0.65)';
      const spacing = Math.max(6, 18 - level * 3);
      ctx.lineWidth = 0.5 + level * 0.1;
      const ringCount = Math.max(1, Math.round(bandW / spacing));
      for (let ri = 0; ri < ringCount; ri++) {
        const r = innerR + (ri + 0.5) / ringCount * bandW;
        const circumArc = arcSpan * r;
        const cellCount = Math.max(1, Math.round(circumArc / spacing));
        for (let ci = 0; ci < cellCount; ci++) {
          const a = a1 + (ci + 0.5) / cellCount * arcSpan;
          const s = spacing * 0.35;
          const sA = s / r; // angular size
          ctx.beginPath();
          ctx.moveTo(cx + r * Math.cos(a - sA), cy + r * Math.sin(a - sA));
          ctx.lineTo(cx + (r + s) * Math.cos(a), cy + (r + s) * Math.sin(a));
          ctx.lineTo(cx + r * Math.cos(a + sA), cy + r * Math.sin(a + sA));
          ctx.lineTo(cx + (r - s) * Math.cos(a), cy + (r - s) * Math.sin(a));
          ctx.closePath(); ctx.stroke();
        }
      }
      break;
    }
    case 'checkerboard': {
      const cellSize = [0, 10, 8, 6, 4][level];
      const ringCount = Math.max(1, Math.round(bandW / cellSize));
      for (let ri = 0; ri < ringCount; ri++) {
        const rInner = innerR + ri / ringCount * bandW;
        const rOuter = innerR + (ri + 1) / ringCount * bandW;
        const rMid = (rInner + rOuter) / 2;
        const circumArc = arcSpan * rMid;
        const cellCount = Math.max(1, Math.round(circumArc / cellSize));
        for (let ci = 0; ci < cellCount; ci++) {
          if ((ri + ci) % 2 !== 0) continue;
          const cA1 = a1 + (ci / cellCount) * arcSpan;
          const cA2 = a1 + ((ci + 1) / cellCount) * arcSpan;
          ctx.fillStyle = col1 + '0.55)';
          ctx.beginPath();
          ctx.arc(cx, cy, rInner, cA1, cA2);
          ctx.arc(cx, cy, rOuter, cA2, cA1, true);
          ctx.closePath(); ctx.fill();
        }
      }
      break;
    }
    case 'circuit': {
      const traceCount = [0, 1, 3, 5, 8][level];
      ctx.strokeStyle = col1 + '0.6)'; ctx.lineWidth = 0.6;
      ctx.fillStyle = col1 + '0.7)';
      for (let i = 0; i < traceCount; i++) {
        let r = innerR + rand() * bandW;
        let a = a1 + rand() * arcSpan;
        ctx.beginPath();
        ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), 1.5, 0, Math.PI * 2); ctx.fill();
        const segs = 2 + Math.floor(rand() * (level + 1));
        ctx.beginPath(); ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        for (let s = 0; s < segs; s++) {
          if (rand() > 0.5) { a = a1 + rand() * arcSpan; }
          else { r = innerR + rand() * bandW; }
          ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        }
        ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), 1.5, 0, Math.PI * 2); ctx.fill();
      }
      break;
    }
    case 'verticalBars': {
      // Radial bars (spokes) with varying length
      ctx.fillStyle = col1 + '0.7)';
      const barSpacing = [0, 10, 7, 5, 3.5][level];
      const circumArc = arcSpan * midR;
      const barCount = Math.max(1, Math.round(circumArc / barSpacing));
      const barAngularW = arcSpan / barCount * 0.45;
      for (let i = 0; i < barCount; i++) {
        const a = a1 + (i + 0.5) / barCount * arcSpan;
        const waveH = bandW * (0.2 + 0.6 * Math.abs(Math.sin(i / barCount * Math.PI * (1 + level * 0.5) + rand() * 2)));
        const bInner = innerR + (bandW - waveH) / 2;
        const bOuter = bInner + waveH;
        ctx.beginPath();
        ctx.arc(cx, cy, bInner, a - barAngularW, a + barAngularW);
        ctx.arc(cx, cy, bOuter, a + barAngularW, a - barAngularW, true);
        ctx.closePath(); ctx.fill();
      }
      break;
    }
    case 'barcode': {
      ctx.fillStyle = col1 + '0.7)';
      let curA = a1;
      while (curA < a2) {
        const barAW = (0.003 + rand() * (0.005 + level * 0.002));
        const gapAW = (0.005 + rand() * (0.02 - level * 0.003));
        const barH = bandW * (0.2 + rand() * (0.25 + level * 0.12));
        const bInner = innerR + (bandW - barH) / 2;
        const bOuter = bInner + barH;
        if (curA + barAW > a2) break;
        ctx.beginPath();
        ctx.arc(cx, cy, bInner, curA, curA + barAW);
        ctx.arc(cx, cy, bOuter, curA + barAW, curA, true);
        ctx.closePath(); ctx.fill();
        curA += barAW + gapAW;
      }
      break;
    }
    case 'polkaDot': {
      ctx.fillStyle = col1 + '0.7)';
      const spacing = [0, 12, 10, 8, 6][level];
      const dotR = [0, 2.2, 2.5, 2.8, 3.0][level];
      const ringCount = Math.max(1, Math.round(bandW / spacing));
      for (let ri = 0; ri < ringCount; ri++) {
        const r = innerR + (ri + 0.5) / ringCount * bandW;
        const circumArc = arcSpan * r;
        const dotCount = Math.max(1, Math.round(circumArc / spacing));
        const offset = (ri % 2) * (arcSpan / dotCount / 2);
        for (let di = 0; di < dotCount; di++) {
          const a = a1 + offset + (di + 0.5) / dotCount * arcSpan;
          if (a > a2) break;
          ctx.beginPath(); ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), dotR, 0, Math.PI * 2); ctx.fill();
        }
      }
      break;
    }
    default: {
      // Fallback: concentric arcs
      ctx.strokeStyle = col1 + '0.5)'; ctx.lineWidth = 0.5;
      for (let i = 1; i <= level; i++) {
        const r = innerR + (i / (level + 1)) * bandW;
        ctx.beginPath(); ctx.arc(cx, cy, r, a1, a2); ctx.stroke();
      }
    }
  }
  ctx.restore();
}

// Legacy flat texture adapter (for flat view only)
function drawRadialTexture(theme, ctx, cx, cy, innerR, outerR, a1, a2, level, alpha) {
  if (level <= 0) return;
  ctx.save();
  const midA = (a1 + a2) / 2, midR = (innerR + outerR) / 2;
  const w = (a2 - a1) * midR, h = outerR - innerR;
  ctx.translate(cx + midR * Math.cos(midA), cy + midR * Math.sin(midA));
  ctx.rotate(midA + Math.PI / 2);
  ctx.beginPath(); ctx.rect(-w/2, -h/2, w, h); ctx.clip();
  theme.draw(ctx, -w/2, -h/2, w, h, level, alpha);
  ctx.restore();
}

// Build day-by-day arrays from events — STEP FUNCTION (scores hold flat until next event)
function buildDayArrays(deal) {
  const dayScores = new Array(TOTAL_DAYS);
  const dayStages = new Array(TOTAL_DAYS);
  const dayStakeholders = new Array(TOTAL_DAYS);

  const events = deal.events;
  const zeroScores = {pain:0,power:0,vision:0,value:0,change:0,control:0};

  for (let d = 0; d < TOTAL_DAYS; d++) {
    if (d > deal.currentDay) {
      dayScores[d] = null;
    } else {
      // Step function — hold at most recent event's scores
      let prevEv = null;
      for (let i = 0; i < events.length; i++) {
        if (events[i].day <= d) prevEv = events[i];
      }
      dayScores[d] = prevEv ? {...prevEv.scores} : {...zeroScores};
    }

    // Stage: step function
    let lastStage = 'discover';
    for (const ev of events) {
      if (ev.day <= d) lastStage = ev.stage;
    }
    dayStages[d] = lastStage;

    // Stakeholders: step function
    let lastStakes = [];
    for (const ev of events) {
      if (ev.day <= d) lastStakes = ev.stakeholders || [];
    }
    dayStakeholders[d] = d <= deal.currentDay ? lastStakes : [];
  }
  return {dayScores, dayStages, dayStakeholders};
}
