    row.style.cssText = 'display:flex;align-items:center;gap:4px;margin-bottom:2px';
    row.innerHTML = `<span style="font-size:7px;color:${col.h};width:42px">${DIM_LABELS[dim]}</span>
      <input type="range" min="0" max="5" value="${ev.scores[dim] || 0}" step="0.5" class="sb-slider" style="flex:1;accent-color:${col.h}">
      <span style="font-size:8px;color:${col.h};width:16px;text-align:right;font-weight:700">${ev.scores[dim] || 0}</span>`;
    row.querySelector('input').addEventListener('input', e => {
      ev.scores[dim] = parseFloat(e.target.value);
      row.querySelector('span:last-child').textContent = ev.scores[dim];
      // Update total in milestone button
      const total = DIMS.reduce((s, d) => s + (ev.scores[d] || 0), 0);
      const btns = document.getElementById('milestoneButtons').children;
      if (btns[editingMilestoneIdx]) btns[editingMilestoneIdx].textContent = `D${ev.day} (${total})`;
      renderAll();
    });
    sliders.appendChild(row);
  });

  // Action buttons row
  const actRow = document.createElement('div');
  actRow.style.cssText = 'display:flex;gap:3px;margin-top:6px;flex-wrap:wrap';

  // Duplicate milestone
  const dupBtn = document.createElement('button');
  dupBtn.className = 'toggle-btn';
  dupBtn.textContent = 'Duplicate';
  dupBtn.style.cssText = 'font-size:7px;color:#4ade80;flex:1';
  dupBtn.onclick = () => {
    const copy = {day: Math.min(90, ev.day + 5), stage: ev.stage, scores: {...ev.scores}, stakeholders: ev.stakeholders ? [...ev.stakeholders] : []};
    deal.events.splice(editingMilestoneIdx + 1, 0, copy);
    deal.currentDay = Math.max(...deal.events.map(e => e.day));
    editingMilestoneIdx = editingMilestoneIdx + 1;
    buildMilestoneEditor(); renderAll();
  };
  actRow.appendChild(dupBtn);

  // Copy scores from previous
  if (editingMilestoneIdx > 0) {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'toggle-btn';
    copyBtn.textContent = 'Copy Prev Scores';
    copyBtn.style.cssText = 'font-size:7px;color:#38bdf8;flex:1';
    copyBtn.onclick = () => {
      const prev = deal.events[editingMilestoneIdx - 1];
      DIMS.forEach(d => { ev.scores[d] = prev.scores[d] || 0; });
      buildMilestoneEditor(); renderAll();
    };
    actRow.appendChild(copyBtn);
  }

  // Delete
  if (deal.events.length > 1) {
    const delBtn = document.createElement('button');
    delBtn.className = 'toggle-btn';
    delBtn.textContent = 'Remove';
    delBtn.style.cssText = 'font-size:7px;color:#f87171;flex:1';
    delBtn.onclick = () => {
      deal.events.splice(editingMilestoneIdx, 1);
      editingMilestoneIdx = -1;
      deal.currentDay = Math.max(...deal.events.map(e => e.day));
      buildMilestoneEditor(); renderAll();
    };
    actRow.appendChild(delBtn);
  }
  sliders.appendChild(actRow);
}

// activityFade removed from UI — always true for stage strip, not used elsewhere

function buildViewButtons() {
  const el = document.getElementById('viewButtons');
  el.innerHTML = '';
  ['radial','flat'].forEach(mode => {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn opt-btn' + (viewMode === mode ? ' active' : '');
    btn.textContent = mode === 'radial' ? 'Radial' : 'Flat';
    btn.onclick = () => { viewMode = mode; buildViewButtons(); renderAll(); };
    el.appendChild(btn);
  });
}

// Dynamic canvas sizing — fill the available area
function resizeCanvas() {
  const area = document.getElementById('canvasArea');
  const canvas = document.getElementById('mainCanvas');
  const dpr = 2;
  const scale = zoomLevel / 100;

  if (viewMode === 'radial') {
    const baseSize = Math.min(area.clientWidth, area.clientHeight) - 16;
    const size = Math.round(baseSize * scale);
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
  } else {
    // Flat: wide horizontal strip
    const baseW = area.clientWidth - 32;
    const w = Math.round(baseW * scale);
    const h = Math.round(Math.min(area.clientHeight - 32, 500) * scale);
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderAll() {
  resizeCanvas();
  const deal = EXAMPLES[currentDeal];
  const stageTheme = THEMES['wireframe']; // radial still uses old THEMES
  const p2Theme = THEMES[p2ThemeKey];
  const {dayScores, dayStages} = buildDayArrays(deal);

  // Deal info
  const info = document.getElementById('dealInfo');
  const lastScores = dayScores[deal.currentDay] || dayScores[deal.currentDay - 1];
  const total = lastScores ? DIMS.reduce((s, d) => s + (lastScores[d] || 0), 0) : 0;
  const bc = total >= 22 ? {bg:'#064e3b',text:'#34d399'} : total >= 15 ? {bg:'#1c2a15',text:'#86efac'} : total >= 8 ? {bg:'#422006',text:'#fcd34d'} : {bg:'#450a0a',text:'#fca5a5'};
  info.innerHTML = `<div class="deal-name">${deal.name}</div><div class="deal-meta">${deal.meta}</div>
    <span class="score-badge" style="background:${bc.bg};color:${bc.text}">${total}/30</span>`;

  // Main viz
  const canvas = document.getElementById('mainCanvas');
  if (viewMode === 'flat') {
    renderFlat(canvas, deal, stageTheme, p2Theme, dayScores, dayStages);
  } else {
    renderRadial(canvas, deal, stageTheme, p2Theme, dayScores, dayStages);
  }
}


function renderFlat(canvas, deal, stageTheme, p2Theme, dayScores, dayStages) {
  const ctx = canvas.getContext('2d');
  const dpr = 2;
  const W = canvas.width / dpr, H = canvas.height / dpr;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save(); ctx.scale(dpr, dpr);

  const padL = 40, padR = 20, padT = 30, padB = 60;
  const chartW = W - padL - padR;
  const dayW = chartW / TOTAL_DAYS;

  // Layout: stage strip on top, P2V2C2 stacked below, DAP waveform at bottom
  const stageH = flatStageH;
  const dapH = flatDapH;
  const remaining = H - padT - padB - stageH - dapH - 16; // 16 = gaps
  const p2H = Math.max(40, remaining * (flatP2Pct / 100));
  const p2Base = padT + stageH + 8;
  const p2UnitH = p2H / 30;
  const dapBase = p2Base + p2H + 8;

  // ── HEADER LABELS ──
  ctx.font = 'bold 7px Inter,sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.4)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('STAGE', 4, padT + stageH / 2);
  ctx.fillText('P2V2C2', 4, p2Base + p2H / 2);
  ctx.fillText('DAP', 4, dapBase + dapH / 2);

  // ── DAY GRID + LABELS ──
  ctx.font = '6px Inter,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let d = 0; d < TOTAL_DAYS; d++) {
    const x = padL + d * dayW;
    // Vertical grid line
    if (d % 7 === 0) {
      ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, dapBase + dapH);
      ctx.strokeStyle = 'rgba(148,163,184,0.06)'; ctx.lineWidth = 0.5; ctx.stroke();
      ctx.fillStyle = 'rgba(148,163,184,0.3)';
      ctx.fillText(`D${d}`, x + dayW * 3.5, dapBase + dapH + 4);
    }
  }

  // ── STAGE STRIP — styled per stageStyleKey ──
  // Stage brightness: Discover=dim → Close=bright
  const stageAlpha = [0.06, 0.12, 0.2, 0.32, 0.5];

  // Render per-stage blocks
  // First, find stage segments (contiguous runs of same stage)
  const stageSegs = [];
  let segStart = 0, segStage = dayStages[0];
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const st = d < TOTAL_DAYS ? dayStages[d] : null;
    if (st !== segStage || d === TOTAL_DAYS) {
      if (segStage) stageSegs.push({start: segStart, end: d, stage: segStage, si: STAGES.indexOf(segStage)});
      segStart = d; segStage = st;
    }
  }

  stageSegs.forEach(seg => {
    const x1 = padL + seg.start * dayW;
    const x2 = padL + seg.end * dayW;
    const w = x2 - x1;
    const a = stageAlpha[seg.si] || 0.06;

    if (stageStyleKey === 'density') {
      // Horizontal lines — density increases per stage
      const spacing = 10 - seg.si * 1.8;
      ctx.strokeStyle = `rgba(255,248,220,${a})`; ctx.lineWidth = 0.4 + seg.si * 0.15;
      for (let ly = spacing / 2; ly < stageH; ly += spacing) {
        ctx.beginPath(); ctx.moveTo(x1, padT + ly); ctx.lineTo(x2, padT + ly); ctx.stroke();
      }

    } else if (stageStyleKey === 'blocks') {
      // Clean solid fill — brightness = stage
      ctx.fillStyle = `rgba(255,248,220,${a * 0.6})`;
      ctx.fillRect(x1, padT, w, stageH);

    } else if (stageStyleKey === 'hatched') {
      // Diagonal hatching — line count increases per stage
      ctx.save();
      ctx.beginPath(); ctx.rect(x1, padT, w, stageH); ctx.clip();
      const sp = 8 - seg.si * 1.2;
      ctx.strokeStyle = `rgba(255,248,220,${a})`; ctx.lineWidth = 0.4 + seg.si * 0.1;
      for (let i = -Math.ceil(stageH / sp) - 5; i < Math.ceil(w / sp) + 5; i++) {
        ctx.beginPath(); ctx.moveTo(x1 + i * sp, padT + stageH); ctx.lineTo(x1 + i * sp + stageH, padT); ctx.stroke();
      }
      ctx.restore();

    } else if (stageStyleKey === 'dotfield') {
      // Dots — more and bigger per stage
      const dotSp = 7 - seg.si;
      const dotR = 0.3 + seg.si * 0.2;
      ctx.fillStyle = `rgba(255,248,220,${a})`;
      for (let dy = dotSp / 2; dy < stageH; dy += dotSp) {
        for (let dx = dotSp / 2; dx < w; dx += dotSp) {
          ctx.beginPath(); ctx.arc(x1 + dx, padT + dy, dotR, 0, Math.PI * 2); ctx.fill();
        }
      }

    } else if (stageStyleKey === 'gradient') {
      // Gradient ramp — fades from left edge of stage to brighter at right
      const grad = ctx.createLinearGradient(x1, 0, x2, 0);
      grad.addColorStop(0, `rgba(255,248,220,${a * 0.2})`);
      grad.addColorStop(1, `rgba(255,248,220,${a * 0.8})`);
      ctx.fillStyle = grad;
      ctx.fillRect(x1, padT, w, stageH);

    } else if (stageStyleKey === 'ruler') {
      // Ruler tick marks — spacing tightens with stage
      const tickSp = 12 - seg.si * 2;
      const tickH = stageH * (0.3 + seg.si * 0.12);
      ctx.strokeStyle = `rgba(255,248,220,${a})`; ctx.lineWidth = 0.5 + seg.si * 0.15;
      for (let tx = tickSp / 2; tx < w; tx += tickSp) {
        ctx.beginPath(); ctx.moveTo(x1 + tx, padT + stageH); ctx.lineTo(x1 + tx, padT + stageH - tickH); ctx.stroke();
      }
      // Base line
      ctx.beginPath(); ctx.moveTo(x1, padT + stageH - 0.5); ctx.lineTo(x2, padT + stageH - 0.5);
      ctx.strokeStyle = `rgba(255,248,220,${a * 0.5})`; ctx.lineWidth = 0.5; ctx.stroke();
    }
  });

  // Stage boundary
  ctx.strokeStyle = 'rgba(148,163,184,0.08)'; ctx.lineWidth = 0.5;
  ctx.strokeRect(padL, padT, chartW, stageH);

  // Stage transition lines + labels
  stageSegs.forEach((seg, i) => {
    const x = padL + seg.start * dayW;
    // Transition line (skip first)
    if (i > 0) {
      ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT + stageH);
      ctx.strokeStyle = 'rgba(255,248,220,0.25)'; ctx.lineWidth = 1; ctx.stroke();
    }
    // Stage label
    ctx.font = 'bold 5px Inter,sans-serif'; ctx.fillStyle = 'rgba(255,248,220,0.35)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(STAGE_LABELS[seg.stage].toUpperCase(), x + 3, padT + 2);
  });

  // ── P2V2C2 — 6 dimension lanes, MONOCHROME, texture differentiates dimensions ──
  // Each dimension uses a DIFFERENT texture pattern (not color)
  // Score level (1-5) controls brightness/density within that texture
  const dimLaneH = p2H / 6;
  const dimLaneGap = 1;
  const W_COLOR = [255, 248, 220]; // warm white — single color for everything

  // Each dimension gets a unique texture function
  // di=0:Pain=horizontal lines, 1:Power=vertical lines, 2:Vision=diagonal /, 3:Value=diagonal \, 4:Change=dots, 5:Control=crosshatch
  const DIM_TEXTURES = [
    // Pain — horizontal lines (count = score)
    (ctx, x, topY, dayW, blockH, val, unitH, laneTop, laneInner, alpha) => {
      const intVal = Math.round(val);
      for (let line = 0; line < intVal; line++) {
        const ly = laneTop + laneInner - (line + 0.5) * unitH;
        ctx.strokeStyle = `rgba(255,248,220,${alpha})`;
        ctx.lineWidth = 0.5 + line * 0.15;
        ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x + dayW, ly); ctx.stroke();
      }
    },
    // Power — vertical bars (filled, height = score)
    (ctx, x, topY, dayW, blockH, val, unitH, laneTop, laneInner, alpha) => {
      ctx.fillStyle = `rgba(255,248,220,${alpha})`;
      ctx.fillRect(x, topY, dayW + 0.5, blockH);
      ctx.strokeStyle = `rgba(255,248,220,${alpha + 0.08})`; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x, topY); ctx.lineTo(x + dayW + 0.5, topY); ctx.stroke();
    },
    // Vision — diagonal lines / (density = score)
    (ctx, x, topY, dayW, blockH, val, unitH, laneTop, laneInner, alpha) => {
      ctx.save();
      ctx.beginPath(); ctx.rect(x, laneTop, dayW + 0.5, laneInner); ctx.clip();
      const spacing = 6 - val * 0.7; // tighter at higher scores
      ctx.strokeStyle = `rgba(255,248,220,${alpha})`; ctx.lineWidth = 0.4 + val * 0.1;
      for (let i = -15; i < 15; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i * spacing, laneTop + laneInner);
        ctx.lineTo(x + i * spacing + laneInner, laneTop);
        ctx.stroke();
      }
      ctx.restore();
    },
    // Value — diagonal lines \ (density = score)
    (ctx, x, topY, dayW, blockH, val, unitH, laneTop, laneInner, alpha) => {
      ctx.save();
      ctx.beginPath(); ctx.rect(x, laneTop, dayW + 0.5, laneInner); ctx.clip();
      const spacing = 6 - val * 0.7;
      ctx.strokeStyle = `rgba(255,248,220,${alpha})`; ctx.lineWidth = 0.4 + val * 0.1;
      for (let i = -15; i < 15; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i * spacing, laneTop);
        ctx.lineTo(x + i * spacing + laneInner, laneTop + laneInner);
        ctx.stroke();
      }
      ctx.restore();
    },
    // Change — dots (count & size = score)
    (ctx, x, topY, dayW, blockH, val, unitH, laneTop, laneInner, alpha) => {
      const intVal = Math.round(val);
      const dotR = 0.4 + val * 0.15;
      ctx.fillStyle = `rgba(255,248,220,${alpha})`;
      for (let dot = 0; dot < intVal; dot++) {
        const dy = laneTop + laneInner - (dot + 0.5) * unitH;
        ctx.beginPath(); ctx.arc(x + dayW / 2, dy, dotR, 0, Math.PI * 2); ctx.fill();
      }
    },
    // Control — crosshatch (density = score)
    (ctx, x, topY, dayW, blockH, val, unitH, laneTop, laneInner, alpha) => {
      ctx.save();
      ctx.beginPath(); ctx.rect(x, topY, dayW + 0.5, blockH); ctx.clip();
      const spacing = 4 - val * 0.4;
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.7})`; ctx.lineWidth = 0.3 + val * 0.06;
      for (let i = -10; i < 10; i++) {
        ctx.beginPath(); ctx.moveTo(x + i * spacing, topY); ctx.lineTo(x + i * spacing + blockH, topY + blockH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + i * spacing + blockH, topY); ctx.lineTo(x + i * spacing, topY + blockH); ctx.stroke();
      }
      ctx.restore();
    },
  ];

  DIMS.forEach((dim, di) => {
    const laneTop = p2Base + di * dimLaneH;
    const laneInner = dimLaneH - dimLaneGap;
    const unitH = laneInner / 5;

    // Dimension label on left
    ctx.font = 'bold 6px Inter,sans-serif';
    ctx.fillStyle = 'rgba(255,248,220,0.5)';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(DIM_LABELS[dim].substring(0, 3).toUpperCase(), padL - 3, laneTop + laneInner / 2);

    // Faint lane background
    ctx.fillStyle = 'rgba(255,248,220,0.01)';
    ctx.fillRect(padL, laneTop, chartW, laneInner);

    // Draw score blocks per day
    for (let d = 0; d < TOTAL_DAYS; d++) {
      const scores = dayScores[d];
      if (!scores) continue;
      const val = scores[dim] || 0;
      if (val <= 0) continue;
      const x = padL + d * dayW;
      const blockH = val * unitH;
      const topY = laneTop + laneInner - blockH;

      // Brightness scales with score: 1 = visible, 5 = very bright
      const alpha = 0.15 + (val / 5) * 0.65;

      if (p2ThemeKey === 'solid') {
        // Use the per-dimension texture
        DIM_TEXTURES[di](ctx, x, topY, dayW, blockH, val, unitH, laneTop, laneInner, alpha);

      } else if (p2ThemeKey === 'lines') {
        // All dimensions: horizontal score lines (count = score)
        const intVal = Math.round(val);
        ctx.strokeStyle = `rgba(255,248,220,${alpha})`;
        for (let line = 0; line < intVal; line++) {
          const ly = laneTop + laneInner - (line + 0.5) * unitH;
          ctx.lineWidth = 0.5 + line * 0.15;
          ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x + dayW, ly); ctx.stroke();
        }

      } else if (p2ThemeKey === 'outline') {
        // Stroke-only box, weight = score
        ctx.strokeStyle = `rgba(255,248,220,${alpha})`;
        ctx.lineWidth = 0.3 + val * 0.3;
        ctx.strokeRect(x + 0.5, topY + 0.5, Math.max(1, dayW - 0.5), Math.max(1, blockH - 0.5));

      } else if (p2ThemeKey === 'dots') {
        // Dot per score unit
        const intVal = Math.round(val);
        const dotR = 0.4 + (val / 5) * 0.5;
        ctx.fillStyle = `rgba(255,248,220,${alpha})`;
        for (let dot = 0; dot < intVal; dot++) {
          const dy = laneTop + laneInner - (dot + 0.5) * unitH;
          ctx.beginPath(); ctx.arc(x + dayW / 2, dy, dotR, 0, Math.PI * 2); ctx.fill();
        }

      } else if (p2ThemeKey === 'heatmap') {
        // Full lane, alpha = score
        ctx.fillStyle = `rgba(255,248,220,${(val / 5) * 0.5})`;
        ctx.fillRect(x, laneTop, dayW + 0.5, laneInner);

      } else if (p2ThemeKey === 'signal') {
        // Vertical line, thickness = score
        ctx.strokeStyle = `rgba(255,248,220,${alpha})`;
        ctx.lineWidth = 0.3 + val * 0.5;
        ctx.beginPath(); ctx.moveTo(x + dayW / 2, laneTop + laneInner); ctx.lineTo(x + dayW / 2, topY); ctx.stroke();
        if (val >= 4) {
          ctx.beginPath(); ctx.arc(x + dayW / 2, topY, 1, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,248,220,${alpha + 0.1})`; ctx.fill();
        }
      }
    }

    // Lane divider
    ctx.strokeStyle = 'rgba(148,163,184,0.05)'; ctx.lineWidth = 0.3;
    ctx.beginPath(); ctx.moveTo(padL, laneTop + dimLaneH); ctx.lineTo(padL + chartW, laneTop + dimLaneH); ctx.stroke();

    // Score marks on right (1-5)
    ctx.font = '4px Inter,sans-serif'; ctx.fillStyle = 'rgba(255,248,220,0.12)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    for (let sv = 1; sv <= 5; sv++) {
      ctx.fillText(sv, padL + chartW + 2, laneTop + laneInner - sv * unitH + unitH / 2);
    }
  });

  // P2V2C2 outer border
  ctx.strokeStyle = 'rgba(148,163,184,0.08)'; ctx.lineWidth = 0.5;
  ctx.strokeRect(padL, p2Base, chartW, p2H);

  // ── DAP — timeline/tempo/cadence visualization ──
  const dapCodes = new Set(deal.dapReached || []);
  const dapMid = dapBase + dapH / 2;
  const iScale = dapIntensity / 100;

  // Build reached milestones list with positions
  const reachedMs = DAP_MILESTONES.filter(m => dapCodes.has(m.cas));
  const allMs = DAP_MILESTONES;

  // Compute gaps between consecutive reached milestones (for tempo)
  const gaps = [];
  for (let i = 1; i < reachedMs.length; i++) {
    gaps.push(reachedMs[i].day - reachedMs[i - 1].day);
  }
  const avgGap = gaps.length > 0 ? gaps.reduce((a, b) => a + b, 0) / gaps.length : 10;

  if (dapStyle === 'timeline') {
    // ═══ TIMELINE — horizontal progress bar with milestone ticks ═══
    // Track line
    ctx.beginPath(); ctx.moveTo(padL, dapMid); ctx.lineTo(padL + chartW, dapMid);
    ctx.strokeStyle = 'rgba(255,248,220,0.06)'; ctx.lineWidth = 1; ctx.stroke();
    // Filled progress bar up to last reached milestone
    if (reachedMs.length > 0) {
      const lastX = padL + reachedMs[reachedMs.length - 1].day * dayW;
      ctx.fillStyle = `rgba(255,248,220,${0.08 * iScale})`;
      ctx.fillRect(padL, dapMid - 2, lastX - padL, 4);
    }
    // Milestone ticks
    allMs.forEach(m => {
      const x = padL + m.day * dayW;
      const reached = dapCodes.has(m.cas);
      const tickH = reached ? dapH * 0.6 * iScale : dapH * 0.15;
      ctx.strokeStyle = `rgba(255,248,220,${reached ? 0.5 : 0.08})`;
      ctx.lineWidth = reached ? 1.5 : 0.5;
      ctx.beginPath(); ctx.moveTo(x, dapMid - tickH / 2); ctx.lineTo(x, dapMid + tickH / 2); ctx.stroke();
    });

  } else if (dapStyle === 'ledger') {
    // ═══ LEDGER — hash marks like journal entries, double-line for reached ═══
    ctx.beginPath(); ctx.moveTo(padL, dapBase + dapH - 1); ctx.lineTo(padL + chartW, dapBase + dapH - 1);
    ctx.strokeStyle = 'rgba(255,248,220,0.04)'; ctx.lineWidth = 0.5; ctx.stroke();
    allMs.forEach((m, mi) => {
      const x = padL + m.day * dayW;
      const reached = dapCodes.has(m.cas);
      if (reached) {
        // Double hash mark
        const h = dapH * 0.7 * iScale;
        ctx.strokeStyle = `rgba(255,248,220,0.45)`; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x - 1, dapBase + dapH); ctx.lineTo(x - 1, dapBase + dapH - h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 1, dapBase + dapH); ctx.lineTo(x + 1, dapBase + dapH - h); ctx.stroke();
        // Cross line
        ctx.beginPath(); ctx.moveTo(x - 3, dapBase + dapH - h * 0.6); ctx.lineTo(x + 3, dapBase + dapH - h * 0.6);
        ctx.strokeStyle = 'rgba(255,248,220,0.3)'; ctx.lineWidth = 0.5; ctx.stroke();
      } else {
        // Faint single tick
        ctx.strokeStyle = 'rgba(255,248,220,0.06)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(x, dapBase + dapH); ctx.lineTo(x, dapBase + dapH - dapH * 0.12); ctx.stroke();
      }
    });

  } else if (dapStyle === 'tempo') {
    // ═══ TEMPO — gap spacing shows acceleration/deceleration ═══
    // Wider gaps between milestones = deal slowing down (red tint)
    // Tight gaps = accelerating (brighter)
    ctx.beginPath(); ctx.moveTo(padL, dapMid); ctx.lineTo(padL + chartW, dapMid);
    ctx.strokeStyle = 'rgba(255,248,220,0.04)'; ctx.lineWidth = 0.5; ctx.stroke();
    reachedMs.forEach((m, i) => {
      const x = padL + m.day * dayW;
      let gapRatio = 1;
      if (i > 0) {
        const thisGap = m.day - reachedMs[i - 1].day;
        gapRatio = thisGap / Math.max(1, avgGap);
      }
      // Bigger gap = taller bar (deal slowing), tight gap = short bar (fast)
      const barH = dapH * Math.min(1, 0.2 + gapRatio * 0.3) * iScale;
      const brightness = Math.max(0.15, 0.6 - gapRatio * 0.15);
      ctx.strokeStyle = `rgba(255,248,220,${brightness})`;
      ctx.lineWidth = 1 + (1 / Math.max(0.5, gapRatio)) * 1.5;
      ctx.beginPath(); ctx.moveTo(x, dapMid + barH / 2); ctx.lineTo(x, dapMid - barH / 2); ctx.stroke();
      // Connect to previous with line thickness showing pace
      if (i > 0) {
        const px = padL + reachedMs[i - 1].day * dayW;
        ctx.strokeStyle = `rgba(255,248,220,${brightness * 0.3})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(px, dapMid); ctx.lineTo(x, dapMid); ctx.stroke();
      }
    });
    // Unreached as faint dots
    allMs.forEach(m => {
      if (dapCodes.has(m.cas)) return;
      const x = padL + m.day * dayW;
      ctx.beginPath(); ctx.arc(x, dapMid, 0.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,248,220,0.06)'; ctx.fill();
    });

  } else if (dapStyle === 'gauge') {
    // ═══ GAUGE — fill bar showing % of DAP complete ═══
    const pct = reachedMs.length / allMs.length;
    const fillW = chartW * pct;
    // Background track
    ctx.fillStyle = 'rgba(255,248,220,0.02)';
    ctx.fillRect(padL, dapBase + 4, chartW, dapH - 8);
    // Fill bar
    const grad = ctx.createLinearGradient(padL, 0, padL + fillW, 0);
    grad.addColorStop(0, `rgba(255,248,220,${0.06 * iScale})`);
    grad.addColorStop(1, `rgba(255,248,220,${0.25 * iScale})`);
    ctx.fillStyle = grad;
    ctx.fillRect(padL, dapBase + 4, fillW, dapH - 8);
    // Percentage text
    ctx.font = 'bold 8px Inter,sans-serif'; ctx.fillStyle = `rgba(255,248,220,${0.4 * iScale})`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(`${Math.round(pct * 100)}%`, padL + fillW - 3, dapMid);
    // Milestone ticks on the bar
    allMs.forEach(m => {
      const x = padL + (m.day / TOTAL_DAYS) * chartW;
      const reached = dapCodes.has(m.cas);
      ctx.strokeStyle = `rgba(255,248,220,${reached ? 0.3 : 0.05})`;
      ctx.lineWidth = reached ? 1 : 0.3;
      ctx.beginPath(); ctx.moveTo(x, dapBase + 4); ctx.lineTo(x, dapBase + dapH - 4); ctx.stroke();
    });

  } else if (dapStyle === 'notches') {
    // ═══ NOTCHES — notches on a rail, growing taller with progress ═══
    // Rail line
    ctx.beginPath(); ctx.moveTo(padL, dapBase + dapH - 2); ctx.lineTo(padL + chartW, dapBase + dapH - 2);
    ctx.strokeStyle = 'rgba(255,248,220,0.06)'; ctx.lineWidth = 0.5; ctx.stroke();
    allMs.forEach((m, mi) => {
      const x = padL + m.day * dayW;
      const reached = dapCodes.has(m.cas);
      // Height grows with milestone index
      const notchH = reached ? (dapH * (0.2 + (mi / allMs.length) * 0.7) * iScale) : dapH * 0.08;
      ctx.strokeStyle = `rgba(255,248,220,${reached ? 0.45 : 0.06})`;
      ctx.lineWidth = reached ? (1 + mi * 0.08) : 0.5;
      ctx.beginPath(); ctx.moveTo(x, dapBase + dapH - 2); ctx.lineTo(x, dapBase + dapH - 2 - notchH); ctx.stroke();
    });

  } else if (dapStyle === 'cadence') {
    // ═══ CADENCE — vertical bars between milestones, width = time between them ═══
    // Shows rhythm of deal progression
    ctx.beginPath(); ctx.moveTo(padL, dapMid); ctx.lineTo(padL + chartW, dapMid);
    ctx.strokeStyle = 'rgba(255,248,220,0.03)'; ctx.lineWidth = 0.3; ctx.stroke();
    for (let i = 0; i < reachedMs.length; i++) {
      const m = reachedMs[i];
      const x = padL + m.day * dayW;
      const nextDay = (i < reachedMs.length - 1) ? reachedMs[i + 1].day : m.day + avgGap;
      const gap = nextDay - m.day;
      // Bar width proportional to gap (wider = slower pace)
      const barW = Math.max(1, gap * dayW * 0.6 * iScale);
      const barH = dapH * 0.6 * iScale;
      const alpha = Math.max(0.1, 0.5 - gap * 0.01);
      ctx.fillStyle = `rgba(255,248,220,${alpha})`;
      ctx.fillRect(x, dapMid - barH / 2, barW, barH);
      // Thin border
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.5})`; ctx.lineWidth = 0.3;
      ctx.strokeRect(x, dapMid - barH / 2, barW, barH);
    }
    // Unreached as faint ticks
    allMs.forEach(m => {
      if (dapCodes.has(m.cas)) return;
      const x = padL + m.day * dayW;
      ctx.strokeStyle = 'rgba(255,248,220,0.05)'; ctx.lineWidth = 0.3;
      ctx.beginPath(); ctx.moveTo(x, dapMid - 3); ctx.lineTo(x, dapMid + 3); ctx.stroke();
    });
  }

  // DAP milestone labels (shared across all styles)
  ctx.font = '5px Inter,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  allMs.forEach(m => {
    const x = padL + m.day * dayW;
    const reached = dapCodes.has(m.cas);
    ctx.fillStyle = reached ? 'rgba(255,248,220,0.4)' : 'rgba(255,248,220,0.07)';
    ctx.fillText(m.cas, x, dapBase + dapH + 3);
  });

  // ── SCORING EVENT MARKERS — clean line styles (flat) ──
  const flatTop = padT;
  const flatBot = dapBase + dapH;
  deal.events.forEach((ev, ei) => {
    const x = padL + ev.day * dayW;
    const lineAlpha = 0.5;
    const lineColor = `rgba(251,191,36,${lineAlpha})`;
    const editing = editingMilestoneIdx === ei;

    if (editing) {
      ctx.beginPath(); ctx.moveTo(x, flatTop - 6); ctx.lineTo(x, flatBot);
      ctx.strokeStyle = 'rgba(251,191,36,0.12)'; ctx.lineWidth = 8; ctx.stroke();
    }

    if (eventStyle === 'solid') {
      ctx.beginPath(); ctx.moveTo(x, flatTop - 4); ctx.lineTo(x, flatBot);
      ctx.strokeStyle = `rgba(251,191,36,${0.06})`; ctx.lineWidth = 4; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, flatTop - 4); ctx.lineTo(x, flatBot);
      ctx.strokeStyle = lineColor; ctx.lineWidth = 1.0; ctx.stroke();

    } else if (eventStyle === 'double') {
      for (const off of [-1.5, 1.5]) {
        ctx.beginPath(); ctx.moveTo(x + off, flatTop - 2); ctx.lineTo(x + off, flatBot);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 0.7; ctx.stroke();
      }

    } else if (eventStyle === 'dashed') {
      const segH = (flatBot - flatTop) / 16;
      for (let s = 0; s < 16; s += 2) {
        ctx.beginPath(); ctx.moveTo(x, flatTop + s * segH); ctx.lineTo(x, flatTop + (s + 1) * segH);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.0; ctx.stroke();
      }

    } else if (eventStyle === 'tapered') {
      const steps = 20;
      const totalH = flatBot - flatTop;
      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        const y1 = flatTop + t * totalH, y2 = flatTop + (t + 1/steps) * totalH;
        ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2);
        ctx.strokeStyle = `rgba(251,191,36,${lineAlpha * (1 - t * 0.3)})`; ctx.lineWidth = 2.5 * (1 - t * 0.85); ctx.stroke();
      }

    } else if (eventStyle === 'tick') {
      ctx.beginPath(); ctx.moveTo(x, flatTop); ctx.lineTo(x, flatBot);
      ctx.strokeStyle = `rgba(251,191,36,${lineAlpha * 0.2})`; ctx.lineWidth = 0.3; ctx.stroke();
      const tickYs = [padT, padT + stageH, p2Base, p2Base + p2H, dapBase, dapBase + dapH];
      tickYs.forEach(ty => {
        ctx.beginPath(); ctx.moveTo(x - 3, ty); ctx.lineTo(x + 3, ty);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
      });

    } else if (eventStyle === 'glow') {
      for (let g = 3; g >= 0; g--) {
        ctx.beginPath(); ctx.moveTo(x, flatTop - 2); ctx.lineTo(x, flatBot);
        ctx.strokeStyle = `rgba(251,191,36,${0.02 + g * 0.015})`; ctx.lineWidth = 2 + g * 3; ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(x, flatTop - 2); ctx.lineTo(x, flatBot);
      ctx.strokeStyle = `rgba(255,248,220,${lineAlpha * 0.8})`; ctx.lineWidth = 0.6; ctx.stroke();

    } else if (eventStyle === 'hairline') {
      ctx.beginPath(); ctx.moveTo(x, flatTop - 2); ctx.lineTo(x, flatBot);
      ctx.strokeStyle = `rgba(255,248,220,${lineAlpha * 0.7})`; ctx.lineWidth = 0.3; ctx.stroke();

    } else if (eventStyle === 'bracket') {
      ctx.beginPath(); ctx.moveTo(x, flatTop); ctx.lineTo(x, flatBot);
      ctx.strokeStyle = `rgba(251,191,36,${lineAlpha * 0.4})`; ctx.lineWidth = 0.5; ctx.stroke();
      const bracketYs = [padT, padT + stageH, p2Base, p2Base + p2H];
      bracketYs.forEach(by => {
        ctx.beginPath(); ctx.moveTo(x - 4, by); ctx.lineTo(x + 4, by);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.2; ctx.stroke();
        ctx.beginPath(); ctx.arc(x - 4, by, 1, 0, Math.PI * 2); ctx.fillStyle = lineColor; ctx.fill();
        ctx.beginPath(); ctx.arc(x + 4, by, 1, 0, Math.PI * 2); ctx.fillStyle = lineColor; ctx.fill();
      });
    }

    // Small dot at top for all styles
    ctx.beginPath(); ctx.arc(x, flatTop - 4, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(251,191,36,${0.6})`; ctx.fill();
  });

  // ── CURRENT DAY INDICATOR ──
  const cdX = padL + deal.currentDay * dayW;
  ctx.beginPath(); ctx.moveTo(cdX, padT - 2); ctx.lineTo(cdX, dapBase + dapH);
  ctx.strokeStyle = 'rgba(251,191,36,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = 'bold 6px Inter,sans-serif'; ctx.fillStyle = 'rgba(251,191,36,0.5)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(`Day ${deal.currentDay}`, cdX, padT - 9);

  ctx.restore();
}

function renderRadial(canvas, deal, stageTheme, p2Theme, dayScores, dayStages) {
  const ctx = canvas.getContext('2d');
  const dpr = 2;
  const W = canvas.width / dpr, H = canvas.height / dpr;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save(); ctx.scale(dpr, dpr);

  const cxr = W / 2, cyr = H / 2;
  const maxR = Math.min(W, H) / 2 - 55;
  const centerR = 32;
  const gapRings = 10;
  const dapSpokeExtra = 22;

  const available = maxR - centerR - gapRings;
  const stageRingW = available * 0.35;
  const p2RingW = available * 0.65;

  let stageInnerR, stageOuterR, p2InnerR, p2OuterR;
  if (!invertRings) {
    stageInnerR = centerR; stageOuterR = centerR + stageRingW;
    p2InnerR = stageOuterR + gapRings; p2OuterR = p2InnerR + p2RingW;
  } else {
    p2InnerR = centerR; p2OuterR = centerR + p2RingW;
    stageInnerR = p2OuterR + gapRings; stageOuterR = stageInnerR + stageRingW;
  }

  const dayAngle = (Math.PI * 2) / TOTAL_DAYS;
  const dirMul = reverseDirection ? -1 : 1;

  // ── DAY GRID LINES (faint radial spokes for every day) ──
  for (let d = 0; d < TOTAL_DAYS; d++) {
    const a = START_ANGLE + d * dayAngle * dirMul;
    const innermost = Math.min(stageInnerR, p2InnerR);
    const outermost = Math.max(stageOuterR, p2OuterR);
    ctx.beginPath();
    ctx.moveTo(cxr + innermost * Math.cos(a), cyr + innermost * Math.sin(a));
    ctx.lineTo(cxr + outermost * Math.cos(a), cyr + outermost * Math.sin(a));
    if (d % 7 === 0) {
      ctx.strokeStyle = 'rgba(148,163,184,0.06)'; ctx.lineWidth = 0.6;
    } else {
      ctx.strokeStyle = 'rgba(148,163,184,0.02)'; ctx.lineWidth = 0.3;
    }
    ctx.stroke();
  }

  // ── WEEK LABELS ──
  const labelR = Math.max(stageOuterR, p2OuterR) + 8;
  ctx.font = '5px Inter,sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.25)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let d = 0; d < TOTAL_DAYS; d += 7) {
    const a = START_ANGLE + (d + 0.5) * dayAngle * dirMul;
    ctx.fillText(`D${d}`, cxr + labelR * Math.cos(a), cyr + labelR * Math.sin(a));
  }

  // ── STAGE RING — clean HUD-style concentric arcs ──
  const subBandW = stageRingW / STAGES.length;
  const currentStage = dayStages[deal.currentDay] || 'discover';
  const currentStageIdx = STAGES.indexOf(currentStage);

  STAGES.forEach((stage, si) => {
    let bandInner, bandOuter;
    if (!invertRings) {
      bandInner = stageInnerR + si * subBandW;
      bandOuter = stageInnerR + (si + 1) * subBandW;
    } else {
      bandOuter = stageOuterR - si * subBandW;
      bandInner = stageOuterR - (si + 1) * subBandW;
    }

    const reached = si <= currentStageIdx;
    const fadeT = reached ? 1.0 - (si / Math.max(currentStageIdx, 1)) * 0.6 : 0.0;
    const alpha = reached ? (0.3 + fadeT * 0.7) : 0.04;
    const midR = (bandInner + bandOuter) / 2;
    const arcW = bandOuter - bandInner;

    if (stageThemeKey === 'wireframe' || stageThemeKey === 'concentric') {
      // Clean concentric arcs — main arc + thin boundary lines
      ctx.beginPath(); ctx.arc(cxr, cyr, midR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.6})`; ctx.lineWidth = arcW * 0.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(cxr, cyr, bandInner + 1, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.25})`; ctx.lineWidth = 0.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(cxr, cyr, bandOuter - 1, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.25})`; ctx.lineWidth = 0.5; ctx.stroke();
    } else if (stageThemeKey === 'hatching' || stageThemeKey === 'dataSpokes') {
      // Dashed arc — segmented ring with gaps
      const dashCount = 36;
      const dashArc = (Math.PI * 2) / dashCount * 0.7;
      const gapArc = (Math.PI * 2) / dashCount * 0.3;
      for (let i = 0; i < dashCount; i++) {
        const da1 = START_ANGLE + i * (dashArc + gapArc);
        const da2 = da1 + dashArc;
        ctx.beginPath(); ctx.arc(cxr, cyr, midR, da1, da2);
        ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.65})`; ctx.lineWidth = arcW * 0.4; ctx.stroke();
      }
    } else if (stageThemeKey === 'stipple' || stageThemeKey === 'scatterField') {
      // Dotted ring — evenly spaced dots on the midline
      const dotCount = 72;
      const dotR = arcW * 0.15;
      for (let i = 0; i < dotCount; i++) {
        const da = START_ANGLE + (i / dotCount) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(cxr + midR * Math.cos(da), cyr + midR * Math.sin(da), dotR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,248,220,${alpha * 0.6})`; ctx.fill();
      }
    } else if (stageThemeKey === 'waves' || stageThemeKey === 'signalWave') {
      // Double-line ring
      ctx.beginPath(); ctx.arc(cxr, cyr, bandInner + arcW * 0.25, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.5})`; ctx.lineWidth = arcW * 0.15; ctx.stroke();
      ctx.beginPath(); ctx.arc(cxr, cyr, bandOuter - arcW * 0.25, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.5})`; ctx.lineWidth = arcW * 0.15; ctx.stroke();
    } else if (stageThemeKey === 'sunburst' || stageThemeKey === 'spiral') {
      // Thick solid arc
      ctx.beginPath(); ctx.arc(cxr, cyr, midR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.5})`; ctx.lineWidth = arcW * 0.7; ctx.stroke();
    } else if (stageThemeKey === 'checkerboard' || stageThemeKey === 'diamondGrid') {
      // Alternating arc segments — wide/narrow
      const segCount = 24;
      for (let i = 0; i < segCount; i++) {
        const sa1 = START_ANGLE + (i / segCount) * Math.PI * 2;
        const sa2 = START_ANGLE + ((i + 1) / segCount) * Math.PI * 2;
        const w = (i % 2 === 0) ? arcW * 0.6 : arcW * 0.25;
        ctx.beginPath(); ctx.arc(cxr, cyr, midR, sa1, sa2);
        ctx.strokeStyle = `rgba(255,248,220,${alpha * (i % 2 === 0 ? 0.55 : 0.3)})`; ctx.lineWidth = w; ctx.stroke();
      }
    } else if (stageThemeKey === 'circuit' || stageThemeKey === 'weave') {
      // Broken segments with tick marks
      const segCount = 18;
      const segArc = (Math.PI * 2) / segCount;
      for (let i = 0; i < segCount; i++) {
        const sa = START_ANGLE + i * segArc;
        ctx.beginPath(); ctx.arc(cxr, cyr, midR, sa, sa + segArc * 0.6);
        ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.5})`; ctx.lineWidth = arcW * 0.35; ctx.stroke();
        // Tick at segment start
        const cos = Math.cos(sa), sin = Math.sin(sa);
        ctx.beginPath();
        ctx.moveTo(cxr + bandInner * cos, cyr + bandInner * sin);
        ctx.lineTo(cxr + bandOuter * cos, cyr + bandOuter * sin);
        ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.25})`; ctx.lineWidth = 0.5; ctx.stroke();
      }
    } else if (stageThemeKey === 'halftone' || stageThemeKey === 'pixelDissolve') {
      // Graduated dots — denser where reached
      const dotCount = reached ? 48 : 12;
      const dotR = arcW * (reached ? 0.12 : 0.06);
      for (let i = 0; i < dotCount; i++) {
        const da = START_ANGLE + (i / dotCount) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(cxr + midR * Math.cos(da), cyr + midR * Math.sin(da), dotR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,248,220,${alpha * 0.5})`; ctx.fill();
      }
    } else if (stageThemeKey === 'polkaDot' || stageThemeKey === 'barcode' || stageThemeKey === 'verticalBars') {
      // Notched ring — single line with notches
      ctx.beginPath(); ctx.arc(cxr, cyr, midR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.4})`; ctx.lineWidth = arcW * 0.3; ctx.stroke();
      const notchCount = 48;
      for (let i = 0; i < notchCount; i++) {
        const na = START_ANGLE + (i / notchCount) * Math.PI * 2;
        const cos = Math.cos(na), sin = Math.sin(na);
        const nInner = midR - arcW * 0.3;
        const nOuter = midR + arcW * 0.3;
        ctx.beginPath();
        ctx.moveTo(cxr + nInner * cos, cyr + nInner * sin);
        ctx.lineTo(cxr + nOuter * cos, cyr + nOuter * sin);
        ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.2})`; ctx.lineWidth = 0.4; ctx.stroke();
      }
    } else {
      // Default: clean arc
      ctx.beginPath(); ctx.arc(cxr, cyr, midR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,248,220,${alpha * 0.5})`; ctx.lineWidth = arcW * 0.5; ctx.stroke();
    }

    // Clean ring separator
    ctx.beginPath(); ctx.arc(cxr, cyr, bandOuter, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(148,163,184,${reached ? 0.06 : 0.02})`; ctx.lineWidth = 0.4; ctx.stroke();
  });

  // Clean boundary lines
  ctx.strokeStyle = 'rgba(148,163,184,0.08)'; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.arc(cxr, cyr, stageInnerR, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cxr, cyr, stageOuterR, 0, Math.PI * 2); ctx.stroke();

  // ── P2V2C2 RING — smooth continuous filled wedges per dimension ──
  // Each dimension is a continuous filled shape tracing its score radius around the circle
  const p2UnitR = p2RingW / 30;

  // Build cumulative radii per day for stacking
  const radialDimOrder = p2Growth === 'out' ? [...DIMS] : [...DIMS].reverse();
  let rCumulPerDay = new Array(TOTAL_DAYS).fill(0);

  radialDimOrder.forEach((dim, di) => {
    const prevCumul = [...rCumulPerDay];

    for (let d = 0; d < TOTAL_DAYS; d++) {
      const scores = dayScores[d];
      if (!scores) { continue; }
      rCumulPerDay[d] = prevCumul[d] + (scores[dim] || 0);
    }

    // Draw filled wedge shape: trace outer edge forward, inner edge backward
    ctx.beginPath();
    let started = false;

    // Forward pass: outer edge (top of this dimension's band)
    for (let d = 0; d < TOTAL_DAYS; d++) {
      if (!dayScores[d]) continue;
      const a = START_ANGLE + (d + 0.5) * dayAngle * dirMul;
      let r;
      if (p2Growth === 'out') {
        r = p2InnerR + rCumulPerDay[d] * p2UnitR;
      } else {
        r = p2OuterR - rCumulPerDay[d] * p2UnitR;
      }
      const x = cxr + r * Math.cos(a), y = cyr + r * Math.sin(a);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }

    // Backward pass: inner edge (bottom of this dimension's band)
    for (let d = TOTAL_DAYS - 1; d >= 0; d--) {
      if (!dayScores[d]) continue;
      const a = START_ANGLE + (d + 0.5) * dayAngle * dirMul;
      let r;
      if (p2Growth === 'out') {
        r = p2InnerR + prevCumul[d] * p2UnitR;
      } else {
        r = p2OuterR - prevCumul[d] * p2UnitR;
      }
      ctx.lineTo(cxr + r * Math.cos(a), cyr + r * Math.sin(a));
    }
    ctx.closePath();

    // Monochrome — each layer slightly different brightness
    const layerAlpha = 0.10 + di * 0.035;
    ctx.fillStyle = `rgba(255,248,220,${layerAlpha})`;
    ctx.fill();

    // Clean outer edge line
    ctx.beginPath();
    started = false;
    for (let d = 0; d < TOTAL_DAYS; d++) {
      if (!dayScores[d]) continue;
      const a = START_ANGLE + (d + 0.5) * dayAngle * dirMul;
      let r;
      if (p2Growth === 'out') {
        r = p2InnerR + rCumulPerDay[d] * p2UnitR;
      } else {
        r = p2OuterR - rCumulPerDay[d] * p2UnitR;
      }
      const x = cxr + r * Math.cos(a), y = cyr + r * Math.sin(a);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(255,248,220,${0.15 + di * 0.05})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  });

  // P2V2C2 reference rings
  ctx.strokeStyle = 'rgba(148,163,184,0.04)'; ctx.lineWidth = 0.4;
  for (let sv = 0; sv <= 30; sv += 5) {
    const r = p2InnerR + sv * p2UnitR;
    ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cxr, cyr, p2InnerR, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cxr, cyr, p2OuterR, 0, Math.PI * 2); ctx.stroke();

  // ── GAP RING ──
  const gapMidR = invertRings ? (p2OuterR + stageInnerR) / 2 : (stageOuterR + p2InnerR) / 2;
  ctx.beginPath(); ctx.arc(cxr, cyr, gapMidR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(148,163,184,0.04)'; ctx.lineWidth = gapRings * 0.3; ctx.stroke();

  // ── DAP PERIMETER — multiple styles ──
  const outermost = Math.max(stageOuterR, p2OuterR);
  const dapCodes = new Set(deal.dapReached || []);
  const dapRingBase = outermost + 4;
  const dapRingMaxH = 28 * (dapIntensity / 100);

  // Build per-day DAP signal with intensity scaling
  const dapSignal = new Array(TOTAL_DAYS).fill(0);
  DAP_MILESTONES.forEach(m => {
    if (dapCodes.has(m.cas)) {
      for (let d = 0; d < TOTAL_DAYS; d++) {
        const dist = Math.abs(d - m.day);
        // Tighter decay at higher intensity → more localized peaks around milestones
        const decay = 0.12 / (dapIntensity / 100);
        dapSignal[d] = Math.min(1.0, dapSignal[d] + Math.max(0, 1.0 - dist * decay));
      }
    }
  });
  // Activity fade: dim DAP signal for days far from current activity
  if (activityFade) {
    for (let d = 0; d < TOTAL_DAYS; d++) {
      if (d > deal.currentDay) { dapSignal[d] *= 0.15; continue; }
      const gap = deal.currentDay - d;
      const fade = Math.max(0.3, 1.0 - gap * 0.005);
      dapSignal[d] *= fade;
    }
  }

  // Base ring
  ctx.beginPath(); ctx.arc(cxr, cyr, dapRingBase, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(34,197,94,0.08)'; ctx.lineWidth = 0.5; ctx.stroke();

  const rand = makeRng(42);

  if (dapStyle === 'waveform') {
    // Original: radial bars per day
    for (let d = 0; d < TOTAL_DAYS; d++) {
      const a = START_ANGLE + (d + 0.5) * dayAngle * dirMul;
      const signal = dapSignal[d];
      if (signal < 0.01 && d > deal.currentDay) continue;
      const barH = signal * dapRingMaxH * (0.85 + rand() * 0.3);
      const gAlpha = d <= deal.currentDay ? (0.1 + signal * 0.5) : 0.03;
      ctx.beginPath();
      ctx.moveTo(cxr + dapRingBase * Math.cos(a), cyr + dapRingBase * Math.sin(a));
      ctx.lineTo(cxr + (dapRingBase + Math.max(0.5, barH)) * Math.cos(a), cyr + (dapRingBase + Math.max(0.5, barH)) * Math.sin(a));
      ctx.strokeStyle = `rgba(34,197,94,${gAlpha})`;
      ctx.lineWidth = d <= deal.currentDay ? (0.6 + signal * 1.0) : 0.3;
      ctx.stroke();
    }
  } else if (dapStyle === 'pulse') {
    // Concentric pulse rings radiating from reached milestones
    DAP_MILESTONES.forEach(m => {
      if (!dapCodes.has(m.cas)) return;
      for (let ring = 0; ring < 4; ring++) {
        const r = dapRingBase + ring * 7;
        const alpha = 0.4 - ring * 0.1;
        const a = START_ANGLE + m.day * dayAngle * dirMul;
        const spread = dayAngle * (4 + ring * 3);
        ctx.beginPath(); ctx.arc(cxr, cyr, r, a - spread / 2, a + spread / 2);
        ctx.strokeStyle = `rgba(34,197,94,${alpha})`; ctx.lineWidth = 1.5 - ring * 0.3; ctx.stroke();
      }
    });
  } else if (dapStyle === 'dotOrbit') {
    // Dots orbiting on multiple concentric tracks
    for (let track = 0; track < 3; track++) {
      const r = dapRingBase + 4 + track * 8;
      for (let d = 0; d < TOTAL_DAYS; d += (2 + track)) {
        const a = START_ANGLE + d * dayAngle * dirMul;
        const signal = dapSignal[d];
        if (signal < 0.02 && d > deal.currentDay) continue;
        const dotR = 0.8 + signal * 2.0;
        const alpha = d <= deal.currentDay ? (0.08 + signal * 0.5) : 0.03;
        ctx.beginPath(); ctx.arc(cxr + r * Math.cos(a), cyr + r * Math.sin(a), dotR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(34,197,94,${alpha})`; ctx.fill();
      }
    }
  } else if (dapStyle === 'spikeCrown') {
    // Tall sharp spikes, alternating heights, glow at tips
    for (let d = 0; d < TOTAL_DAYS; d++) {
      const a = START_ANGLE + (d + 0.5) * dayAngle * dirMul;
      const signal = dapSignal[d];
      if (signal < 0.01 && d > deal.currentDay) continue;
      const tall = (d % 3 === 0) ? 1.4 : (d % 3 === 1) ? 0.7 : 1.0;
      const spikeH = signal * dapRingMaxH * tall * (0.9 + rand() * 0.2);
      const tipR = dapRingBase + Math.max(0.5, spikeH);
      const gAlpha = d <= deal.currentDay ? (0.1 + signal * 0.55) : 0.02;
      // Spike line
      ctx.beginPath();
      ctx.moveTo(cxr + dapRingBase * Math.cos(a), cyr + dapRingBase * Math.sin(a));
      ctx.lineTo(cxr + tipR * Math.cos(a), cyr + tipR * Math.sin(a));
      ctx.strokeStyle = `rgba(34,197,94,${gAlpha})`; ctx.lineWidth = 0.6; ctx.stroke();
      // Glow dot at tip
      if (signal > 0.3 && d <= deal.currentDay) {
        ctx.beginPath(); ctx.arc(cxr + tipR * Math.cos(a), cyr + tipR * Math.sin(a), 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(34,197,94,${signal * 0.4})`; ctx.fill();
      }
    }
  } else if (dapStyle === 'heatGlow') {
    // Smooth radial gradient arcs — heat map style
    DAP_MILESTONES.forEach(m => {
      if (!dapCodes.has(m.cas)) return;
      const a = START_ANGLE + m.day * dayAngle * dirMul;
      const spread = dayAngle * 12;
      for (let ring = 0; ring < 6; ring++) {
        const r = dapRingBase + ring * 4.5;
        const alpha = (0.35 - ring * 0.05);
        ctx.beginPath(); ctx.arc(cxr, cyr, r, a - spread / 2, a + spread / 2);
        ctx.strokeStyle = `rgba(34,197,94,${Math.max(0.02, alpha)})`; ctx.lineWidth = 4; ctx.stroke();
      }
    });
  } else if (dapStyle === 'ribbon') {
    // Smooth sine-wave ribbon wrapping around the perimeter
    ctx.beginPath();
    for (let d = 0; d <= TOTAL_DAYS; d++) {
      const a = START_ANGLE + d * dayAngle * dirMul;
      const signal = dapSignal[Math.min(d, TOTAL_DAYS - 1)];
      const wave = Math.sin(d * 0.35) * signal * dapRingMaxH * 0.5;
      const r = dapRingBase + dapRingMaxH * 0.5 + wave;
      const x = cxr + r * Math.cos(a), y = cyr + r * Math.sin(a);
      if (d === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(34,197,94,0.35)'; ctx.lineWidth = 2; ctx.stroke();
    // Fill below ribbon
    ctx.beginPath();
    for (let d = 0; d <= TOTAL_DAYS; d++) {
      const a = START_ANGLE + d * dayAngle * dirMul;
      const signal = dapSignal[Math.min(d, TOTAL_DAYS - 1)];
      const wave = Math.sin(d * 0.35) * signal * dapRingMaxH * 0.5;
      const r = dapRingBase + dapRingMaxH * 0.5 + wave;
      const x = cxr + r * Math.cos(a), y = cyr + r * Math.sin(a);
      if (d === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    for (let d = TOTAL_DAYS; d >= 0; d--) {
      const a = START_ANGLE + d * dayAngle * dirMul;
      ctx.lineTo(cxr + dapRingBase * Math.cos(a), cyr + dapRingBase * Math.sin(a));
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(34,197,94,0.06)'; ctx.fill();
  } else if (dapStyle === 'beadChain') {
    // Connected beads on a single track, size = signal strength
    const trackR = dapRingBase + dapRingMaxH * 0.5;
    // Chain line
    ctx.beginPath(); ctx.arc(cxr, cyr, trackR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(34,197,94,0.06)'; ctx.lineWidth = 0.4; ctx.stroke();
    for (let d = 0; d < TOTAL_DAYS; d += 2) {
      const a = START_ANGLE + (d + 0.5) * dayAngle * dirMul;
      const signal = dapSignal[d];
      if (signal < 0.01 && d > deal.currentDay) continue;
      const beadR = 1.0 + signal * 3.5;
      const alpha = d <= deal.currentDay ? (0.1 + signal * 0.45) : 0.03;
      ctx.beginPath(); ctx.arc(cxr + trackR * Math.cos(a), cyr + trackR * Math.sin(a), beadR, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(34,197,94,${alpha})`; ctx.fill();
      ctx.strokeStyle = `rgba(34,197,94,${alpha * 0.5})`; ctx.lineWidth = 0.4; ctx.stroke();
    }
  } else if (dapStyle === 'aurora') {
    // Layered translucent arcs with varying widths — aurora borealis effect
    for (let layer = 0; layer < 5; layer++) {
      const r = dapRingBase + layer * 5 + rand() * 3;
      const lw = 2 + rand() * 3;
      ctx.beginPath();
      for (let d = 0; d < TOTAL_DAYS; d++) {
        const a = START_ANGLE + d * dayAngle * dirMul;
        const signal = dapSignal[d];
        const wobble = Math.sin(d * 0.5 + layer * 1.7) * 4 * signal;
        const pr = r + wobble;
        const x = cxr + pr * Math.cos(a), y = cyr + pr * Math.sin(a);
        if (d === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      const hue = 142 + layer * 8;
      const alpha = 0.08 + (4 - layer) * 0.04;
      ctx.strokeStyle = `hsla(${hue},60%,50%,${alpha})`; ctx.lineWidth = lw; ctx.stroke();
    }
  }

  // DAP milestone markers + labels (shared across all styles)
  DAP_MILESTONES.forEach(m => {
    const reached = dapCodes.has(m.cas);
    const a = START_ANGLE + m.day * dayAngle * dirMul;
    const signal = dapSignal[m.day];
    const barTop = dapRingBase + signal * dapRingMaxH;

    if (reached) {
      const dx = cxr + barTop * Math.cos(a), dy = cyr + barTop * Math.sin(a);
      ctx.save(); ctx.translate(dx, dy); ctx.rotate(a);
      ctx.beginPath(); ctx.moveTo(0, -2.5); ctx.lineTo(1.8, 0); ctx.lineTo(0, 2.5); ctx.lineTo(-1.8, 0); ctx.closePath();
      ctx.fillStyle = 'rgba(34,197,94,0.6)'; ctx.fill();
      ctx.restore();
    }

    const tipR = dapRingBase + dapRingMaxH + 6;
    ctx.save();
    ctx.translate(cxr + tipR * Math.cos(a), cyr + tipR * Math.sin(a));
    const normA = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    let rot = a + Math.PI / 2;
    if (normA > Math.PI * 0.5 && normA < Math.PI * 1.5) rot = a - Math.PI / 2;
    ctx.rotate(rot);
    ctx.font = `${reached ? 'bold ' : ''}5px Inter,sans-serif`;
    ctx.fillStyle = reached ? 'rgba(34,197,94,0.55)' : 'rgba(34,197,94,0.12)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(m.cas, 0, 0);
    ctx.restore();
  });

  // ── SCORING EVENT MARKERS — clean radial line styles ──
  const innermost = Math.min(stageInnerR, p2InnerR);
  const evOuterR = dapRingBase + dapRingMaxH + 4;

  deal.events.forEach((ev, ei) => {
    const a = START_ANGLE + ev.day * dayAngle * dirMul;
    const cos = Math.cos(a), sin = Math.sin(a);
    const iR = centerR - 2, oR = evOuterR;
    // Fade color based on how recent (activity fade)
    const lineAlpha = 0.5;
    const glowAlpha = 0.06;
    const lineColor = `rgba(251,191,36,${lineAlpha})`;
    const glowColor = `rgba(251,191,36,${glowAlpha})`;
    const editing = editingMilestoneIdx === ei;

    // Highlight if editing this milestone
    if (editing) {
      ctx.beginPath();
      ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
      ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
      ctx.strokeStyle = 'rgba(251,191,36,0.12)'; ctx.lineWidth = 8; ctx.stroke();
    }

    if (eventStyle === 'solid') {
      // Clean single line
      ctx.beginPath();
      ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
      ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
      ctx.strokeStyle = glowColor; ctx.lineWidth = 4; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
      ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
      ctx.strokeStyle = lineColor; ctx.lineWidth = 1.0; ctx.stroke();

    } else if (eventStyle === 'double') {
      // Two parallel lines
      const offset = dayAngle * 0.3;
      for (const off of [-offset, offset]) {
        const aa = a + off;
        const c2 = Math.cos(aa), s2 = Math.sin(aa);
        ctx.beginPath();
        ctx.moveTo(cxr + iR * c2, cyr + iR * s2);
        ctx.lineTo(cxr + oR * c2, cyr + oR * s2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 0.7; ctx.stroke();
      }

    } else if (eventStyle === 'dashed') {
      // Dashed radial line
      const segments = 16;
      const totalR = oR - iR;
      for (let s = 0; s < segments; s++) {
        if (s % 2 === 1) continue;
        const r1 = iR + (s / segments) * totalR;
        const r2 = iR + ((s + 1) / segments) * totalR;
        ctx.beginPath();
        ctx.moveTo(cxr + r1 * cos, cyr + r1 * sin);
        ctx.lineTo(cxr + r2 * cos, cyr + r2 * sin);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.0; ctx.stroke();
      }

    } else if (eventStyle === 'tapered') {
      // Thick at center, thin at edge
      const steps = 20;
      const totalR = oR - iR;
      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        const r1 = iR + t * totalR;
        const r2 = iR + (t + 1/steps) * totalR;
        const lw = 2.5 * (1 - t * 0.85);
        ctx.beginPath();
        ctx.moveTo(cxr + r1 * cos, cyr + r1 * sin);
        ctx.lineTo(cxr + r2 * cos, cyr + r2 * sin);
        ctx.strokeStyle = `rgba(251,191,36,${lineAlpha * (1 - t * 0.3)})`; ctx.lineWidth = lw; ctx.stroke();
      }

    } else if (eventStyle === 'tick') {
      // Short tick marks at key radii + thin connector
      ctx.beginPath();
      ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
      ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
      ctx.strokeStyle = `rgba(251,191,36,${lineAlpha * 0.2})`; ctx.lineWidth = 0.3; ctx.stroke();
      // Tick marks at ring boundaries
      const tickRs = [innermost, stageInnerR, stageOuterR, p2InnerR, p2OuterR, dapRingBase];
      const tickLen = dayAngle * 1.2;
      tickRs.forEach(tr => {
        ctx.beginPath();
        ctx.arc(cxr, cyr, tr, a - tickLen/2, a + tickLen/2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
      });

    } else if (eventStyle === 'glow') {
      // Soft wide glow with bright core
      for (let g = 3; g >= 0; g--) {
        ctx.beginPath();
        ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
        ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
        ctx.strokeStyle = `rgba(251,191,36,${0.02 + g * 0.015})`; ctx.lineWidth = 2 + g * 3; ctx.stroke();
      }
      ctx.beginPath();
      ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
      ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
      ctx.strokeStyle = `rgba(255,248,220,${lineAlpha * 0.8})`; ctx.lineWidth = 0.6; ctx.stroke();

    } else if (eventStyle === 'hairline') {
      // Ultra-thin precise line
      ctx.beginPath();
      ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
      ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
      ctx.strokeStyle = `rgba(255,248,220,${lineAlpha * 0.7})`; ctx.lineWidth = 0.3; ctx.stroke();

    } else if (eventStyle === 'bracket') {
      // Line with perpendicular brackets at each ring boundary
      ctx.beginPath();
      ctx.moveTo(cxr + iR * cos, cyr + iR * sin);
      ctx.lineTo(cxr + oR * cos, cyr + oR * sin);
      ctx.strokeStyle = `rgba(251,191,36,${lineAlpha * 0.4})`; ctx.lineWidth = 0.5; ctx.stroke();
      const bracketRs = [stageInnerR, stageOuterR, p2InnerR, p2OuterR];
      const bLen = dayAngle * 1.8;
      bracketRs.forEach(br => {
        ctx.beginPath();
        ctx.arc(cxr, cyr, br, a - bLen/2, a + bLen/2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.2; ctx.stroke();
        // Small dots at ends
        for (const bOff of [-bLen/2, bLen/2]) {
          const ba = a + bOff;
          ctx.beginPath(); ctx.arc(cxr + br * Math.cos(ba), cyr + br * Math.sin(ba), 1, 0, Math.PI * 2);
          ctx.fillStyle = lineColor; ctx.fill();
        }
      });
    }

    // Small dot at center edge for all styles
    ctx.beginPath(); ctx.arc(cxr + (centerR + 1) * cos, cyr + (centerR + 1) * sin, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(251,191,36,${0.6})`; ctx.fill();
  });

  // ── STAKEHOLDERS (from latest event) ──
  const latestEvent = deal.events[deal.events.length - 1];
  const stakes = latestEvent.stakeholders || [];
  const stakeOrbitR = dapRingBase + dapRingMaxH + 22;
  const spread = 0.5;
  const baseAngle = -Math.PI / 2;
  const lastScores = latestEvent.scores;

  stakes.forEach((stake, si) => {
    const cfg = ROLE_CONFIG[stake.role] || ROLE_CONFIG.OTHER;
    const sAngle = baseAngle + (si - (stakes.length - 1) / 2) * (spread / Math.max(stakes.length - 1, 1));
    const sx = cxr + stakeOrbitR * Math.cos(sAngle);
    const sy = cyr + stakeOrbitR * Math.sin(sAngle);
    const nodeR = cfg.r * 1.3;

    // Vines
    stake.dims.forEach(dim => {
      const di = DIMS.indexOf(dim);
      if (di < 0) return;
      const col = DIM_COLORS[dim];
      let cb = 0;
      for (let k = 0; k < di; k++) cb += (lastScores[DIMS[k]] || 0);
      const dimMidR = p2InnerR + (cb + (lastScores[dim] || 0) / 2) * p2UnitR;
      const targetA = sAngle * 0.3 + baseAngle * 0.7;
      const tx = cxr + dimMidR * Math.cos(targetA);
      const ty = cyr + dimMidR * Math.sin(targetA);
      const mR = (stakeOrbitR + dimMidR) / 2 * 0.6;
      const mA = (sAngle + targetA) / 2;

      ctx.beginPath(); ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(cxr + mR * Math.cos(mA), cyr + mR * Math.sin(mA), tx, ty);
      ctx.strokeStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.25)`;
      ctx.lineWidth = cfg.fill ? 1.5 : 0.8;
      ctx.setLineDash(cfg.fill ? [] : [3, 2]); ctx.stroke(); ctx.setLineDash([]);

      ctx.beginPath(); ctx.arc(tx, ty, 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${col.rgb[0]},${col.rgb[1]},${col.rgb[2]},0.5)`; ctx.fill();
    });

    // Glow
    const gg = ctx.createRadialGradient(sx, sy, nodeR*0.5, sx, sy, nodeR*2.5);
    gg.addColorStop(0, cfg.color + '20'); gg.addColorStop(1, cfg.color + '00');
    ctx.beginPath(); ctx.arc(sx, sy, nodeR*2.5, 0, Math.PI*2); ctx.fillStyle = gg; ctx.fill();

    // Circle
    ctx.beginPath(); ctx.arc(sx, sy, nodeR, 0, Math.PI * 2);
    if (cfg.fill) {
      ctx.fillStyle = cfg.color; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.6; ctx.stroke();
    } else {
      ctx.fillStyle = '#0a0f1e'; ctx.fill();
      ctx.strokeStyle = cfg.color; ctx.lineWidth = 1.2;
      ctx.setLineDash([2, 1.5]); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.font = `bold ${nodeR * 0.7}px Inter,sans-serif`;
    ctx.fillStyle = cfg.fill ? '#fff' : cfg.color;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(cfg.label, sx, sy);

    // Name
    const lr = stakeOrbitR + nodeR + 10;
    ctx.save();
    ctx.translate(cxr + lr * Math.cos(sAngle), cyr + lr * Math.sin(sAngle));
    let rot = sAngle + Math.PI / 2;
    const normA = ((sAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    if (normA > Math.PI * 0.5 && normA < Math.PI * 1.5) rot += Math.PI;
    ctx.rotate(rot);
    ctx.font = '7px Inter,sans-serif'; ctx.fillStyle = 'rgba(255,248,220,0.65)';
    ctx.textAlign = 'center'; ctx.fillText(stake.name, 0, 0);
    ctx.restore();
  });

  // ── CURRENT DAY INDICATOR ──
  const cdAngle = START_ANGLE + deal.currentDay * dayAngle * dirMul;
  const cdInner = Math.min(stageInnerR, p2InnerR) - 4;
  const cdOuter = dapRingBase + dapRingMaxH + 4;
  ctx.beginPath();
  ctx.moveTo(cxr + cdInner * Math.cos(cdAngle), cyr + cdInner * Math.sin(cdAngle));
  ctx.lineTo(cxr + cdOuter * Math.cos(cdAngle), cyr + cdOuter * Math.sin(cdAngle));
  ctx.strokeStyle = 'rgba(251,191,36,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

  // ── CENTER ──
  const total = lastScores ? DIMS.reduce((s, d) => s + (lastScores[d] || 0), 0) : 0;
  const hue = total >= 22 ? 142 : total >= 12 ? 45 : 220;
  const cg = ctx.createRadialGradient(cxr - 3, cyr - 4, centerR * 0.1, cxr, cyr, centerR);
  cg.addColorStop(0, `hsla(${hue},40%,60%,0.85)`);
  cg.addColorStop(0.6, `hsla(${hue},30%,30%,0.7)`);
  cg.addColorStop(1, `hsla(${hue},20%,15%,0.5)`);
  ctx.beginPath(); ctx.arc(cxr, cyr, centerR, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = `hsla(${hue},30%,50%,0.15)`; ctx.lineWidth = 0.8; ctx.stroke();

  ctx.font = 'bold 18px Inter,sans-serif'; ctx.fillStyle = '#f8fafc';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(total, cxr, cyr - 6);
  ctx.font = '8px Inter,sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.5)';
  ctx.fillText('/30', cxr, cyr + 5);
  const lastStage = dayStages[deal.currentDay] || dayStages[deal.currentDay - 1] || 'discover';
  ctx.font = 'bold 6px Inter,sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.35)';
  ctx.fillText(STAGE_LABELS[lastStage].toUpperCase(), cxr, cyr + 13);
  ctx.font = '5px Inter,sans-serif'; ctx.fillStyle = 'rgba(251,191,36,0.4)';
  ctx.fillText(`Day ${deal.currentDay}`, cxr, cyr + 20);

  ctx.restore();
}
