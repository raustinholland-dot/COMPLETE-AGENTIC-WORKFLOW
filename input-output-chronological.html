<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input-Output Chronological Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 100%; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 1.5em; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border: 1px solid #444; }
        th { background: #2a5298; color: white; font-weight: bold; }
        tr:nth-child(even) { background: #1e1e1e; }
        tr:nth-child(odd) { background: #252525; }

        .input-cell { width: 45%; }
        .output-cell { width: 45%; }
        .time-cell { width: 10%; font-size: 0.9em; color: #888; }

        .input-type { display: inline-block; padding: 2px 6px; background: #444; border-radius: 3px; font-size: 0.8em; margin-bottom: 4px; }
        .email { background: #2a4a7a; }
        .teams { background: #4a2a7a; }
        .calendar { background: #2a7a4a; }

        .subject { font-weight: bold; color: #5a9fd4; }
        .from { font-size: 0.9em; color: #888; }
        .preview { font-size: 0.85em; color: #999; margin-top: 4px; }

        .output-item { margin-bottom: 6px; padding: 4px; background: #2a2a2a; border-left: 3px solid #5a9fd4; }
        .output-desc { font-weight: bold; }
        .output-file { font-size: 0.85em; color: #5a9fd4; }
        .output-condition { font-size: 0.85em; color: #888; }
    </style>
</head>
<body>

                    <th>Time</th>
                    <th class="input-cell">INPUT (Email / Teams / Calendar)</th>
                    <th class="output-cell">OUTPUT (Files to Update)</th>

            </thead>
            <tbody id="mapBody">
            </tbody>
        </table>
    </div>

        function renderMap() {
            const tbody = document.getElementById('mapBody');
            tbody.innerHTML = data.map(row => {
                const typeClass = row.input.type.toLowerCase();
                const outputsHTML = row.outputs.map(o => `
                    <div class="output-item">
                        <div class="output-desc">${o.desc}</div>
                        <div class="output-file">→ ${o.file}</div>
                        <div class="output-condition">[${o.condition}]</div>
                    </div>
                `).join('');

                return `
                    <tr>
                        <td class="time-cell">${row.time}</td>
                        <td class="input-cell">
                            <span class="input-type ${typeClass}">${row.input.type.toUpperCase()}</span>
                            <div class="subject">${row.input.subject}</div>
                            <div class="from">${row.input.from}</div>
                            <div class="preview">${row.input.preview}</div>
                        </td>
                        <td class="output-cell">
                            ${outputsHTML}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        renderMap();

</body>
</html>
